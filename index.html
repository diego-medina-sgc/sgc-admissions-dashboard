<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SGC — Admissions Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Asap:wght@300;400;500;600;700&family=Asap+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* ─── DISEÑO ORIGINAL EXACTO ─── */
:root{--ink:#1A1F35;--red:#DC1E33;--navy:#213463;--celeste:#6AB2E2;--violet:#6B6EB3;--teal:#109AA9;--cream:#F1EDE5;--paper:#EAE5DB;--gray:#6A655C;--line:#E6E1D6;--hairline:#EDE9E0;--white:#fff;--green:#15803d;--green-lt:#dcfce7;--amber:#b45309;--amber-lt:#fef3c7;--red-lt:#FBE9EB;--navy-lt:#E9ECF4;--ink-lt:#EDE8DE;--card-shadow:0 1px 2px rgba(40,33,28,.04),0 4px 14px rgba(40,33,28,.05);--card-shadow-hover:0 2px 6px rgba(40,33,28,.05),0 12px 30px rgba(40,33,28,.09);--r-sm:8px;--r:12px;--r-lg:16px;--sidebar-w:248px;--sidebar-collapsed:60px;--header-h:58px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Asap',sans-serif;background:#F6F5F1;color:var(--ink);min-height:100vh;overflow-x:hidden;}
#loading{position:fixed;inset:0;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:900;transition:opacity .4s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-logo{width:180px;}
.load-ring{width:40px;height:40px;border:2.5px solid rgba(33,52,99,.15);border-top-color:#DC1E33;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Asap Condensed',sans-serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:#8888A8;font-weight:600;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 90% at 50% -10%,#FFFFFF 0%,#F4EFE7 52%,#E9E2D6 100%);}
.login-box{background:var(--white);border-radius:18px;box-shadow:0 1px 2px rgba(40,33,28,.04),0 18px 50px rgba(40,33,28,.12);padding:48px 46px 40px;border-top:4px solid var(--red);border-left:1px solid var(--hairline);border-right:1px solid var(--hairline);border-bottom:1px solid var(--hairline);max-width:430px;width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;}
.login-logo{width:208px;}
.login-rule{width:36px;height:2px;border-radius:2px;background:var(--red);}
.login-tagline{font-size:.86rem;color:var(--gray) !important;text-align:center;line-height:1.7;}
.login-tagline strong{display:block;color:var(--ink);font-size:.98rem;font-weight:600;margin-bottom:4px;letter-spacing:-.01em;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:var(--white);border:1.5px solid var(--line);border-radius:9px;font-family:'Asap',sans-serif;font-size:.9rem;font-weight:500;color:var(--ink);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;}
.btn-google:hover{border-color:var(--navy);background:#FCFBF9;box-shadow:0 4px 16px rgba(40,33,28,.1);}
#app{display:none;}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--white);border-bottom:1px solid var(--line);border-top:3px solid var(--red);display:flex;align-items:center;padding:0 16px 0 0;z-index:300;box-shadow:0 2px 8px rgba(33,52,99,.06);}
.hdr-brand{width:var(--sidebar-w);display:flex;align-items:center;gap:11px;padding:0 16px;flex-shrink:0;}
.hdr-titles{display:none;}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.hdr-sub{font-size:.58rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.13em;text-transform:uppercase;margin-top:1px;}
.hdr-mid{flex:1;display:flex;align-items:center;gap:10px;padding-left:4px;}
.campus-group{display:flex;gap:5px;background:var(--cream);padding:3px;border-radius:22px;border:1px solid var(--line);}
.campus-btn{padding:5px 13px;border-radius:20px;border:1.5px solid transparent;background:transparent;font-family:'Asap',sans-serif;font-size:.73rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .18s;white-space:nowrap;}
.campus-btn:hover:not(.active){background:var(--white);color:var(--ink);}
.campus-btn[data-c="os"].active{background:var(--ink);border-color:var(--ink);color:#fff;}
.campus-btn[data-c="q"].active{background:var(--red);border-color:var(--red);color:#fff;}
.campus-btn[data-c="n"].active{background:var(--navy);border-color:var(--navy);color:#fff;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--paper);border:1px solid var(--line);font-size:.68rem;font-family:'Asap Condensed',sans-serif;color:var(--gray);font-weight:600;}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn-logout{background:none;border:1.5px solid var(--line);color:var(--gray);padding:5px 12px;border-radius:6px;font-size:.72rem;font-family:'Asap',sans-serif;cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--white);display:flex;flex-direction:column;z-index:200;border-right:1px solid var(--line);box-shadow:2px 0 14px rgba(40,33,28,.05);}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;overflow-x:hidden;}
.sb-lbl{font-size:.56rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#9C968B;padding:14px 10px 6px;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--gray);font-size:.82rem;font-weight:500;white-space:nowrap;transition:all .15s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--cream);color:var(--ink);}
.nav-item.active{background:var(--red-lt);color:var(--red);font-weight:700;padding-left:9px;box-shadow:inset 3px 0 0 var(--red);}
.nav-item svg{flex-shrink:0;width:18px;height:18px;}
.content{margin-top:var(--header-h);margin-left:var(--sidebar-w);min-height:calc(100vh - var(--header-h));}
.panel{display:none;padding:28px 32px;max-width:1520px;}
.panel.active{display:block;}
.sec{margin-bottom:36px;}
.sec-hd{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid transparent;background-image:linear-gradient(90deg,var(--campus-color,var(--ink)) 0%,transparent 100%);background-repeat:no-repeat;background-size:100% 1px;background-position:bottom;}
.sec-title{font-size:1.16rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.2;white-space:nowrap;}
.page-hd{margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.page-title{font-size:2.15rem;font-weight:700;letter-spacing:-.045em;color:var(--ink);line-height:1.08;}
.page-sub{font-size:.72rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));background:linear-gradient(120deg,#243a6e 0%,#1d2f5b 60%,#172548 100%);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 1px 2px rgba(23,37,72,.18),0 16px 38px rgba(23,37,72,.22);}
.si{padding:22px 24px 20px;border-right:1px solid rgba(255,255,255,.1);text-align:center;}
.si-lbl{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:10px;font-family:'Asap Condensed',sans-serif;}
.si-val{font-size:2.2rem;font-weight:700;color:#fff;line-height:.95;letter-spacing:-.05em;}
.si-val.neg{color:#ff7a88;} .si-val.pos{color:#5ee0a0;}
.si-foot{font-size:.66rem;color:rgba(255,255,255,.55);font-family:'Asap Condensed',sans-serif;margin-top:8px;}
.comm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.comm-card{background:var(--white);border:1px solid var(--hairline);border-top:3px solid var(--teal);border-radius:var(--r);padding:17px 18px;text-align:center;box-shadow:var(--card-shadow);}
.comm-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.comm-val{font-size:1.7rem;font-weight:700;color:var(--teal);letter-spacing:-.02em;}
.comm-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--hairline);box-shadow:var(--card-shadow);background:var(--white);}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
thead th{background:var(--ink);color:#fff;padding:11px 14px;text-align:center;font-weight:700;font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
thead th:first-child{text-align:left;}
.campus-q thead th{background:var(--red);} .campus-n thead th{background:var(--navy);}
tbody tr{border-bottom:1px solid var(--line);}
td{padding:9px 14px;} td:first-child{text-align:left;font-weight:500;} td.r{text-align:center;font-family:'Asap Condensed',sans-serif;}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.6rem;font-weight:700;font-family:'Asap Condensed',sans-serif;}
.val-pos{color:var(--green);font-weight:600;} .val-neg{color:var(--red);font-weight:600;}
.funnel{display:flex;flex-direction:column;gap:6px;}
.f-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px 14px;}
.f-row.won{border-left:3px solid var(--teal);}
.f-lbl{font-size:.8rem;font-weight:500;min-width:180px;}
.f-track{flex:1;height:9px;background:var(--paper);border-radius:5px;}
.f-fill{height:100%;border-radius:5px;width:0%;transition:width .95s cubic-bezier(.4,0,.2,1);background:var(--ink);}
.campus-q .f-fill{background:var(--red);} .campus-n .f-fill{background:var(--navy);}
.f-row.won .f-fill{background:var(--teal) !important;}
.f-nums{font-family:'Asap Condensed',sans-serif;font-size:.71rem;color:var(--gray);min-width:165px;text-align:right;}
.f-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.62rem;font-weight:700;background:#fee2e2;color:#b91c1c;margin-left:4px;font-family:'Asap Condensed',sans-serif;}
.sim-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.sim-card{background:var(--white);border-radius:12px;padding:18px 20px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--card-shadow);}
.sim-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ink);}
.sim-card.q::after{background:var(--red);} .sim-card.n::after{background:var(--navy);}
.sim-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.sim-val{font-size:2rem;font-weight:700;color:var(--ink);letter-spacing:-.04em;}
.sim-fact{font-size:.8rem;font-weight:600;color:var(--teal);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-delta{font-size:.67rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-controls{display:flex;gap:6px;margin-bottom:18px;align-items:center;}
.sim-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.68rem;font-weight:500;color:var(--gray);cursor:pointer;}
.adj-wrap{display:flex;align-items:center;justify-content:center;gap:3px;}
.adj-btn{width:20px;height:20px;border:1px solid var(--line);border-radius:3px;background:var(--white);cursor:pointer;font-weight:700;}
.adj-input{width:46px;text-align:center;border:1px solid var(--line);border-radius:3px;padding:2px 3px;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.cc{background:var(--white);border-radius:var(--r);padding:20px 22px 22px;box-shadow:var(--card-shadow);border:1px solid var(--hairline);}
.cc-hd{margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--hairline);}
.cc-ttl{font-size:.92rem;font-weight:700;color:var(--ink);}
</style>
</head>
<body>

<div id="loading">
  <div class="load-ring"></div>
  <div class="load-txt">Cargando dashboard</div>
</div>

<div id="login-screen" role="main">
  <div class="login-box">
    <p class="login-tagline"><strong>Dashboard de Admisiones 2026</strong>Acceso restringido</p>
    <button class="btn-google" id="btn-login">Ingresar con Google</button>
  </div>
</div>

<div id="access-denied" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#F1EDE5;">
  <div class="login-box" style="text-align:center;">
    <div style="font-weight:700;font-size:1rem;color:#1A1F35;">Acceso no autorizado</div>
    <div style="font-size:.82rem;color:#64748B;line-height:1.6">La cuenta <strong id="denied-email" style="color:#DC1E33"></strong> no tiene permisos.</div>
    <button class="btn-google" onclick="location.reload()">Volver al inicio</button>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-titles" style="display:block">
        <div class="hdr-title">Admissions</div>
        <div class="hdr-sub">Analytics &middot; 2026</div>
      </div>
    </div>
    <div class="hdr-mid">
      <div class="campus-group">
        <button class="campus-btn active" data-c="os">One School</button>
        <button class="campus-btn" data-c="q">Quilmes</button>
        <button class="campus-btn" data-c="n">North</button>
      </div>
    </div>
    <div class="hdr-right">
      <span class="hdr-badge"><span class="hdr-dot"></span><span id="h-update">–</span></span>
      <button class="btn-logout" id="btn-out">Salir</button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <nav class="sb-nav" id="sb-nav"></nav>
  </aside>

  <main class="content" id="content">
    <div id="main" class="campus-os"></div>
  </main>
</div>

<script>
// --- CONFIGURACIÓN PRINCIPAL ---
const CLIENT_ID = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';
const API_URL   = 'https://script.google.com/macros/s/AKfycbx2Ad-6YTGwPTcXV2Q_Bs-dgDVsXGRwy4wR2h7uIvhGOMvgWK7G260IEDDd8prg97At/exec'; // <--- ¡PEGÁ ACÁ LA URL DE TU SCRIPT!

let tokenClient, accessToken, userEmail = '', D = {}, campus = 'os', activeTab = 'resumen';
let simAdj = {}, showFact = true;

// Nuevos Tabs
const TABS = [
  {id:'resumen',   label:'Executive Summary'},
  {id:'admissions',label:'Admissions'},
  {id:'retention', label:'Retention & Community'},
  {id:'marketing', label:'Marketing'},
  {id:'proyeccion',label:'Projection 2027'},
  {id:'alumni',    label:'Alumni'}
];

// --- AUTENTICACIÓN ---
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'openid email profile',
    callback: async r => {
      if(r.error) { alert('Error de auth'); return; }
      accessToken = r.access_token;
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
        const info = await res.json();
        userEmail = (info.email||'').toLowerCase().trim();
      } catch(ex){}
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchData();
    }
  });
  document.getElementById('loading').classList.add('hidden');
}
document.getElementById('btn-login').addEventListener('click',()=>tokenClient.requestAccessToken({prompt:'select_account'}));
document.getElementById('btn-out').addEventListener('click',()=>location.reload());
window.onload=()=>{
  const s = document.createElement('script'); s.src = 'https://accounts.google.com/gsi/client';
  s.onload = initAuth; document.head.appendChild(s);
};

// --- ADAPTADOR Y FETCH DATA ---
async function fetchData() {
  document.getElementById('loading').classList.remove('hidden');
  document.querySelector('.load-txt').textContent = 'Sincronizando datos...';
  
  const cb = 'sgcCb_'+Date.now();
  const url = API_URL + '?callback=' + cb + '&t=' + Date.now();

  const onSuccess = data => {
    const raw = data.data || {};
    
    // Función adaptadora
    const findKPI = (sheetArray, kpiName, campusCol) => {
      if (!sheetArray) return 0;
      const row = sheetArray.find(r => r.KPI === kpiName || r.Cause === kpiName || r.Etapa === kpiName || r.Nivel === kpiName);
      return row ? row[campusCol] : 0;
    };

    D = {
      lastUpdate: data.lastUpdate,
      headline: {
        total_alumnos: findKPI(raw.exec_head, 'Total Students 2026', 'One School'),
        variacion_anual: findKPI(raw.exec_head, 'Anual Variation', 'One School'),
        new_students: findKPI(raw.exec_head, 'New Students 2026', 'One School'),
        win_rate: findKPI(raw.adm_head, 'Conversion Rate 2026', 'One School'),
        prospectos: findKPI(raw.adm_head, 'Total Prospects 2026', 'One School'),
        retencion_quilmes: findKPI(raw.ret_head, 'Retention Rate', 'Quilmes'),
        retencion_north: findKPI(raw.ret_head, 'Retention Rate', 'North')
      },
      community: {
        ogQuilmes: findKPI(raw.exec_comm, 'OG Parent Quilmes', 'Quilmes'),
        ogNorth: findKPI(raw.exec_comm, 'OG Parent North', 'North'),
        foreignStudents: findKPI(raw.exec_comm, 'International students', 'One School'),
        priorityCommunity: findKPI(raw.exec_comm, 'Priority community', 'One School')
      },
      funnel: (raw.adm_funnel || []).map(row => ({
        etapa: row.Etapa || '', llegaron: row.Llegaron || 0, pctPerd: row['Drop %'] || 0,
        isWon: String(row.Etapa || '').includes('Won') || String(row.Etapa || '').includes('Place Offering')
      })),
      pipeline: (raw.adm_pipe || []).map(row => ({
        etapa: row.Nivel || '', qK: row['Consultation']||0, qP: row['Info. Meeting']||0, qC: row['Parents Interv.']||0, qT: row['TOTAL']||0, isWon: false
      })),
      proyeccion: {
        quilmes: (raw.proj || []).filter(r => r.Campus === 'Quilmes').map(r => ({ grado: r['Year Group'], proy: r['Base Projectada'], facturacion: r['Billing USD'], base2026: r['Base 2026'] })),
        north: (raw.proj || []).filter(r => r.Campus === 'North').map(r => ({ grado: r['Year Group'], proy: r['Base Projectada'], facturacion: r['Billing USD'], base2026: r['Base 2026'] }))
      },
      withdrawals: (raw.ret_with || []).map(row => ({
        causa: row.Cause, tipo: row.Type, q2025: row['Q 2025']||0, q2026: row['Q 2026']||0, n2025: row['N 2025']||0, n2026: row['N 2026']||0, tot2025: row['OS 2025']||0, tot2026: row['OS 2026']||0
      })),
      // Datos directos para tablas genéricas
      rawMarketing: raw.marketing,
      rawAlumni: raw.alumni
    };

    if(data.allowedEmails && data.allowedEmails.length > 0){
      if(!data.allowedEmails.includes(userEmail)){
        document.getElementById('app').style.display='none';
        document.getElementById('access-denied').style.display='flex';
        document.getElementById('denied-email').textContent=userEmail;
        document.getElementById('loading').classList.add('hidden');
        return;
      }
    }

    document.getElementById('h-update').textContent = 'Actualizado: ' + D.lastUpdate;
    initSimAdj(); render();
    document.getElementById('loading').classList.add('hidden');
    delete window[cb];
  };

  window[cb] = onSuccess;
  const s = document.createElement('script'); s.id = '_jp'; s.src = url;
  document.head.appendChild(s);
}

// --- UTILIDADES ---
const fN = v => (v===null||v==='')?'--':Math.round(parseFloat(v)).toLocaleString('es-AR');
const fP = v => (v===null||v==='')?'--':(parseFloat(v)*100).toFixed(1)+'%';
const fUSD = v => (v===null||v==='')?'--':'$'+Math.round(parseFloat(v)).toLocaleString('en-US');
function pageHeader(title,sub){ const d=document.createElement('div'); d.className='page-hd'; d.innerHTML=`<div class="page-title">${title}</div><div class="page-sub">${sub}</div>`; return d;}
function sec(title,content){ const s=document.createElement('div'); s.className='sec'; s.innerHTML=`<div class="sec-hd"><span class="sec-title">${title}</span></div>`; s.appendChild(content); return s;}
function buildGenericTable(data2D) {
  if (!data2D || data2D.length < 1) return '<p style="padding:15px; color:var(--gray)">No data available.</p>';
  let html = '<table><thead><tr>';
  Object.keys(data2D[0]).forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data2D.forEach(row => {
    html += '<tr>';
    Object.values(row).forEach((val, idx) => {
      let fVal = val;
      if (typeof fVal === 'number') fVal = (fVal % 1 === 0) ? fVal.toLocaleString('es-AR') : fVal.toFixed(2);
      html += `<td class="${idx > 0 ? 'r' : ''}">${fVal}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  const wrap = document.createElement('div'); wrap.className = 'tw'; wrap.innerHTML = html; return wrap;
}

// --- SIMULADOR DE PROYECCIÓN ---
function initSimAdj(){
  simAdj={}; if(!D.proyeccion) return;
  (D.proyeccion.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=0;});
  (D.proyeccion.north||[]).forEach(r=>{simAdj['n_'+r.grado]=0;});
}
function calcSimTotal(ck){
  const rows = ck==='q' ? D.proyeccion.quilmes : D.proyeccion.north;
  let alumnos=0, factAdj=0, base=0;
  (rows||[]).forEach(r=>{
    const adj = simAdj[ck+'_'+r.grado]||0; const proy = parseFloat(r.proy)||0;
    alumnos += Math.round(proy+adj); base += parseFloat(r.base2026)||0;
    if(proy>0) factAdj += (parseFloat(r.facturacion)||0)/proy*(proy+adj);
  });
  return {base, final:alumnos, facturacion:factAdj};
}
function updateSimDisplay(){
  if(!D.proyeccion) return;
  const qT=calcSimTotal('q'), nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final, osBase=qT.base+nT.base, osFact=qT.facturacion+nT.facturacion;
  const setCard = (id,final,base,fact) => {
    const el=document.getElementById(id); if(!el) return;
    el.querySelector('.sim-val').textContent = Math.round(final).toLocaleString('es-AR');
    el.querySelector('.sim-fact').textContent = fUSD(fact)+' USD';
    const d=Math.round(final-base), pct=(base>0?(final-base)/base*100:0).toFixed(1), sign=d>=0?'+':'';
    el.querySelector('.sim-delta').innerHTML = `vs base ${fN(base)} <span class="${d<0?'val-neg':'val-pos'}">${sign}${d} (${sign}${pct}%)</span>`;
  };
  setCard('sim-q', qT.final, qT.base, qT.facturacion);
  setCard('sim-n', nT.final, nT.base, nT.facturacion);
  setCard('sim-os', osFinal, osBase, osFact);
  
  ['q','n'].forEach(ck=>{
    const rows = ck==='q' ? D.proyeccion.quilmes : D.proyeccion.north;
    rows.forEach(r=>{
      const key = ck+'_'+r.grado;
      const el = document.getElementById('final_'+key); if(el) el.textContent = Math.round((parseFloat(r.proy)||0)+(simAdj[key]||0)).toLocaleString('es-AR');
      const fEl = document.getElementById('factrow_'+key); if(fEl) fEl.textContent = r.proy>0 ? fUSD(r.facturacion/r.proy*(r.proy+(simAdj[key]||0))) : '--';
    });
  });
}
window.applyScenario = function(type){
  if(type==='reset') initSimAdj();
  else if(type==='opt'){ (D.proyeccion.quilmes||[]).forEach(r=>simAdj['q_'+r.grado]=2); (D.proyeccion.north||[]).forEach(r=>simAdj['n_'+r.grado]=1); }
  else if(type==='cons'){ (D.proyeccion.quilmes||[]).forEach(r=>simAdj['q_'+r.grado]=-2); (D.proyeccion.north||[]).forEach(r=>simAdj['n_'+r.grado]=-1); }
  updateSimDisplay();
};

// --- RENDERIZADO VISUAL ---
function render() {
  const main = document.getElementById('main');
  main.innerHTML = ''; main.className = 'campus-' + campus;
  
  const panel = document.createElement('div');
  panel.className = 'panel active';
  
  if (activeTab === 'resumen') {
    panel.appendChild(pageHeader('Executive Summary', 'Panorama general 2026'));
    const h = D.headline || {};
    const strip = document.createElement('div'); strip.className = 'stat-strip';
    const varN = (parseFloat(h.variacion_anual)||0)*100;
    strip.innerHTML = `
      <div class="si"><div class="si-lbl">Total Students</div><div class="si-val">${fN(h.total_alumnos)}</div><div class="si-foot">One School 2026</div></div>
      <div class="si"><div class="si-lbl">Anual Var.</div><div class="si-val ${varN<0?'neg':'pos'}">${varN.toFixed(2)}%</div><div class="si-foot">2025 → 2026</div></div>
      <div class="si"><div class="si-lbl">Ret. Quilmes</div><div class="si-val" style="color:#ff7a88">${fP(h.retencion_quilmes)}</div><div class="si-foot">Prom. Ponderado</div></div>
      <div class="si"><div class="si-lbl">Ret. North</div><div class="si-val" style="color:#9fc0ef">${fP(h.retencion_north)}</div><div class="si-foot">Prom. Ponderado</div></div>
      <div class="si"><div class="si-lbl">New Students</div><div class="si-val">${fN(h.new_students)}</div><div class="si-foot">Qs + North</div></div>
    `;
    panel.appendChild(sec('Headline KPIs', strip));
    
    if(D.community){
      const cg = document.createElement('div'); cg.className = 'comm-grid';
      cg.innerHTML = `
        <div class="comm-card"><div class="comm-lbl">OG Quilmes</div><div class="comm-val">${fP(D.community.ogQuilmes)}</div><div class="comm-foot">Parents</div></div>
        <div class="comm-card"><div class="comm-lbl">OG North</div><div class="comm-val">${fP(D.community.ogNorth)}</div><div class="comm-foot">Parents</div></div>
        <div class="comm-card"><div class="comm-lbl">Int. Students</div><div class="comm-val">${fP(D.community.foreignStudents)}</div><div class="comm-foot">One School</div></div>
        <div class="comm-card" style="box-shadow: 0 0 0 1px rgba(16,154,169,.4)"><div class="comm-lbl">Priority Comm.</div><div class="comm-val">${fP(D.community.priorityCommunity)}</div><div class="comm-foot">OG + Siblings + Staff</div></div>
      `;
      panel.appendChild(sec('Community Indicators', cg));
    }
  } 
  else if (activeTab === 'admissions') {
    panel.appendChild(pageHeader('Admissions', 'Embudo de conversión'));
    const fd = document.createElement('div'); fd.className = 'funnel';
    const maxF = Math.max(...(D.funnel||[]).map(x=>parseFloat(x.llegaron)||0),1);
    (D.funnel||[]).forEach(item=>{
      const pct = ((parseFloat(item.llegaron)||0)/maxF*100).toFixed(1);
      const lp = ((parseFloat(item.pctPerd)||0)*100).toFixed(0);
      fd.innerHTML += `<div class="f-row${item.isWon?' won':''}"><div class="f-lbl">${item.etapa}</div><div class="f-track"><div class="f-fill" style="width:${pct}%"></div></div><div class="f-nums">${fN(item.llegaron)} <span class="f-badge">${lp}% drop</span></div></div>`;
    });
    panel.appendChild(sec('Conversion Pipeline', fd));
  }
  else if (activeTab === 'retention') {
    panel.appendChild(pageHeader('Retention & Community', 'Fidelización y Bajas'));
    const tw = document.createElement('div'); tw.className = 'tw';
    let h2 = '<table><thead><tr><th>Causa</th><th style="text-align:left">Tipo</th><th>Q 2025</th><th>Q 2026</th><th>N 2025</th><th>N 2026</th><th>OS 2026</th></tr></thead><tbody>';
    (D.withdrawals||[]).forEach(w=>{
      h2 += `<tr><td style="font-weight:500">${w.causa}</td><td style="text-align:left"><span class="tag" style="background:#fef3c7;color:#b45309">${w.tipo}</span></td><td class="r">${fN(w.q2025)}</td><td class="r" style="color:var(--red);font-weight:700">${fN(w.q2026)}</td><td class="r">${fN(w.n2025)}</td><td class="r" style="color:var(--navy);font-weight:700">${fN(w.n2026)}</td><td class="r" style="font-weight:700">${fN(w.tot2026)}</td></tr>`;
    });
    h2 += '</tbody></table>'; tw.innerHTML = h2;
    panel.appendChild(sec('Withdrawals by Cause', tw));
  }
  else if (activeTab === 'proyeccion') {
    panel.appendChild(pageHeader('Projection 2027', 'Simulador de escenarios'));
    if(!D.proyeccion) return;
    const totDiv = document.createElement('div'); totDiv.className = 'sim-totals';
    totDiv.innerHTML = `
      <div class="sim-card q" id="sim-q"><div class="sim-lbl">Quilmes 2027</div><div class="sim-val">--</div><div class="sim-fact">--</div><div class="sim-delta">--</div></div>
      <div class="sim-card n" id="sim-n"><div class="sim-lbl">North 2027</div><div class="sim-val">--</div><div class="sim-fact">--</div><div class="sim-delta">--</div></div>
      <div class="sim-card" id="sim-os"><div class="sim-lbl">One School 2027</div><div class="sim-val">--</div><div class="sim-fact">--</div><div class="sim-delta">--</div></div>
    `;
    panel.appendChild(totDiv);
    
    const ctrl = document.createElement('div'); ctrl.className = 'sim-controls';
    ctrl.innerHTML = `<span style="font-size:.62rem;font-weight:700;color:var(--gray);text-transform:uppercase;margin-right:10px">Escenario:</span><button class="sim-btn" onclick="applyScenario('reset')" style="background:var(--ink);color:white;border-color:var(--ink)">Tendencial</button><button class="sim-btn" onclick="applyScenario('opt')" style="color:var(--green);border-color:var(--green)">▲ Optimista +2</button><button class="sim-btn" onclick="applyScenario('cons')" style="color:var(--red);border-color:var(--red)">▼ Conservador -2</button>`;
    panel.appendChild(ctrl);

    const mkTable = (title, ck, rows, color) => {
      let ht = `<div style="margin-bottom:24px"><div style="font-size:1rem;font-weight:700;color:${color};margin-bottom:10px">${title}</div><div class="tw"><table><thead><tr><th>Grado</th><th class="r">Base 2026</th><th class="r">Proy. Base</th><th class="r" style="min-width:130px">Ajuste</th><th class="r">Final 2027</th><th class="r">Facturación</th></tr></thead><tbody>`;
      rows.forEach(r => {
        const key = ck+'_'+r.grado;
        ht += `<tr><td style="font-weight:700">${r.grado}</td><td class="r">${fN(r.base2026)}</td><td class="r">${fN(r.proy)}</td><td class="r"><div class="adj-wrap"><button class="adj-btn" onclick="simAdj['${key}']=(simAdj['${key}']||0)-1;document.getElementById('adj_${key}').value=simAdj['${key}'];updateSimDisplay()">-</button><input class="adj-input" id="adj_${key}" value="${simAdj[key]||0}" onchange="simAdj['${key}']=parseInt(this.value)||0;updateSimDisplay()"/><button class="adj-btn" onclick="simAdj['${key}']=(simAdj['${key}']||0)+1;document.getElementById('adj_${key}').value=simAdj['${key}'];updateSimDisplay()">+</button></div></td><td class="r" style="font-weight:700;color:${color}" id="final_${key}">--</td><td class="r" style="color:var(--teal);font-weight:600" id="factrow_${key}">--</td></tr>`;
      });
      return ht + '</tbody></table></div></div>';
    };
    
    const tables = document.createElement('div');
    tables.innerHTML = (campus!=='n' ? mkTable('Quilmes - Ajuste por grado', 'q', D.proyeccion.quilmes, 'var(--red)') : '') + 
                       (campus!=='q' ? mkTable('North - Ajuste por grado', 'n', D.proyeccion.north, 'var(--navy)') : '');
    panel.appendChild(tables);
  }
  else if (activeTab === 'marketing') {
    panel.appendChild(pageHeader('Marketing', 'Pauta y App'));
    panel.appendChild(sec('Métricas Globales', buildGenericTable(D.rawMarketing)));
  }
  else if (activeTab === 'alumni') {
    panel.appendChild(pageHeader('Alumni', 'Egresados y Mentoring'));
    panel.appendChild(sec('Demographics', buildGenericTable(D.rawAlumni)));
  }

  main.appendChild(panel);
  if(activeTab === 'proyeccion') updateSimDisplay();
  buildSidebarNav();
}

function buildSidebarNav() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '<div class="sb-lbl">Navegación</div>';
  TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (tab.id === activeTab ? ' active' : '');
    btn.innerHTML = `<span>${tab.label}</span>`;
    btn.onclick = () => { activeTab = tab.id; render(); };
    nav.appendChild(btn);
  });
}

// Campus click
document.querySelectorAll('.campus-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    campus = btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
