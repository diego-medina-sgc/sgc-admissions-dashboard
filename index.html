<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SGC — Admissions Dashboard 2026</title>
<meta name="description" content="St. George's College Admissions Dashboard 2026"/>

<!-- Se flexibiliza la política de seguridad para permitir los scripts de Vercel y tus imágenes -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; img-src 'self' data: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://accounts.google.com https://apis.google.com https://va.vercel-scripts.com https://vercel.live https://script.google.com https://script.googleusercontent.com; frame-src https://accounts.google.com https://script.google.com https://script.googleusercontent.com;">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --ink:#1A1F35;--red:#DC1E33;--navy:#213463;
  --celeste:#6AB2E2;--violet:#6B6EB3;--teal:#109AA9;
  --cream:#F1EDE5;--paper:#EAE5DB;--gray:#6A655C;
  --line:#E6E1D6;--hairline:#EDE9E0;--white:#fff;
  --green:#15803d;--green-lt:#dcfce7;
  --amber:#b45309;--amber-lt:#fef3c7;
  --red-lt:#FBE9EB;--navy-lt:#E9ECF4;--ink-lt:#EDE8DE;
  --card-shadow:0 1px 2px rgba(40,33,28,.04),0 4px 14px rgba(40,33,28,.05);
  --r-sm:8px;--r:12px;--r-lg:16px;
  --sidebar-w:248px;--sidebar-collapsed:60px;--header-h:58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Asap',sans-serif;background:#F6F5F1;color:var(--ink);min-height:100vh;overflow-x:hidden;}
#loading{position:fixed;inset:0;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:900;transition:opacity .4s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-logo{width:180px;}
.load-ring{width:40px;height:40px;border:2.5px solid rgba(33,52,99,.15);border-top-color:#DC1E33;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Asap Condensed',sans-serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:#8888A8;font-weight:600;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 90% at 50% -10%,#FFFFFF 0%,#F4EFE7 52%,#E9E2D6 100%);}
.login-box{background:var(--white);border-radius:18px;box-shadow:0 1px 2px rgba(40,33,28,.04),0 18px 50px rgba(40,33,28,.12);padding:48px 46px 40px;border-top:4px solid var(--red);border-left:1px solid var(--hairline);border-right:1px solid var(--hairline);border-bottom:1px solid var(--hairline);max-width:430px;width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;}
.login-logo{width:208px;}
.login-rule{width:36px;height:2px;border-radius:2px;background:var(--red);}
.login-tagline{font-size:.86rem;color:var(--gray) !important;text-align:center;line-height:1.7;}
.login-tagline strong{display:block;color:var(--ink);font-size:.98rem;font-weight:600;margin-bottom:4px;letter-spacing:-.01em;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:var(--white);border:1.5px solid var(--line);border-radius:9px;font-family:'Asap',sans-serif;font-size:.9rem;font-weight:500;color:var(--ink);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;}
.btn-google:hover{border-color:var(--navy);background:#FCFBF9;box-shadow:0 4px 16px rgba(40,33,28,.1);}
#app{display:none;}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--white);border-bottom:1px solid var(--line);border-top:3px solid var(--red);display:flex;align-items:center;padding:0 16px 0 0;z-index:300;box-shadow:0 2px 8px rgba(33,52,99,.06);}
.hdr-brand{width:var(--sidebar-w);display:flex;align-items:center;gap:11px;padding:0 16px;flex-shrink:0;}
.hdr-logo{height:50px;width:auto;flex-shrink:0;}
.hdr-titles{display:none;}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.hdr-sub{font-size:.58rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.13em;text-transform:uppercase;margin-top:1px;}
.hdr-mid{flex:1;display:flex;align-items:center;gap:10px;padding-left:4px;}
.campus-group{display:flex;gap:5px;background:var(--cream);padding:3px;border-radius:22px;border:1px solid var(--line);}
.campus-btn{padding:5px 13px;border-radius:20px;border:1.5px solid transparent;background:transparent;font-family:'Asap',sans-serif;font-size:.73rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .18s;white-space:nowrap;}
.campus-btn:hover:not(.active){background:var(--white);color:var(--ink);}
.campus-btn[data-c="os"].active{background:var(--ink);border-color:var(--ink);color:#fff;}
.campus-btn[data-c="q"].active{background:var(--red);border-color:var(--red);color:#fff;}
.campus-btn[data-c="n"].active{background:var(--navy);border-color:var(--navy);color:#fff;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--paper);border:1px solid var(--line);font-size:.68rem;font-family:'Asap Condensed',sans-serif;color:var(--gray);font-weight:600;}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn-logout{background:none;border:1.5px solid var(--line);color:var(--gray);padding:5px 12px;border-radius:6px;font-size:.72rem;font-family:'Asap',sans-serif;cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--white);display:flex;flex-direction:column;z-index:200;border-right:1px solid var(--line);box-shadow:2px 0 14px rgba(40,33,28,.05);}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;overflow-x:hidden;}
.sb-lbl{font-size:.56rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#9C968B;padding:14px 10px 6px;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--gray);font-size:.82rem;font-weight:500;white-space:nowrap;transition:all .15s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--cream);color:var(--ink);}
.nav-item.active{background:var(--red-lt);color:var(--red);font-weight:700;padding-left:9px;box-shadow:inset 3px 0 0 var(--red);}
.nav-item.active svg{color:var(--red);}
.content{margin-top:var(--header-h);margin-left:var(--sidebar-w);min-height:calc(100vh - var(--header-h));}
.panel{display:none;padding:28px 32px;max-width:1520px;}
.panel.active{display:block;}
.sec{margin-bottom:36px;}
.sec-hd{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid transparent;background-image:linear-gradient(90deg,var(--campus-color,var(--ink)) 0%,transparent 100%);background-repeat:no-repeat;background-size:100% 1px;background-position:bottom;}
.sec-title{font-size:1.16rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.2;flex:0 0 auto;white-space:nowrap;}
.sec-meta{font-size:.65rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.07em;font-weight:600;}
.page-hd{margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.page-hd-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;}
.page-title{font-size:2.15rem;font-weight:700;letter-spacing:-.045em;color:var(--ink);line-height:1.08;}
.page-sub{font-size:.72rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.campus-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:.72rem;font-weight:700;font-family:'Asap Condensed',sans-serif;letter-spacing:.05em;}
.campus-badge.os{background:var(--ink-lt);color:var(--ink);}
.campus-badge.q{background:var(--red-lt);color:var(--red);}
.campus-badge.n{background:var(--navy-lt);color:var(--navy);}
.cb-dot{width:7px;height:7px;border-radius:50%;}
.campus-badge.os .cb-dot{background:var(--ink);}
.campus-badge.q .cb-dot{background:var(--red);}
.campus-badge.n .cb-dot{background:var(--navy);}
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));background:linear-gradient(120deg,#243a6e 0%,#1d2f5b 60%,#172548 100%);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 1px 2px rgba(23,37,72,.18),0 16px 38px rgba(23,37,72,.22);position:relative;}
.si{padding:22px 24px 20px;border-right:1px solid rgba(255,255,255,.1);text-align:center;}
.si:last-child{border-right:none;}
.si-lbl{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:10px;font-family:'Asap Condensed',sans-serif;}
.si-val{font-size:2.2rem;font-weight:700;color:#fff;line-height:.95;letter-spacing:-.05em;font-variant-numeric:tabular-nums;}
.si-val.neg{color:#ff7a88;} .si-val.pos{color:#5ee0a0;} .si-val.c-red{color:#ff7a88;} .si-val.c-navy{color:#9fc0ef;}
.si-foot{font-size:.66rem;color:rgba(255,255,255,.55);font-family:'Asap Condensed',sans-serif;margin-top:8px;}
.comm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.comm-card{background:var(--white);border:1px solid var(--hairline);border-top:3px solid var(--teal);border-radius:var(--r);padding:17px 18px;text-align:center;box-shadow:var(--card-shadow);}
.comm-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.comm-val{font-size:1.7rem;font-weight:700;color:var(--teal);letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.comm-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.cc{background:var(--white);border-radius:var(--r);padding:20px 22px 22px;box-shadow:var(--card-shadow);border:1px solid var(--hairline);}
.cc-hd{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--hairline);}
.cc-ttl{font-size:.92rem;font-weight:700;color:var(--ink);font-family:'Asap',sans-serif;display:flex;align-items:center;gap:9px;}
.cc-ttl::before{content:'';width:4px;height:15px;border-radius:3px;background:var(--campus-color,var(--navy));}
.cc-sub{font-size:.64rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;}
.chart-wrap{position:relative;} canvas{display:block;}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--hairline);box-shadow:var(--card-shadow);background:var(--white);}
.tw.scroll-y{max-height:420px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
thead{position:sticky;top:0;z-index:5;}
thead th{background:var(--ink);color:#fff;padding:11px 14px;text-align:center;font-weight:700;font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
thead th:first-child{text-align:left;}
.campus-q thead th{background:var(--red);} .campus-n thead th{background:var(--navy);}
thead th.th-q{background:var(--red) !important;} thead th.th-n{background:var(--navy) !important;}
tbody tr{border-bottom:1px solid var(--line);}
tbody tr.grp td{font-weight:700;font-size:.65rem;letter-spacing:.09em;text-transform:uppercase;padding:7px 14px;}
tbody tr.grp-q td{background:var(--red-lt);color:var(--red);}
tbody tr.grp-n td{background:var(--navy-lt);color:var(--navy);}
tbody tr.grp-k td{background:var(--ink-lt);color:var(--ink);}
tbody tr.tot td{font-weight:600;background:#F1EDE5;}
tbody tr.ctot td{font-weight:700;border-top:2px solid;}
tbody tr.ctot-q td{background:var(--red-lt);color:var(--red);border-top-color:var(--red);}
tbody tr.ctot-n td{background:var(--navy-lt);color:var(--navy);border-top-color:var(--navy);}
tbody tr.ctot-os td{background:var(--ink-lt);color:var(--ink);border-top-color:var(--ink);}
tbody tr.won-row td{background:#f0fdf4;font-weight:600;}
tbody tr.proj-row td{background:#FFFBEB;}
td{padding:9px 14px;} td:first-child{text-align:left !important;font-weight:500;}
td.r{text-align:center;font-family:'Asap Condensed',sans-serif;font-size:.77rem;font-variant-numeric:tabular-nums;}
td.c-q{color:var(--red);font-weight:600;} td.c-n{color:var(--navy);font-weight:600;}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.6rem;font-weight:700;font-family:'Asap Condensed',sans-serif;}
.tag.nat{background:var(--green-lt);color:var(--green);}
.tag.exo{background:var(--amber-lt);color:var(--amber);}
.tag.act{background:#fee2e2;color:#b91c1c;}
.badge-proj{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.57rem;font-weight:700;background:var(--amber-lt);color:var(--amber);margin-left:5px;}
.val-pos{color:var(--green);font-weight:600;} .val-neg{color:var(--red);font-weight:600;} .val-usd{color:var(--teal);font-weight:600;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.insight-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.insight{display:flex;align-items:center;gap:11px;background:var(--white);border-radius:10px;padding:12px 16px;flex:1;min-width:160px;box-shadow:var(--card-shadow);border:1px solid var(--hairline);}
.ins-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ins-icon.green{background:var(--green-lt);color:var(--green);}
.ins-icon.red{background:var(--red-lt);color:var(--red);}
.ins-icon.amber{background:var(--amber-lt);color:var(--amber);}
.ins-icon.teal{background:#ccfbf1;color:var(--teal);}
.ins-lbl{font-size:.62rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.ins-val{font-size:.92rem;font-weight:700;color:var(--ink);}
.funnel{display:flex;flex-direction:column;gap:6px;}
.f-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px 14px;}
.f-row.won{border-left:3px solid var(--teal);}
.f-lbl{font-size:.8rem;font-weight:500;min-width:180px;}
.f-track{flex:1;height:9px;background:var(--paper);border-radius:5px;}
.f-fill{height:100%;border-radius:5px;width:0%;transition:width .95s cubic-bezier(.4,0,.2,1);background:var(--ink);}
.campus-q .f-fill{background:var(--red);} .campus-n .f-fill{background:var(--navy);}
.f-row.won .f-fill{background:var(--teal) !important;}
.f-nums{font-family:'Asap Condensed',sans-serif;font-size:.71rem;color:var(--gray);min-width:165px;text-align:right;}
.f-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.62rem;font-weight:700;background:#fee2e2;color:#b91c1c;margin-left:4px;font-family:'Asap Condensed',sans-serif;}
.heatmap{overflow-x:auto;}
.hm-table{width:100%;border-collapse:collapse;font-size:.76rem;font-family:'Asap Condensed',sans-serif;}
.hm-table th{padding:6px 10px;font-weight:700;color:var(--gray);letter-spacing:.07em;text-align:center;}
.hm-table td{padding:7px 10px;text-align:center;font-weight:600;border:1px solid #F1EDE5;}
.hm-cell{border-radius:6px;padding:6px 10px;display:block;}
.sim-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.sim-card{background:var(--white);border-radius:12px;padding:18px 20px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--card-shadow);}
.sim-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ink);}
.sim-card.q::after{background:var(--red);} .sim-card.n::after{background:var(--navy);}
.sim-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.sim-val{font-size:2rem;font-weight:700;color:var(--ink);letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
.sim-fact{font-size:.8rem;font-weight:600;color:var(--teal);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-delta{font-size:.67rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-controls{display:flex;gap:6px;margin-bottom:18px;align-items:center;}
.sim-btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.68rem;font-weight:500;color:var(--gray);cursor:pointer;}
.sim-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff;}
.adj-wrap{display:flex;align-items:center;justify-content:center;gap:3px;}
.adj-btn{width:20px;height:20px;border:1px solid var(--line);border-radius:3px;background:var(--white);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
.adj-input{width:46px;text-align:center;border:1px solid var(--line);border-radius:3px;padding:2px 3px;}
footer{text-align:center;padding:14px 32px;font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.05em;border-top:1px solid var(--line);}

#main.campus-os{--campus-color:var(--navy);}
#main.campus-q{--campus-color:var(--red);}
#main.campus-n{--campus-color:var(--navy);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <img class="load-logo" src="logo-v.png" alt="SGC" width="180" height="127"/>
  <div class="load-ring"></div>
  <div class="load-txt">Cargando dashboard</div>
</div>

<!-- LOGIN -->
<div id="login-screen" role="main">
  <div class="login-box">
    <img class="login-logo" src="logo-v.png" alt="St George's College" width="220" height="155"/>
    <div class="login-rule"></div>
    <p class="login-tagline"><strong>Dashboard de Admisiones 2026</strong>Acceso restringido a cuentas autorizadas</p>
    <button class="btn-google" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Ingresar con Google
    </button>
  </div>
</div>

<!-- ACCESS DENIED -->
<div id="access-denied" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#F1EDE5;">
  <div class="login-box" style="text-align:center;gap:20px;">
    <img class="login-logo" src="logo-v.png" alt="St George's College" width="220" height="155"/>
    <div class="login-rule"></div>
    <div style="font-weight:700;font-size:1rem;color:#1A1F35;margin-bottom:6px">Acceso no autorizado</div>
    <div style="font-size:.82rem;color:#64748B;line-height:1.6">La cuenta <strong id="denied-email" style="color:#DC1E33"></strong><br>no tiene permisos para acceder a este dashboard.</div>
    <button class="btn-google" onclick="location.reload()">Volver al inicio</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="hdr">
    <div class="hdr-brand" id="hdr-brand">

// ¡PEGÁ TU URL DE APPS SCRIPT ACÁ!
const API_URL = 'https://script.google.com/macros/s/AKfycbx2Ad-6YTGwPTcXV2Q_Bs-dgDVsXGRwy4wR2h7uIvhGOMvgWK7G260IEDDd8prg97At/exec'; 
const CLIENT_ID = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';

const TABS=[

  {id:'marketing', label:'Marketing', icon:'<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'},
  {id:'alumni',    label:'Alumni', icon:'<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>'}
];

let tokenClient,accessToken,userEmail='',D={},campus='os',activeTab='resumen';
let charts={},simAdj={},showFact=true;

// ── AUTH ──
function initAuth(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'openid email profile',
    callback:async r=>{
      if(r.error){alert('Error de autenticación: '+r.error);return;}
      accessToken=r.access_token;
      try{
        const res=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
        const info=await res.json();
        userEmail=(info.email||'').toLowerCase().trim();
      }catch(ex){console.warn('userinfo error',ex);}
      
      document.getElementById('login-screen').style.display='none';
      document.getElementById('access-denied').style.display='none';
      document.getElementById('app').style.display='block';
      fetchData();

document.getElementById('btn-out').addEventListener('click',()=>location.reload());

// ── FETCH Y TRADUCTOR DE DATOS (EL FIX PRINCIPAL) ──
async function fetchData(){
  document.getElementById('loading').classList.remove('hidden');
  document.querySelector('.load-txt').textContent = 'Sincronizando datos...';

  const cb='sgcCb_'+Date.now();
  const url=API_URL+'?callback='+cb+'&t='+Date.now();

  const onSuccess=data=>{
    const raw = data.data || {};
    const getArr = (arr) => Array.isArray(arr) ? arr : [];
    
    // Función extractora blindada contra nombres de columna
    const findKPI = (arr, kpiName, col) => {
      const row = getArr(arr).find(r => String(r['KPI']||r['Causa']||r['Etapa']||r['Nivel']||r['Indicador']||'').toLowerCase() === String(kpiName).toLowerCase());
      return row ? (row[col] || 0) : 0;
    };

    // Pivoteador para dar vuelta la tabla de Enrollment Horizontal a Vertical
    const pivotEnrollment = (campusName) => {
      const rows = getArr(raw.exec_enroll).filter(r => String(r.Campus||'').toUpperCase() === campusName.toUpperCase());
      const getVal = (sec, yr) => { const r = rows.find(x => x['Sección'] === sec); return r ? (r[yr] || 0) : 0; };
      const years = ['2021', '2022', '2023', '2024', '2025*', '2026', '2027†'];
      return years.map(y => ({
        yr: y.replace('*','').replace('†',''),
        kinder: getVal('Kinder', y),
        prep: getVal('Prep', y),
        college: getVal('College', y),
        total: getVal('Total '+campusName, y) || getVal('Total', y),
        crec: 0
      })).reverse();
    };

    D = {
      lastUpdate: data.lastUpdate,
      headline: {
        total_alumnos: findKPI(raw.exec_head, 'Total Students 2026', 'One School'),
        variacion_anual: findKPI(raw.exec_head, 'Variación anual (vs 2025)', 'One School'),
        new_students: findKPI(raw.exec_head, 'New Students 2026', 'One School'),
        win_rate: findKPI(raw.exec_head, 'Conversion Rate 2026', 'One School'),
        prospectos: findKPI(raw.exec_head, 'Active Prospects 2026', 'One School'),
        retencion_quilmes: findKPI(raw.exec_head, 'Retention Rate 2026', 'Quilmes'),
        retencion_north: findKPI(raw.exec_head, 'Retention Rate 2026', 'North')
      },
      community: {
        ogQuilmes: findKPI(raw.exec_head, 'OG Parent Rate 2026', 'Quilmes'),
        ogNorth: findKPI(raw.exec_head, 'OG Parent Rate 2026', 'North'),
        foreignStudents: findKPI(raw.exec_head, 'International Students Rate 2026', 'One School'),
        priorityCommunity: (parseFloat(findKPI(raw.exec_comm, 'Priority Community (OG + Intl.)', 'Quilmes (#)')) + parseFloat(findKPI(raw.exec_comm, 'Priority Community (OG + Intl.)', 'North (#)'))) / (parseFloat(findKPI(raw.exec_head, 'Total Students 2026', 'One School')) || 1)
      },
      // Calcula los embudos sumando las columnas de pipeline 2026 y 2027
      funnel: ['Consultation', 'Doc. Request', 'Info. Meeting', 'Parents Interv.', 'Students Interv.', 'HM Approval', 'Place Offering'].map(s => ({
        etapa: s,
        llegaron: getArr(raw.adm_pipe).reduce((acc, r) => acc + (parseFloat(r[s])||0), 0),
        pctPerd: 0,
        isWon: s === 'Place Offering'
      })),
      pipeline: getArr(raw.adm_pipe).map(r => ({
        etapa: r['Nivel'] || '',
        qK: r['Consultation']||0, qP: r['Info. Meeting']||0, qC: r['Parents Interv.']||0, qT: r['TOTAL']||0,
        isWon: false
      })).filter(r => r.etapa),
      proyeccion: {
        quilmes: getArr(raw.proj).filter(r => r.Campus === 'Quilmes').map(r => ({
          grado: r['Grado'], proy: r['Proy. final'], facturacion: r['Facturación USD'], base2026: r['Base 2026']
        })).filter(r => r.grado && r.grado !== '—'),
        north: getArr(raw.proj).filter(r => r.Campus === 'North').map(r => ({
          grado: r['Grado'], proy: r['Proy. final'], facturacion: r['Facturación USD'], base2026: r['Base 2026']
        })).filter(r => r.grado && r.grado !== '—'),
        quilmesTotal: { alumnos: 0, facturacion: 0 },
        northTotal: { alumnos: 0, facturacion: 0 }
      },
      withdrawals: getArr(raw.ret_with).map(r => ({
        causa: r['Causa'], tipo: r['Tipo'],
        q2025: r['Q 2025']||0, q2026: r['Q 2026']||0, n2025: r['N 2025']||0, n2026: r['N 2026']||0, tot2025: 0, tot2026: r['Total 2026']||0
      })).filter(r => r.causa && r.causa !== 'Causa' && r.causa !== 'TOTAL'),
      resumen: {
        quilmes: pivotEnrollment('Quilmes'),
        north: pivotEnrollment('North'),
        oneSchool: pivotEnrollment('ONE SCHOOL')
      },
      winrate: getArr(raw.adm_hist).map(r => ({
        yr: r['Año'], pipeline: r['Pipeline Total']||0, won: r['WON']||0, wr: r['Conversion Rate']||0
      })),
      
      // Datos directos para tablas de nuevas solapas
      rawMarketing: getArr(raw.mkt_health),
      rawAlumni: getArr(raw.alumni)
    };

    if(data.allowedEmails && data.allowedEmails.length > 0){
      if(!data.allowedEmails.includes(userEmail)){
        document.getElementById('app').style.display='none';
        document.getElementById('access-denied').style.display='flex';
        document.getElementById('denied-email').textContent=userEmail;
        document.getElementById('loading').classList.add('hidden');
        return;
      }
    }

    const now = D.lastUpdate || new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('h-update').textContent = 'Actualizado: ' + now;
    document.getElementById('f-time').textContent = now;
    
    initSimAdj(); 
    render();
    
    document.getElementById('loading').classList.add('hidden');
    delete window[cb];
  };

  const onError=()=>{
    delete window[cb];
    alert("Error de conexión al cargar datos.");
    document.getElementById('loading').classList.add('hidden');
  };

  window[cb]=onSuccess;
  const s=document.createElement('script');s.id='_jp';
  s.src=url;
  const guard=setTimeout(()=>{if(window[cb])onError();},15000);
  s.onload=()=>clearTimeout(guard);
  s.onerror=()=>{clearTimeout(guard);onError();};
  document.head.appendChild(s);
}

// ── FORMAT Y HELPERS ──
const escHtml=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fN=v=>{if(v===null||v===undefined||v===''||v==='—')return'--';const n=parseFloat(v);if(isNaN(n))return String(v);return Math.round(n).toLocaleString('es-AR');};
const fP=v=>{if(v===null||v===undefined||v==='')return'--';const n=parseFloat(v);if(isNaN(n))return String(v);return(n*100).toFixed(1)+'%';};
const fCrp=v=>{if(!v&&v!==0)return'--';const n=parseFloat(v)*100;if(isNaN(n))return'--';const s=Math.abs(n).toFixed(2)+'%';return n<0?'<span class="val-neg">▼ '+s+'</span>':'<span class="val-pos">▲ '+s+'</span>';};
const fUSD=v=>{if(!v&&v!==0)return'--';const n=parseFloat(v);if(isNaN(n))return'--';return'$'+Math.round(n).toLocaleString('en-US');};

const CC={os:{main:'#1A1F35'},q:{main:'#DC1E33'},n:{main:'#213463'}};

// ── SIMULATOR ──
function initSimAdj(){
  simAdj={};
  if(!D.proyeccion) return;
  (D.proyeccion.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=0;});
  (D.proyeccion.north||[]).forEach(r=>{simAdj['n_'+r.grado]=0;});
}
function calcSimTotal(ck){
  const rows = ck==='q' ? D.proyeccion.quilmes : D.proyeccion.north;
  let alumnos=0,factAdj=0, base=0;
  (rows||[]).forEach(r=>{
    const key=ck+'_'+r.grado;
    const adj=simAdj[key]||0;
    const proy=parseFloat(r.proy)||0;
    const b26=parseFloat(r.base2026)||0;
    const factPerAlumno=proy>0?(parseFloat(r.facturacion)||0)/proy:0;
    alumnos+=Math.round(proy+adj);
    base+=b26;
    factAdj+=factPerAlumno*(proy+adj);
  });
  return{base:base,final:alumnos,facturacion:factAdj};
}
window.applyScenario = function(type){
  if(!D.proyeccion) return;
  if(type==='reset')initSimAdj();
  else if(type==='opt'){
    (D.proyeccion.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=2;});
    (D.proyeccion.north||[]).forEach(r=>{simAdj['n_'+r.grado]=1;});
  }
  else if(type==='cons'){
    (D.proyeccion.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=-2;});
    (D.proyeccion.north||[]).forEach(r=>{simAdj['n_'+r.grado]=-1;});
  }
  updateSimDisplay();
};
window.updateSimDisplay = function(){
  if(!D.proyeccion) return;
  [...(D.proyeccion.quilmes||[]).map(r=>({key:'q_'+r.grado})),...(D.proyeccion.north||[]).map(r=>({key:'n_'+r.grado}))].forEach(({key})=>{
    const el=document.getElementById('adj_'+key);if(el)el.value=simAdj[key]||0;
  });
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;
  const setCard=(id,final,base,fact)=>{
    const el=document.getElementById(id);if(!el)return;
    el.querySelector('.sim-val').textContent=Math.round(final).toLocaleString('es-AR');
    if(showFact)el.querySelector('.sim-fact').textContent=fUSD(fact)+' USD';
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    el.querySelector('.sim-delta').innerHTML='vs base '+fN(base)+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span>';
  };
  setCard('sim-q',qT.final,qT.base,qT.facturacion);
  setCard('sim-n',nT.final,nT.base,nT.facturacion);
  setCard('sim-os',osFinal,osBase,osFact);
  
  ['q','n'].forEach(ck=>{
    const rows=ck==='q'?D.proyeccion.quilmes:D.proyeccion.north;
    let tProy=0,tFinal=0,tFact=0;
    rows.forEach(r=>{
      const key = ck+'_'+r.grado;
      const proy=parseFloat(r.proy)||0;
      const adj=simAdj[key]||0;
      const el=document.getElementById('final_'+key);
      if(el)el.textContent=Math.round(proy+adj).toLocaleString('es-AR');
      const felt=document.getElementById('factrow_'+key);
      if(felt&&showFact) felt.textContent=proy>0?fUSD(r.facturacion/proy*(proy+adj)):'--';
      tProy+=proy; tFinal+=Math.round(proy+adj);
      if(proy>0)tFact+=r.facturacion/proy*(proy+adj);
    });
    const elP=document.getElementById('tot-proy-'+ck);if(elP)elP.textContent=fN(tProy);
    const elF=document.getElementById('tot-final-'+ck);if(elF)elF.textContent=tFinal.toLocaleString('es-AR');
    const elFact=document.getElementById('tot-fact-'+ck);if(elFact&&showFact)elFact.textContent=fUSD(tFact);
  });
};

// ── RENDER Y VISTAS ──
function render(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const main=document.getElementById('main');main.innerHTML='';
  main.className='campus-'+campus;
  TABS.forEach(function(tab){
    const panel=document.createElement('div');
    panel.className='panel'+(tab.id===activeTab?' active':'');
    panel.id='panel-'+tab.id;
    const content=buildPanel(tab.id);
    if(content)panel.appendChild(content);
    main.appendChild(panel);
  });
  setTimeout(()=>{document.querySelectorAll('.f-fill').forEach(el=>{const w=el.dataset.w;if(w)el.style.width=w+'%';});},100);
  buildSidebarNav();drawCharts();
}

function buildPanel(id){
  switch(id){
    case'resumen':return buildResumen();
    case'kpis':return buildKpis();
    case'pipeline':return buildPipeline();
    case'cohort':return buildCohort();
    case'proyeccion':return buildProyeccion();
    case'marketing':return buildMarketing();
    case'alumni':return buildAlumni();
  }
}

function pageHeader(title,sub){
  const d=document.createElement('div');d.className='page-hd';
  const campusName=campus==='os'?'One School':campus==='q'?'Quilmes':'North';
  d.innerHTML='<div class="page-hd-inner"><div><div class="page-title">'+title+'</div><div class="page-sub">'+sub+'</div></div><div class="campus-badge '+campus+'"><span class="cb-dot"></span>'+campusName+'</div></div>';
  return d;
}
function sec(title,meta,content){
  const s=document.createElement('div');s.className='sec';
  s.innerHTML='<div class="sec-hd"><span class="sec-title">'+title+'</span>'+(meta?'<span class="sec-meta">'+meta+'</span>':'')+'</div>';
  if(content) s.appendChild(content);
  return s;
}

// Tablas genéricas (Ahora devuelven Nodes reales, arreglando el error del click)
function buildGenericTableNode(data2D) {
  const wrap = document.createElement('div'); 
  wrap.className = 'tw scroll-y';
  
  if (!data2D || data2D.length < 1) {
    wrap.innerHTML = '<p style="padding:15px; color:var(--gray)">No hay datos disponibles.</p>';
    return wrap;
  }
  
  let html = '<table><thead><tr>';
  Object.keys(data2D[0]).forEach(h => html += `<th>${escHtml(h)}</th>`);
  html += '</tr></thead><tbody>';
  data2D.forEach(row => {
    html += '<tr>';
    Object.values(row).forEach((val, idx) => {
      let fVal = val;
      if (typeof fVal === 'number') fVal = (fVal % 1 === 0) ? fVal.toLocaleString('es-AR') : fVal.toFixed(2);
      html += `<td class="${idx > 0 ? 'r' : ''}">${escHtml(fVal)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html; 
  return wrap;
}

function buildMarketing() {
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Marketing', 'Fidu App KPIs'));
  wrap.appendChild(sec('Métricas', '', buildGenericTableNode(D.rawMarketing)));
  return wrap;
}

function buildAlumni() {
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Alumni', 'Métricas de Egresados'));
  wrap.appendChild(sec('Demographics & KPIs', '', buildGenericTableNode(D.rawAlumni)));
  return wrap;
}

function buildResumen(){
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Executive Summary', 'Panorama general 2026'));

  const h=D.headline||{};

  const wrPct=(parseFloat(h.win_rate)||0)*100;

    {icon:'<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',cls:varN>=0?'green':'red',lbl:'Anual Var.',val:(varN>=0?'▲ ':'▼ ')+Math.abs(varN).toFixed(2)+'%'},
    {icon:'<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',cls:'amber',lbl:'New Students',val:fN(h.new_students)},
    {icon:'<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',cls:'teal',lbl:'Conv. Rate',val:wrPct.toFixed(1)+'%'},

  statItems.forEach(s=>{

  });
  wrap.appendChild(sec('Headline KPIs', '', strip));

  if(D.community){
    const cg=document.createElement('div');cg.className='comm-grid';
    [{lbl:'OG Quilmes',val:fP(D.community.ogQuilmes),foot:'Parents'},
     {lbl:'OG North',val:fP(D.community.ogNorth),foot:'Parents'},
     {lbl:'Int. Students',val:fP(D.community.foreignStudents),foot:'One School'},
     {lbl:'Priority Comm.',val:fP(D.community.priorityCommunity),foot:'OG + Intl.',lead:true},
    ].forEach(c=>{cg.innerHTML+='<div class="comm-card'+(c.lead?' lead':'')+'" '+(c.lead?'style="box-shadow: 0 0 0 1px rgba(16,154,169,.4)"':'')+'><div class="comm-lbl">'+c.lbl+'</div><div class="comm-val">'+c.val+'</div><div class="comm-foot">'+c.foot+'</div></div>';});
    wrap.appendChild(sec('Community Indicators', '', cg));
  }

  const re=D.resumen;
  if(re && re.quilmes && re.quilmes.length > 0){
    const tw=document.createElement('div');tw.className='tw';
    const years=['2027', '2026', '2025', '2024', '2023', '2022', '2021'];
    let h2='<table><thead><tr><th>Año</th>';
    if(campus==='os'||campus==='q')h2+='<th class="r th-q">Q-K</th><th class="r th-q">Q-P</th><th class="r th-q">Q-C</th><th class="r th-q">Q Total</th>';
    if(campus==='os'||campus==='n')h2+='<th class="r th-n">N-K</th><th class="r th-n">N-P</th><th class="r th-n">N-C</th><th class="r th-n">N Total</th>';
    if(campus==='os')h2+='<th class="r">OS Total</th>';
    h2+='</tr></thead><tbody>';
    years.forEach(yr=>{
      const isP=yr==='2027';
      const q=(re.quilmes||[]).find(r=>r.yr===yr)||{};
      const n=(re.north||[]).find(r=>r.yr===yr)||{};
      const os=(re.oneSchool||[]).find(r=>r.yr===yr)||{};
      h2+='<tr class="'+(isP?'proj-row':'')+'"><td style="font-weight:700">'+yr+(isP?'<span class="badge-proj">proj.</span>':'')+'</td>';
      if(campus==='os'||campus==='q')h2+='<td class="r c-q">'+fN(q.kinder)+'</td><td class="r c-q">'+fN(q.prep)+'</td><td class="r c-q">'+fN(q.college)+'</td><td class="r c-q" style="font-weight:700">'+fN(q.total)+'</td>';
      if(campus==='os'||campus==='n')h2+='<td class="r c-n">'+fN(n.kinder)+'</td><td class="r c-n">'+fN(n.prep)+'</td><td class="r c-n">'+fN(n.college)+'</td><td class="r c-n" style="font-weight:700">'+fN(n.total)+'</td>';
      if(campus==='os')h2+='<td class="r" style="font-weight:700">'+fN(os.total)+'</td>';
      h2+='</tr>';
    });
    h2+='</tbody></table>';tw.innerHTML=h2;
    wrap.appendChild(sec('Enrolment Evolution 2021–2027', 'Historical + Proyección', tw));

    const two=document.createElement('div');two.className='two';
    const cc1=document.createElement('div');cc1.className='cc';
    cc1.innerHTML='<div class="cc-hd"><div><div class="cc-ttl">Enrolment</div><div class="cc-sub">Bars + Proyección</div></div></div><div class="chart-wrap"><canvas id="chart-enrol" height="200"></canvas></div>';
    const cc2=document.createElement('div');cc2.className='cc';
    cc2.innerHTML='<div class="cc-hd"><div><div class="cc-ttl">Quilmes vs North</div><div class="cc-sub">Evolución de matrícula</div></div></div><div class="chart-wrap"><canvas id="chart-qn" height="200"></canvas></div>';
    two.appendChild(cc1);two.appendChild(cc2);
    wrap.appendChild(two);
  }
  return wrap;
}

function buildPipeline(){
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Pipeline & Conversion Rate', 'Embudo de conversión e histórico'));

  const tw=document.createElement('div');tw.className='tw';
  let h='<table><thead><tr><th>Etapa</th>';
  if(campus==='os')h+='<th class="r th-q">Q-K</th><th class="r th-q">Q-P</th><th class="r th-q">Q-C</th><th class="r th-q">Q Tot</th><th class="r th-n">N-K</th><th class="r th-n">N-P</th><th class="r th-n">N-C</th><th class="r th-n">N Tot</th><th class="r">One School</th>';
  else h+='<th class="r">Kinder</th><th class="r">Prep</th><th class="r">College</th><th class="r">Total</th>';
  h+='</tr></thead><tbody>';
  (D.pipeline||[]).forEach(p=>{
    h+='<tr><td style="font-weight:400">'+escHtml(p.etapa)+'</td>';
    if(campus==='os')h+='<td class="r c-q">'+fN(p.qK)+'</td><td class="r c-q">'+fN(p.qP)+'</td><td class="r c-q">'+fN(p.qC)+'</td><td class="r c-q" style="font-weight:700">'+fN(p.qT)+'</td><td class="r c-n">--</td><td class="r c-n">--</td><td class="r c-n">--</td><td class="r c-n" style="font-weight:700">--</td><td class="r" style="font-weight:700">'+fN(p.qT)+'</td>';
    else if(campus==='q')h+='<td class="r">'+fN(p.qK)+'</td><td class="r">'+fN(p.qP)+'</td><td class="r">'+fN(p.qC)+'</td><td class="r" style="font-weight:700">'+fN(p.qT)+'</td>';
    else h+='<td class="r">--</td><td class="r">--</td><td class="r">--</td><td class="r" style="font-weight:700">--</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';tw.innerHTML=h;
  wrap.appendChild(sec('Active Pipeline', 'Prospectos activos por nivel', tw));

  const two=document.createElement('div');two.className='two';
  const tw2=document.createElement('div');tw2.className='tw';
  let h2='<table><thead><tr><th>Año</th><th class="r">Pipeline</th><th class="r">Won</th><th class="r">Conv. Rate</th></tr></thead><tbody>';
  (D.winrate||[]).forEach(r=>{
    const wr=(parseFloat(r.wr)||0)*100;
    const cls=wr>=15?'val-pos':wr<8?'val-neg':'';
    h2+='<tr><td style="font-weight:700">'+r.yr+'</td><td class="r">'+fN(r.pipeline)+'</td><td class="r">'+fN(r.won)+'</td><td class="r"><span class="'+cls+'">'+fP(r.wr)+'</span></td></tr>';
  });
  h2+='</tbody></table>';tw2.innerHTML=h2;
  const cc=document.createElement('div');cc.className='cc';
  cc.innerHTML='<div class="cc-hd"><div><div class="cc-ttl">Conversion Rate History</div><div class="cc-sub">Pipeline vs Won vs Conv.%</div></div></div><div class="chart-wrap"><canvas id="chart-wr" height="200"></canvas></div>';
  two.appendChild(tw2);two.appendChild(cc);
  wrap.appendChild(sec('Historical Conversion Rate', '2021-2026', two));

  const fd=document.createElement('div');fd.className='funnel';
  const maxF=Math.max(...(D.funnel||[]).map(x=>parseFloat(x.llegaron)||0),1);
  (D.funnel||[]).forEach(item=>{
    const pct=((parseFloat(item.llegaron)||0)/maxF*100);
    const div=document.createElement('div');
    div.className='f-row'+(item.isWon?' won':'');
    div.innerHTML='<div class="f-lbl">'+escHtml(item.etapa)+'</div><div class="f-track"><div class="f-fill" data-w="'+pct.toFixed(1)+'"></div></div><div class="f-nums">'+fN(item.llegaron)+'</div>';
    fd.appendChild(div);
  });
  wrap.appendChild(sec('Conversion Pipeline', 'Volumen por etapa', fd));
  return wrap;
}

function buildCohort(){
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Cohort Retention', 'Retención Histórica'));
  const msg = document.createElement('div');
  msg.innerHTML = '<p style="color:var(--gray); padding:10px"><i>Datos por cohorte no provistos en la exportación (Pestaña CALC_cohort_rates incluye tasas de transición, no heatmap).</i></p>';

function buildProyeccion(){
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader('Projection 2027', 'Simulador de escenarios por grado'));

  const py=D.proyeccion;
  if(!py || (!py.quilmes.length && !py.north.length)){const p=document.createElement('p');p.textContent='Datos no disponibles.';wrap.appendChild(p);return wrap;}

  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;

  const totDiv=document.createElement('div');totDiv.className='sim-totals';
  const mkCard=(id,cls,label,final,base,fact)=>{
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    return'<div class="sim-card '+cls+'" id="'+id+'"><div class="sim-lbl">'+label+'</div><div class="sim-val">'+Math.round(final).toLocaleString('es-AR')+'</div>'+(showFact?'<div class="sim-fact">'+fUSD(fact)+' USD</div>':'<div class="sim-fact" style="visibility:hidden">&ndash;</div>')+'<div class="sim-delta">vs base '+fN(base)+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span></div></div>';
  };
  totDiv.innerHTML=mkCard('sim-q','q','Quilmes 2027',qT.final,qT.base,qT.facturacion)+mkCard('sim-n','n','North 2027',nT.final,nT.base,nT.facturacion)+mkCard('sim-os','','One School 2027',osFinal,osBase,osFact);
  wrap.appendChild(totDiv);

  const ctrl=document.createElement('div');ctrl.className='sim-controls';
  ctrl.innerHTML='<span style="font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);font-family:Asap Condensed,sans-serif;margin-right:4px">Escenario:</span><button class="sim-btn primary" onclick="applyScenario(\'reset\')">Tendencial (base)</button><button class="sim-btn" onclick="applyScenario(\'opt\')" style="color:var(--green);border-color:var(--green)">▲ Optimista +2</button><button class="sim-btn" onclick="applyScenario(\'cons\')" style="color:var(--red);border-color:var(--red)">▼ Conservador −2</button>';
  wrap.appendChild(ctrl);

  const mkTable=(title,ck,rows,color)=>{
    if(!rows||!rows.length)return'';
    let h2='<div style="margin-bottom:24px"><div style="font-size:1rem;font-weight:700;color:'+color+';margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+'">'+title+'</div><div class="tw"><table><thead><tr><th>Grado</th><th class="r">Base 2026</th><th class="r">Proy. base</th><th class="r" style="min-width:130px">Ajuste</th><th class="r" style="min-width:90px">Final 2027</th>'+(showFact?'<th class="r fact-col">Facturación USD</th>':'')+'</tr></thead><tbody>';
    let totBase=0,totProy=0,totAdj=0,totFact=0;
    rows.forEach(r=>{
      const key=ck+'_'+r.grado;
      const adj=simAdj[key]||0;
      const proy=parseFloat(r.proy)||0;
      totBase+=parseFloat(r.base2026)||0;totProy+=proy;totAdj+=adj;
      if(proy>0)totFact+=r.facturacion/proy*(proy+adj);
      h2+='<tr><td style="font-weight:700">'+r.grado+'</td><td class="r">'+fN(r.base2026)+'</td><td class="r">'+fN(proy)+'</td><td class="r"><div class="adj-wrap"><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)-1;updateSimDisplay()">−</button><input class="adj-input" id="adj_'+key+'" value="'+adj+'" type="number" onchange="simAdj[\''+key+'\']=parseInt(this.value)||0;updateSimDisplay()"/><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)+1;updateSimDisplay()">+</button></div></td><td class="r" style="font-weight:700;color:'+color+'" id="final_'+key+'">'+Math.round(proy+adj).toLocaleString('es-AR')+'</td>'+(showFact?'<td class="r val-usd fact-col" id="factrow_'+key+'">'+(proy>0?fUSD(r.facturacion/proy*(proy+adj)):'--')+'</td>':'')+'</tr>';
    });
    const totFinal=totProy+totAdj;
    h2+='<tr class="tot"><td style="font-weight:700;text-align:left !important">TOTAL</td><td class="r">'+fN(totBase)+'</td><td class="r" id="tot-proy-'+ck+'">'+fN(totProy)+'</td><td class="r">&mdash;</td><td class="r" style="font-weight:700;color:'+color+'" id="tot-final-'+ck+'">'+Math.round(totFinal).toLocaleString('es-AR')+'</td>'+(showFact?'<td class="r val-usd fact-col" id="tot-fact-'+ck+'">'+fUSD(totFact)+'</td>':'')+'</tr>';
    h2+='</tbody></table></div></div>';
    return h2;
  };

  const tables=document.createElement('div');
  tables.innerHTML=(campus!=='n'?mkTable('Quilmes - Ajuste por grado','q',py.quilmes,'#DC1E33'):'')+(campus!=='q'?mkTable('North - Ajuste por grado','n',py.north,'#213463'):'');
  wrap.appendChild(tables);
  return wrap;
}

// ── CHARTS ──
function drawCharts(){
  Chart.defaults.font.family='Asap Condensed';Chart.defaults.color='#8C857A';
  Object.keys(charts).forEach(function(k){try{if(charts[k])charts[k].destroy();}catch(e){}});
  charts={};
  const C=CC[campus];
  const TTP={backgroundColor:'#213463',titleFont:{family:'Asap',size:12,weight:'700'},bodyFont:{family:'Asap Condensed',size:12},padding:14,cornerRadius:8,titleColor:'#fff',bodyColor:'rgba(255,255,255,.85)',displayColors:true,boxWidth:9,boxHeight:9,usePointStyle:true};
  
  const ec=document.getElementById('chart-enrol');
  if(ec&&D.resumen&&(D.resumen.quilmes||D.resumen.north)){
    const qA=[...(D.resumen.quilmes||[])].reverse();
    const nA=[...(D.resumen.north||[])].reverse();
    const spine=qA.length?qA:nA;
    const getLvl=(key)=>spine.map((row,i)=>{const q=qA[i]||{},n=nA[i]||{};if(campus==='q')return parseFloat(q[key])||0;if(campus==='n')return parseFloat(n[key])||0;return (parseFloat(q[key])||0)+(parseFloat(n[key])||0);});
    charts.enrol=new Chart(ec,{
      type:'bar',
      data:{
        labels:spine.map(r=>String(r.yr)+(r.yr==='2027'?' ▸':'')),
        datasets:[
          {label:'Kinder',data:getLvl('kinder'),backgroundColor:'#6AB2E2',stack:'s'},
          {label:'Prep',data:getLvl('prep'),backgroundColor:'#6B6EB3',stack:'s'},
          {label:'College',data:getLvl('college'),backgroundColor:'#213463',stack:'s',borderRadius:{topLeft:7,topRight:7}},
        ]
      },
      options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom'},tooltip:TTP},scales:{y:{stacked:true},x:{stacked:true,grid:{display:false}}}}
    });
  }

  const qnc=document.getElementById('chart-qn');
  if(qnc&&D.resumen){
    const qR=[...(D.resumen.quilmes||[])].reverse();
    const nR=[...(D.resumen.north||[])].reverse();
    charts.qn=new Chart(qnc,{type:'line',data:{labels:qR.map(r=>String(r.yr)),datasets:[
      {label:'Quilmes',data:qR.map(r=>parseFloat(r.total)||0),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.28)',tension:.4,fill:true,borderWidth:3,pointRadius:0},
      {label:'North',data:nR.map(r=>parseFloat(r.total)||0),borderColor:'#213463',backgroundColor:'rgba(33,52,99,.26)',tension:.4,fill:true,borderWidth:3,pointRadius:0},
    ]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom'},tooltip:TTP},scales:{y:{},x:{grid:{display:false}}}}});
  }

  const wrc=document.getElementById('chart-wr');
  if(wrc&&D.winrate){
    // Agrupamos el winrate por año general (o podemos usar el campus seleccionado)
    const labels=D.winrate.map(r=>String(r.yr));
    charts.wr=new Chart(wrc,{type:'bar',data:{labels,datasets:[
      {type:'bar',label:'Pipeline',data:D.winrate.map(f=>parseFloat(f.pipeline)||0),backgroundColor:'rgba(26,31,53,.24)',borderRadius:6,yAxisID:'y',order:3},
      {type:'bar',label:'Won',data:D.winrate.map(f=>parseFloat(f.won)||0),backgroundColor:'#109AA9',borderRadius:6,yAxisID:'y',order:2},
      {type:'line',label:'Conv. Rate',data:D.winrate.map(f=>+(parseFloat(f.wr)*100).toFixed(1)),borderColor:C.main,backgroundColor:'transparent',tension:.45,borderWidth:3,pointRadius:0,yAxisID:'y1',order:1},
    ]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom'},tooltip:TTP},scales:{y:{},y1:{position:'right',grid:{display:false},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}});
  }
}

// ── SIDEBAR NAV ──
function buildSidebarNav(){
  const nav=document.getElementById('sb-nav');
  nav.innerHTML='';
  const lbl=document.createElement('div');lbl.className='sb-lbl';lbl.innerHTML='Navigation';nav.appendChild(lbl);
  TABS.forEach(function(tab){
    const btn=document.createElement('button');
    btn.className='nav-item'+(tab.id===activeTab?' active':'');
    btn.innerHTML=tab.icon+'<span>'+tab.label+'</span>';
    btn.onclick=function(){
      activeTab=tab.id;
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    };
    nav.appendChild(btn);
  });
}

document.querySelectorAll('.campus-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    campus=btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b=>{b.classList.remove('active');});
    btn.classList.add('active');
    render();
  });
});

buildSidebarNav();
</script>
