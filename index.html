<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>St George's College — Admissions Dashboard 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Asap:wght@300;400;500;600;700&family=Asap+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --ink:#1A1F35; --red:#DC1E33; --navy:#213469;
      --celeste:#6AB2E2; --violet:#6B6EB3; --teal:#109AA9;
      --cream:#FAF7F2; --paper:#F0EDE6; --gray:#6B7180;
      --line:#E8E3DA; --white:#fff;
      --green:#15803d; --green-lt:#dcfce7;
      --amber:#b45309; --amber-lt:#fef3c7;
      --red-lt:#FEE8EB; --navy-lt:#E8EDF8; --ink-lt:#EEECEA;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Asap',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);}
    .login-box{background:var(--white);border-radius:8px;box-shadow:0 8px 48px rgba(26,31,53,.12);padding:48px 44px;max-width:400px;width:100%;display:flex;flex-direction:column;align-items:center;gap:24px;}
    .login-logo{width:140px;}
    .login-divider{width:100%;height:1px;background:var(--line);}
    .login-tagline{font-size:.83rem;color:var(--gray);text-align:center;line-height:1.6;}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 20px;background:var(--white);border:1.5px solid var(--line);border-radius:4px;font-family:'Asap',sans-serif;font-size:.9rem;font-weight:500;color:var(--ink);cursor:pointer;transition:border-color .15s,box-shadow .15s;}
    .btn-google:hover{border-color:var(--navy);box-shadow:0 4px 16px rgba(26,31,53,.10);}

    /* APP */
    #app{display:none;flex-direction:column;min-height:100vh;}

    /* HEADER */
    header{background:var(--white);padding:16px 40px 14px;display:flex;align-items:center;justify-content:space-between;}
    .h-brand{display:flex;align-items:center;gap:16px;}
    .h-logo{height:44px;width:auto;}
    .h-vline{width:1px;height:38px;background:var(--line);}
    .h-title{font-size:1.4rem;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.01em;}
    .h-sub{font-size:.62rem;color:var(--gray);letter-spacing:.14em;text-transform:uppercase;font-family:'Asap Condensed',sans-serif;margin-top:2px;}
    .h-right{display:flex;align-items:center;gap:10px;}
    .h-time{font-size:.67rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;}
    .btn-sm{background:none;border:1.5px solid var(--line);color:var(--gray);padding:5px 12px;border-radius:4px;font-size:.73rem;cursor:pointer;font-family:'Asap',sans-serif;font-weight:500;transition:all .15s;}
    .btn-sm:hover{border-color:var(--navy);color:var(--navy);}
    .btn-out{background:none;border:none;color:var(--gray);font-size:.72rem;cursor:pointer;font-family:'Asap',sans-serif;transition:color .15s;}
    .btn-out:hover{color:var(--red);}
    #btn-admin{display:none;}

    /* BRAND BAND */
    .brand-band{display:flex;height:3px;}
    .bb-red{flex:1;background:var(--red);}
    .bb-navy{flex:1;background:var(--navy);}

    /* NAV */
    .sticky-nav{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(26,31,53,.05);display:flex;align-items:stretch;justify-content:space-between;padding:0 40px;}
    .tab-group{display:flex;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;touch-action:pan-x;}
    .tab-group::-webkit-scrollbar{display:none;}
    .tab-btn{padding:11px 14px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Asap',sans-serif;font-size:.76rem;font-weight:500;color:var(--gray);cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px;flex-shrink:0;}
    .tab-btn:hover{color:var(--ink);}
    .tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:600;}
    .campus-group{display:flex;align-items:center;gap:6px;padding:8px 0 8px 18px;border-left:1px solid var(--line);flex-shrink:0;}
    .campus-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.74rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .2s;}
    .campus-btn[data-c="os"].active{background:var(--ink);border-color:var(--ink);color:var(--white);}
    .campus-btn[data-c="q"].active{background:var(--red);border-color:var(--red);color:var(--white);}
    .campus-btn[data-c="n"].active{background:var(--navy);border-color:var(--navy);color:var(--white);}

    /* ADMIN */
    #admin-panel{display:none;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 40px;flex-wrap:wrap;gap:8px;align-items:center;}
    #admin-panel.open{display:flex;}
    .adm-lbl{font-size:.63rem;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;font-family:'Asap Condensed',sans-serif;font-weight:700;margin-right:4px;}
    .pill{display:flex;align-items:center;gap:5px;background:var(--white);border:1.5px solid var(--line);border-radius:20px;padding:4px 11px;cursor:pointer;user-select:none;font-size:.71rem;color:var(--gray);font-family:'Asap',sans-serif;font-weight:500;transition:all .15s;}
    .pill.active{background:var(--ink);border-color:var(--ink);color:var(--white);}
    .pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;}

    /* CONTENT */
    main{flex:1;}
    .tab-panel{display:none;padding:28px 40px;max-width:1480px;margin:0 auto;}
    .tab-panel.active{display:block;}

    /* SECTION */
    .sec{margin-bottom:36px;}
    .sec-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line);}
    .sec-title{font-size:1.2rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
    .sec-meta{font-size:.67rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.06em;font-weight:500;}

    /* KPI CARDS */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
    .kpi-card{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:16px 18px 14px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,31,53,.05);transition:box-shadow .2s,transform .2s;}
    .kpi-card:hover{box-shadow:0 6px 20px rgba(26,31,53,.09);transform:translateY(-2px);}
    .kpi-card.accent::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
    .campus-q .kpi-card.accent::after{background:var(--red);}
    .campus-n .kpi-card.accent::after{background:var(--navy);}
    .campus-os .kpi-card.accent::after{background:var(--ink);}
    .kpi-lbl{font-size:.59rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--gray);margin-bottom:7px;font-family:'Asap Condensed',sans-serif;}
    .kpi-val{font-size:2rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:5px;letter-spacing:-.02em;}
    .kpi-val.neg{color:var(--red);}
    .kpi-val.pos{color:var(--green);}
    .kpi-val.c-red{color:var(--red);}
    .kpi-val.c-navy{color:var(--navy);}
    .kpi-foot{font-size:.63rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;font-weight:500;}

    /* STAT STRIP */
    .stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));background:var(--white);border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(26,31,53,.05);}
    .si{padding:16px 18px;border-right:1px solid var(--line);transition:background .12s;}
    .si:last-child{border-right:none;}
    .si:hover{background:#F7F4EE;}
    .si-lbl{font-size:.59rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;font-family:'Asap Condensed',sans-serif;}
    .si-val{font-size:1.65rem;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.02em;}
    .si-val.neg{color:var(--red);}
    .si-val.pos{color:var(--green);}
    .si-val.c-red{color:var(--red);}
    .si-val.c-navy{color:var(--navy);}
    .si-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}

    /* COMM CARDS */
    .comm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .comm-card{background:var(--white);border:1px solid var(--line);border-top:3px solid var(--teal);border-radius:8px;padding:14px 16px;}
    .comm-lbl{font-size:.59rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;font-family:'Asap Condensed',sans-serif;}
    .comm-val{font-size:1.55rem;font-weight:700;color:var(--teal);letter-spacing:-.02em;}
    .comm-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:2px;}

    /* TABLES */
    .tw{overflow-x:auto;border-radius:8px;border:1px solid var(--line);box-shadow:0 1px 4px rgba(26,31,53,.05);}
    table{width:100%;border-collapse:collapse;font-size:.79rem;background:var(--white);}

    /* Header default = ink */
    thead th{background:var(--ink);color:var(--white);padding:9px 13px;text-align:left;font-weight:700;font-size:.67rem;letter-spacing:.08em;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
    thead th.r{text-align:right;}

    /* Header por campus */
    .campus-q thead th{background:var(--red);}
    .campus-n thead th{background:var(--navy);}

    /* Header de sub-sección Q (rojo) dentro de One School */
    thead th.th-q{background:var(--red) !important;}
    thead th.th-n{background:var(--navy) !important;}

    tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr.grp td{font-weight:700;font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;padding:7px 13px;font-family:'Asap Condensed',sans-serif;}
    tbody tr.grp-q td{background:var(--red-lt);color:var(--red);}
    tbody tr.grp-n td{background:var(--navy-lt);color:var(--navy);}
    tbody tr.grp-k td{background:var(--ink-lt);color:var(--ink);}
    tbody tr.tot td{font-weight:600;background:#F5F2EC;}
    tbody tr.ctot td{font-weight:700;border-top:2px solid;}
    tbody tr.ctot-q td{background:var(--red-lt);color:var(--red);border-top-color:var(--red);}
    tbody tr.ctot-n td{background:var(--navy-lt);color:var(--navy);border-top-color:var(--navy);}
    tbody tr.ctot-os td{background:var(--ink-lt);color:var(--ink);border-top-color:var(--ink);}
    tbody tr.won-row td{background:#f0fdf4;font-weight:600;}
    tbody tr.proj-row td{background:#FFFBEB;}
    tbody tr:hover:not(.grp):not(.grp-q):not(.grp-n):not(.grp-k):not(.tot):not(.ctot):not(.ctot-q):not(.ctot-n):not(.ctot-os):not(.won-row):not(.proj-row){background:#F7F4EE;}
    td{padding:8px 13px;}
    td.r{text-align:right;font-family:'Asap Condensed',sans-serif;font-size:.77rem;}
    td.c-q{color:var(--red);font-weight:600;}
    td.c-n{color:var(--navy);font-weight:600;}
    .tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.61rem;font-weight:700;font-family:'Asap Condensed',sans-serif;}
    .tag.nat{background:var(--green-lt);color:var(--green);}
    .tag.exo{background:var(--amber-lt);color:var(--amber);}
    .tag.act{background:#fee2e2;color:#b91c1c;}
    .badge-proj{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.58rem;font-weight:700;background:var(--amber-lt);color:var(--amber);font-family:'Asap Condensed',sans-serif;margin-left:5px;}
    .val-pos{color:var(--green);font-weight:600;}
    .val-neg{color:var(--red);font-weight:600;}
    .val-usd{color:var(--teal);font-weight:600;font-family:'Asap Condensed',sans-serif;}

    /* LAYOUT */
    .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
    @media(max-width:900px){.two,.three{grid-template-columns:1fr;}.comm-grid{grid-template-columns:repeat(2,1fr);}}

    /* CHART CARD */
    .cc{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:20px 22px;}
    .cc-ttl{font-size:.65rem;font-weight:700;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;font-family:'Asap Condensed',sans-serif;}
    canvas{max-height:220px;}

    /* FUNNEL */
    .funnel{display:flex;flex-direction:column;gap:5px;}
    .f-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px 14px;cursor:default;transition:box-shadow .15s,transform .15s;}
    .f-row:hover{box-shadow:0 4px 16px rgba(26,31,53,.09);transform:translateX(4px);}
    .f-row.won{border-left:3px solid var(--teal);}
    .f-lbl{font-size:.8rem;font-weight:500;min-width:185px;}
    .f-track{flex:1;height:8px;background:var(--paper);border-radius:4px;overflow:hidden;}
    .f-fill{height:100%;background:var(--ink);border-radius:4px;width:0%;transition:width .9s cubic-bezier(.4,0,.2,1);}
    .campus-q .f-fill{background:var(--red);}
    .campus-n .f-fill{background:var(--navy);}
    .f-row.won .f-fill{background:var(--teal) !important;}
    .f-nums{font-family:'Asap Condensed',sans-serif;font-size:.71rem;color:var(--gray);min-width:170px;text-align:right;}
    .f-badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:.63rem;font-weight:700;background:#fee2e2;color:#b91c1c;margin-left:5px;font-family:'Asap Condensed',sans-serif;}
    .f-row.won .f-badge{background:var(--green-lt);color:var(--green);}

    /* SIMULATOR */
    .sim-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .sim-card{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px 16px;}
    .sim-lbl{font-size:.59rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;font-family:'Asap Condensed',sans-serif;}
    .sim-val{font-size:1.8rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
    .sim-fact{font-size:.78rem;font-weight:600;color:var(--teal);font-family:'Asap Condensed',sans-serif;margin-top:1px;}
    .sim-delta{font-size:.68rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:2px;}
    .sim-controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
    .sim-btn{padding:6px 13px;border-radius:4px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.74rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .15s;}
    .sim-btn:hover{border-color:var(--ink);color:var(--ink);}
    .sim-btn.primary{background:var(--ink);border-color:var(--ink);color:var(--white);}
    .adj-wrap{display:flex;align-items:center;gap:2px;}
    .adj-btn{width:20px;height:20px;border:1px solid var(--line);border-radius:3px;background:var(--white);cursor:pointer;font-size:.8rem;display:inline-flex;align-items:center;justify-content:center;color:var(--gray);transition:all .1s;font-weight:700;}
    .adj-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
    .adj-input{width:46px;text-align:center;border:1px solid var(--line);border-radius:3px;padding:2px 3px;font-family:'Asap Condensed',sans-serif;font-size:.75rem;color:var(--ink);background:var(--white);font-weight:600;}
    .adj-input:focus{outline:none;border-color:var(--ink);}

    /* LOADING */
    #loading{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .4s;}
    #loading.hidden{opacity:0;pointer-events:none;}
    .load-logo{width:100px;}
    .spin{width:28px;height:28px;border:2px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .load-txt{color:var(--gray);font-size:.7rem;font-family:'Asap Condensed',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-weight:700;}

    footer{text-align:center;padding:16px 40px;font-size:.62rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.05em;border-top:1px solid var(--line);margin-top:auto;}

    @media(max-width:768px){
      header{padding:12px 18px;}
      .h-logo{height:36px;}
      .h-title{font-size:1.1rem;}
      .sticky-nav{padding:0 14px;}
      .campus-group{padding-left:10px;gap:3px;}
      .campus-btn{padding:4px 9px;font-size:.68rem;}
      .tab-panel{padding:18px 14px;}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .stat-strip{grid-template-columns:repeat(2,1fr);}
      .si{border-bottom:1px solid var(--line);}
      .sim-totals{grid-template-columns:1fr;}
      #admin-panel{padding:10px 14px;}
    }
  </style>
</head>
<body>

<div id="loading">
  <img class="load-logo" src="logo.jpg" alt="SGC"/>
  <div class="spin"></div>
  <div class="load-txt">Cargando dashboard</div>
</div>

<div id="login-screen">
  <div class="login-box">
    <img class="login-logo" src="logo.jpg" alt="St George's College"/>
    <div class="login-divider"></div>
    <p class="login-tagline">Dashboard de Admisiones 2026<br>Acceso restringido a cuentas autorizadas</p>
    <button class="btn-google" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Ingresar con Google
    </button>
  </div>
</div>

<div id="app">
  <header>
    <div class="h-brand">
      <img class="h-logo" src="logo.jpg" alt="SGC"/>
      <div class="h-vline"></div>
      <div>
        <div class="h-title">Admissions Dashboard</div>
        <div class="h-sub">Analytics &middot; Mayo 2026</div>
      </div>
    </div>
    <div class="h-right">
      <span class="h-time" id="h-time"></span>
      <button class="btn-sm" id="btn-admin">Admin</button>
      <button class="btn-out" id="btn-out">Salir</button>
    </div>
  </header>
  <div class="brand-band"><div class="bb-red"></div><div class="bb-navy"></div></div>
  <div class="sticky-nav">
    <div class="tab-group" id="tab-group"></div>
    <div class="campus-group">
      <button class="campus-btn active" data-c="os">One School</button>
      <button class="campus-btn" data-c="q">Quilmes</button>
      <button class="campus-btn" data-c="n">North</button>
    </div>
  </div>
  <div id="admin-panel">
    <span class="adm-lbl">Secciones visibles</span>
    <div id="sec-toggles" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>
  <main id="main" class="campus-os"></main>
  <footer>St George's College &middot; Dashboard de Admisiones &middot; Datos en tiempo real &middot; <span id="f-time"></span></footer>
</div>

<script>
const CLIENT_ID   = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';
const API_URL     = 'https://script.google.com/macros/s/AKfycbyJDI5osYSQ4JpPB9ahuSz8EqU84HpQvoPDSkZo97FEuE2_s0avu4iSVQ1kfxVmrJODlg/exec';
const ADMIN_EMAIL = 'diego.medina@stgeorges.edu.ar';

// TABS: Pipeline ahora incluye Win Rate y Funnel
// KPIs ahora incluye Withdrawals
const TABS=[
  {id:'resumen',    label:'Resumen Ejecutivo'},
  {id:'kpis',       label:'KPIs 2026'},
  {id:'pipeline',   label:'Pipeline & Win Rate'},
  {id:'cohort',     label:'Cohort Retention'},

const fN=v=>{if(v===null||v===undefined||v==='')return '--';const n=parseFloat(v);if(isNaN(n))return String(v);return Math.round(n).toLocaleString('es-AR');};
const fP=v=>{if(v===null||v===undefined||v==='')return '--';const n=parseFloat(v);if(isNaN(n))return String(v);return(n*100).toFixed(1)+'%';};
const fV=v=>{if(v===null||v===undefined||v==='')return '--';const n=parseFloat(v);if(isNaN(n))return String(v);if(n>-2&&n<2&&String(v).includes('.'))return fP(n);return fN(n);};
const fCrp=v=>{if(!v&&v!==0)return '--';const n=parseFloat(v)*100;if(isNaN(n))return '--';const s=Math.abs(n).toFixed(2)+'%';return n<0?'<span class="val-neg">-'+s+'</span>':'<span class="val-pos">+'+s+'</span>';};
const fUSD=v=>{if(!v&&v!==0)return '--';const n=parseFloat(v);if(isNaN(n))return '--';return '$'+Math.round(n).toLocaleString('en-US');};

// CAMPUS
function getCampusData(){
  if(campus==='q')return D.quilmes;
  if(campus==='n')return D.north;
  const q=D.quilmes||{},n=D.north||{};
  const m=(a,b)=>({matricula:(parseFloat(a&&a.matricula)||0)+(parseFloat(b&&b.matricula)||0),ocupacion:null,vacantes:(parseFloat(a&&a.vacantes)||0)+(parseFloat(b&&b.vacantes)||0),retencion:null,new_students:(parseFloat(a&&a.new_students)||0)+(parseFloat(b&&b.new_students)||0),withdrawals:(parseFloat(a&&a.withdrawals)||0)+(parseFloat(b&&b.withdrawals)||0),prospectos:(parseFloat(a&&a.prospectos)||0)+(parseFloat(b&&b.prospectos)||0)});
  const mS=(sec,gr)=>{const r={total:m(q[sec]&&q[sec].total,n[sec]&&n[sec].total)};gr.forEach(g=>{r[g]=m(q[sec]&&q[sec][g],n[sec]&&n[sec][g]);});return r;};
  return{total:m(q.total,n.total),kinder:mS('kinder',['K1','K2','K3','K4','K5']),prep:mS('prep',['P1','P2','P3','P4','P5','P6']),college:mS('college',['C1','C2','C3','C4','C5','C6'])};
}
function getWRF(r){if(campus==='q')return{pipeline:r.qPipeline,won:r.qWon,wr:r.qWR};if(campus==='n')return{pipeline:r.nPipeline,won:r.nWon,wr:r.nWR};return{pipeline:r.osPipeline,won:r.osWon,wr:r.osWR};}
function getCohF(r){if(campus==='q')return{ing:r.qIngresaron,act:r.qActivos,ret:r.qRet,life:r.qLifespan};if(campus==='n')return{ing:r.nIngresaron,act:r.nActivos,ret:r.nRet,life:r.nLifespan};const i=(parseFloat(r.qIngresaron)||0)+(parseFloat(r.nIngresaron)||0);const a=(parseFloat(r.qActivos)||0)+(parseFloat(r.nActivos)||0);return{ing:i,act:a,ret:i>0?a/i:null,life:null};}

// SIMULATOR — usa datos del Sheet via D.proyeccion
function initSimAdj(){
  simAdj={};
  const py=D.proyeccion;
  if(!py)return;
  (py.quilmes||[]).forEach(r=>simAdj['q_'+r.grado]=0);
  (py.north||[]).forEach(r=>simAdj['n_'+r.grado]=0);
}
function calcSimTotal(ck){
  const py=D.proyeccion;if(!py)return{base:0,final:0,facturacion:0};
  const rows=ck==='q'?py.quilmes:py.north;
  const totRow=ck==='q'?py.quilmesTotal:py.northTotal;
  const baseFact=parseFloat((totRow||{}).facturacion)||0;
  let alumnos=0,factAdj=0;
  (rows||[]).forEach(r=>{
    const adj=simAdj['q_'+r.grado]||simAdj['n_'+r.grado]||0;
    const proy=parseFloat(r.proy)||0;
    const base2026=parseFloat(r.base2026)||0;
    const factPerAlumno=base2026>0?(parseFloat(r.facturacion)||0)/proy:0;
    alumnos+=Math.round(proy+adj);
    factAdj+=factPerAlumno*(proy+adj);
  });
  return{base:parseFloat((totRow||{}).alumnos)||0,final:alumnos,facturacion:factAdj,baseFact};
}
function applyScenario(type){
  const py=D.proyeccion;if(!py)return;
  if(type==='reset'){initSimAdj();}
  else if(type==='opt'){(py.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=2;});(py.north||[]).forEach(r=>{simAdj['n_'+r.grado]=1;});}
  else if(type==='cons'){(py.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=-2;});(py.north||[]).forEach(r=>{simAdj['n_'+r.grado]=-1;});}
  updateSimDisplay();
}
function updateSimDisplay(){
  const py=D.proyeccion;if(!py)return;
  [...(py.quilmes||[]).map(r=>({key:'q_'+r.grado})),...(py.north||[]).map(r=>({key:'n_'+r.grado}))].forEach(({key})=>{
    const el=document.getElementById('adj_'+key);if(el)el.value=simAdj[key]||0;
  });
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;
  const setCard=(id,final,base,fact)=>{
    const el=document.getElementById(id);if(!el)return;
    el.querySelector('.sim-val').textContent=Math.round(final).toLocaleString('es-AR');
    el.querySelector('.sim-fact').textContent=fUSD(fact)+' USD';
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    el.querySelector('.sim-delta').innerHTML='vs base '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span>';
  };
  setCard('sim-q',qT.final,qT.base,qT.facturacion);
  setCard('sim-n',nT.final,nT.base,nT.facturacion);
  setCard('sim-os',osFinal,osBase,osFact);
  // Celdas individuales
  [...(py.quilmes||[]).map(r=>({key:'q_'+r.grado,proy:parseFloat(r.proy)||0})),...(py.north||[]).map(r=>({key:'n_'+r.grado,proy:parseFloat(r.proy)||0}))].forEach(({key,proy})=>{
    const el=document.getElementById('final_'+key);
    if(el)el.textContent=Math.round(proy+(simAdj[key]||0)).toLocaleString('es-AR');
  });
}

  let h='<table><thead><tr><th>Etapa</th>';
  if(campus==='os')h+='<th class="r th-q">Q-K</th><th class="r th-q">Q-P</th><th class="r th-q">Q-C</th><th class="r th-q">Q Tot</th><th class="r th-n">N-K</th><th class="r th-n">N-P</th><th class="r th-n">N-C</th><th class="r th-n">N Tot</th><th class="r">One School</th>';
  else if(campus==='q')h+='<th class="r">Kinder</th><th class="r">Prep</th><th class="r">College</th><th class="r">Total</th>';
  else h+='<th class="r">Kinder</th><th class="r">Prep</th><th class="r">College</th><th class="r">Total</th>';
  h+='</tr></thead><tbody>';
  (D.pipeline||[]).forEach(p=>{
    h+='<tr class="'+(p.isWon?'won-row':'')+'"><td style="font-weight:'+(p.isWon?700:400)+'">'+p.etapa+'</td>';
    if(campus==='os')h+='<td class="r c-q">'+fN(p.qK)+'</td><td class="r c-q">'+fN(p.qP)+'</td><td class="r c-q">'+fN(p.qC)+'</td><td class="r c-q" style="font-weight:700">'+fN(p.qT)+'</td><td class="r c-n">'+fN(p.nK)+'</td><td class="r c-n">'+fN(p.nP)+'</td><td class="r c-n">'+fN(p.nC)+'</td><td class="r c-n" style="font-weight:700">'+fN(p.nT)+'</td><td class="r" style="font-weight:700">'+fN(p.total)+'</td>';
    else if(campus==='q')h+='<td class="r">'+fN(p.qK)+'</td><td class="r">'+fN(p.qP)+'</td><td class="r">'+fN(p.qC)+'</td><td class="r" style="font-weight:700">'+fN(p.qT)+'</td>';
    else h+='<td class="r">'+fN(p.nK)+'</td><td class="r">'+fN(p.nP)+'</td><td class="r">'+fN(p.nC)+'</td><td class="r" style="font-weight:700">'+fN(p.nT)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';tw.innerHTML=h;
  wrap.appendChild(sec('Pipeline Activo 2027','Foto del funnel en curso - Insightly',tw));

  // Win Rate
  const two=document.createElement('div');two.className='two';
  const tw2=document.createElement('div');tw2.className='tw';
  let h2='<table><thead><tr><th>Ano</th><th class="r">Pipeline</th><th class="r">Won</th><th class="r">Win Rate</th></tr></thead><tbody>';
  (D.winrate||[]).forEach(r=>{
    const f=getWRF(r);
    const wr=(parseFloat(f.wr)||0)*100;
    const cls=wr>10?'val-pos':wr<5?'val-neg':'';
    h2+='<tr><td style="font-weight:700">'+r.yr+'</td><td class="r">'+fN(f.pipeline)+'</td><td class="r">'+fN(f.won)+'</td><td class="r"><span class="'+cls+'">'+fP(f.wr)+'</span></td></tr>';
  });
  h2+='</tbody></table>';tw2.innerHTML=h2;
  const cc=document.createElement('div');cc.className='cc';
  cc.innerHTML='<div class="cc-ttl">Evolucion Win Rate %</div><canvas id="chart-wr"></canvas>';
  two.appendChild(tw2);two.appendChild(cc);
  wrap.appendChild(sec('Win Rate Historico','2021-2026',two));

  // Funnel
  const fd=document.createElement('div');fd.className='funnel';
  const maxF=Math.max(...(D.funnel||[]).map(x=>parseFloat(x.llegaron)||0));
  (D.funnel||[]).forEach(item=>{
    const pct=maxF>0?((parseFloat(item.llegaron)||0)/maxF*100):0;
    const lp=((parseFloat(item.pctPerd)||0)*100).toFixed(0);
    const div=document.createElement('div');
    div.className='f-row'+(item.isWon?' won':'');
    div.innerHTML='<div class="f-lbl">'+item.etapa+'</div><div class="f-track"><div class="f-fill" data-w="'+pct.toFixed(1)+'"></div></div><div class="f-nums">'+fN(item.llegaron)+' llegaron <span class="f-badge">'+lp+'% baja</span></div>';
    fd.appendChild(div);
  });
  wrap.appendChild(sec('Funnel de Conversion','Historico 2021-2026',fd));
  return wrap;
}

// ── COHORT ──
function buildCohort(){
  const wrap=document.createElement('div');
  const two=document.createElement('div');two.className='two';
  const tw=document.createElement('div');tw.className='tw';
  const ctotCls=campus==='q'?'ctot-q':campus==='n'?'ctot-n':'ctot-os';
  let h='<table><thead><tr><th>Cohorte</th><th class="r">Ingresaron</th><th class="r">Activos</th><th class="r">Retencion</th><th class="r">Lifespan (yr)</th></tr></thead><tbody>';
  (D.cohort||[]).forEach(r=>{
    const f=getCohF(r);
    const ret=(parseFloat(f.ret)||0)*100;
    const retCls=ret>=95?'val-pos':ret<85?'val-neg':'';
    h+='<tr><td style="font-weight:700">'+r.yr+'</td><td class="r">'+fN(f.ing)+'</td><td class="r">'+fN(f.act)+'</td><td class="r"><span class="'+retCls+'">'+fP(f.ret)+'</span></td><td class="r">'+(f.life?parseFloat(f.life).toFixed(1):'--')+'</td></tr>';
  });
  h+='</tbody></table>';tw.innerHTML=h;
  const cc=document.createElement('div');cc.className='cc';
  cc.innerHTML='<div class="cc-ttl">Retencion por Cohorte</div><canvas id="chart-cohort"></canvas>';
  two.appendChild(tw);two.appendChild(cc);
  wrap.appendChild(sec('Cohort Retention','Fidelizacion generacional - ISAMS',two));
  return wrap;
}

// ── PROYECCION ──
function buildProyeccion(){
  const wrap=document.createElement('div');
  const py=D.proyeccion;
  if(!py){const p=document.createElement('p');p.textContent='Datos de proyeccion no disponibles.';p.style.color='var(--gray)';p.style.fontFamily='Asap Condensed,sans-serif';wrap.appendChild(p);return sec('Proyeccion 2027','',wrap);}

  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;

  const totDiv=document.createElement('div');totDiv.className='sim-totals';
  const mkCard=(id,label,final,base,fact,color)=>{
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    return '<div class="sim-card" id="'+id+'" style="border-top:3px solid '+color+'"><div class="sim-lbl">'+label+'</div><div class="sim-val">'+Math.round(final).toLocaleString('es-AR')+'</div><div class="sim-fact">'+fUSD(fact)+' USD</div><div class="sim-delta">vs base '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span></div></div>';
  };
  totDiv.innerHTML=mkCard('sim-q','Quilmes 2027',qT.final,qT.base,qT.facturacion,'#DC1E33')+mkCard('sim-n','North 2027',nT.final,nT.base,nT.facturacion,'#213469')+mkCard('sim-os','One School 2027',osFinal,osBase,osFact,'#1A1F35');
  wrap.appendChild(totDiv);

  const ctrl=document.createElement('div');ctrl.className='sim-controls';
  ctrl.innerHTML='<span class="adm-lbl" style="margin-right:6px">Escenarios:</span><button class="sim-btn primary" onclick="applyScenario(\'reset\')">Tendencial (base)</button><button class="sim-btn" onclick="applyScenario(\'opt\')" style="border-color:#15803d;color:#15803d">Optimista +2</button><button class="sim-btn" onclick="applyScenario(\'cons\')" style="border-color:#DC1E33;color:#DC1E33">Conservador -2</button>';
  wrap.appendChild(ctrl);

  const mkTable=(title,ck,rows,color)=>{
    if(!rows||!rows.length)return'';
    let h2='<div style="margin-bottom:24px"><div style="font-size:1rem;font-weight:700;color:'+color+';margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)">'+title+'</div><div class="tw"><table><thead><tr><th>Grado</th><th class="r">Base 2026</th><th class="r">Proy. base</th><th class="r fact-col">Facturacion USD</th><th class="r" style="min-width:130px;text-align:center">Ajuste</th><th class="r" style="color:'+color+'">Final 2027</th></tr></thead><tbody>';
    rows.forEach(r=>{
      const key=ck+'_'+r.grado;
      const adj=simAdj[key]||0;
      const proy=parseFloat(r.proy)||0;
      h2+='<tr><td style="font-weight:700">'+r.grado+'</td><td class="r">'+fN(r.base2026)+'</td><td class="r">'+fN(proy)+'</td><td class="r val-usd fact-col">'+fUSD(r.facturacion)+'</td><td class="r"><div class="adj-wrap"><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)-1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">-</button><input class="adj-input" id="adj_'+key+'" value="'+adj+'" type="number" onchange="simAdj[\''+key+'\']=parseInt(this.value)||0;updateSimDisplay()"/><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)+1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">+</button></div></td><td class="r" style="font-weight:700;color:'+color+'" id="final_'+key+'" >'+Math.round(proy+adj).toLocaleString('es-AR')+'</td></tr>';
    });
    h2+='</tbody></table></div></div>';
    return h2;
  };

  const tables=document.createElement('div');
  tables.innerHTML=mkTable('Quilmes - Ajuste por grado','q',py.quilmes,'#DC1E33')+mkTable('North - Ajuste por grado','n',py.north,'#213469');
  wrap.appendChild(tables);
  return sec('Proyeccion 2027','Simulador de escenarios por grado',wrap);
}

// ── CHARTS ──
const TTP={backgroundColor:'rgba(26,31,53,.92)',titleFont:{family:'Asap',size:12,weight:'600'},bodyFont:{family:'Asap Condensed',size:11},padding:11,cornerRadius:5,titleColor:'#fff',bodyColor:'rgba(255,255,255,.8)',displayColors:true,boxWidth:8,boxHeight:8,usePointStyle:true};
const TCK={font:{family:'Asap Condensed',size:11},color:'#6B7180'};
const GRD={color:'rgba(232,227,218,.7)'};
function grad(ctx,r,g,b){const gr=ctx.createLinearGradient(0,0,0,200);gr.addColorStop(0,'rgba('+r+','+g+','+b+',.18)');gr.addColorStop(1,'rgba('+r+','+g+','+b+',.0)');return gr;}

function drawCharts(){
  Chart.defaults.font.family='Asap';Chart.defaults.color='#6B7180';
  const C=CC[campus];

  const ec=document.getElementById('chart-enrol');
  if(ec&&D.resumen&&D.resumen.oneSchool){
    const rows=[...D.resumen.oneSchool].reverse();
    charts.enrol=new Chart(ec,{type:'bar',data:{labels:rows.map(r=>String(r.yr)+(r.yr===2027?' (p)':'')),datasets:[{label:'Total',data:rows.map(r=>parseFloat(r.total)||0),backgroundColor:rows.map(r=>r.yr===2027?'rgba(220,30,51,.4)':'rgba(26,31,53,.72)'),borderRadius:5,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:TTP},scales:{y:{grid:GRD,ticks:TCK,border:{display:false}},x:{grid:{display:false},ticks:TCK,border:{display:false}}}}});
  }

  const qnc=document.getElementById('chart-qn');
  if(qnc&&D.resumen){
    const qR=[...(D.resumen.quilmes||[])].reverse();
    const nR=[...(D.resumen.north||[])].reverse();
    const ctx=qnc.getContext('2d');
    charts.qn=new Chart(qnc,{type:'line',data:{labels:qR.map(r=>String(r.yr)+(r.yr===2027?' (p)':'')),datasets:[
      {label:'Quilmes',data:qR.map(r=>parseFloat(r.total)||0),borderColor:'#DC1E33',backgroundColor:grad(ctx,220,30,51),tension:.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#DC1E33',pointBorderColor:'#fff',pointBorderWidth:2},
      {label:'North',data:nR.map(r=>parseFloat(r.total)||0),borderColor:'#213469',backgroundColor:grad(ctx,33,52,105),tension:.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#213469',pointBorderColor:'#fff',pointBorderWidth:2},
    ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Asap Condensed',size:11},color:'#6B7180',padding:16,usePointStyle:true,pointStyle:'circle',pointStyleWidth:6}},tooltip:TTP},scales:{y:{grid:GRD,ticks:TCK,border:{display:false}},x:{grid:{display:false},ticks:TCK,border:{display:false}}}}});
  }

  const wrc=document.getElementById('chart-wr');
  if(wrc&&D.winrate){
    const labels=D.winrate.map(r=>String(r.yr));
    const ctx=wrc.getContext('2d');
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.winrate.map(r=>+(parseFloat(r.qWR)*100).toFixed(1)),borderColor:'#DC1E33',backgroundColor:grad(ctx,220,30,51),tension:.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#DC1E33',pointBorderColor:'#fff',pointBorderWidth:2},
      {label:'North',data:D.winrate.map(r=>+(parseFloat(r.nWR)*100).toFixed(1)),borderColor:'#213469',backgroundColor:grad(ctx,33,52,105),tension:.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#213469',pointBorderColor:'#fff',pointBorderWidth:2},
    ]:[{label:campus==='q'?'Quilmes':'North',data:D.winrate.map(r=>campus==='q'?+(parseFloat(r.qWR)*100).toFixed(1):+(parseFloat(r.nWR)*100).toFixed(1)),borderColor:C.main,backgroundColor:grad(ctx,...(campus==='q'?[220,30,51]:[33,52,105])),tension:.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:C.main,pointBorderColor:'#fff',pointBorderWidth:2}];
    charts.wr=new Chart(wrc,{type:'line',data:{labels,datasets:ds},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Asap Condensed',size:11},color:'#6B7180',padding:16,usePointStyle:true,pointStyle:'circle',pointStyleWidth:6}},tooltip:TTP},scales:{y:{grid:GRD,ticks:{...TCK,callback:v=>v+'%'},border:{display:false}},x:{grid:{display:false},ticks:TCK,border:{display:false}}}}});
  }

  const coc=document.getElementById('chart-cohort');
  if(coc&&D.cohort){
    const labels=D.cohort.map(r=>String(r.yr));
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.cohort.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)),backgroundColor:'rgba(220,30,51,.72)',borderRadius:5,borderSkipped:false},
      {label:'North',data:D.cohort.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:'rgba(33,52,105,.72)',borderRadius:5,borderSkipped:false},
    ]:[{label:campus==='q'?'Quilmes':'North',data:D.cohort.map(r=>campus==='q'?+(parseFloat(r.qRet)*100).toFixed(1):+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:C.lt,borderRadius:5,borderSkipped:false}];
    charts.cohort=new Chart(coc,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Asap Condensed',size:11},color:'#6B7180',padding:16,usePointStyle:true,pointStyle:'circle',pointStyleWidth:6}},tooltip:TTP},scales:{y:{min:70,max:100,grid:GRD,ticks:{...TCK,callback:v=>v+'%'},border:{display:false}},x:{grid:{display:false},ticks:TCK,border:{display:false}}}}});
  }
}

// TABS
function buildTabNav(){
  const ctr=document.getElementById('tab-group');ctr.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const btn=document.createElement('button');btn.className='tab-btn'+(t.id===activeTab?' active':'');btn.textContent=t.label;
    btn.onclick=()=>{
      activeTab=t.id;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      const panel=document.getElementById('panel-'+t.id);
      if(panel){panel.classList.add('active');setTimeout(()=>{panel.querySelectorAll('.f-fill').forEach(el=>{const w=el.dataset.w;if(w)el.style.width=w+'%';});},80);}
    };
    ctr.appendChild(btn);
  });
}

// CAMPUS
document.querySelectorAll('.campus-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    campus=btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();
  });
});

// ADMIN
let showFact=true;
function buildAdmin(){
  const ctr=document.getElementById('sec-toggles');
  TABS.forEach(t=>{
    const p=document.createElement('div');p.className='pill active';
    p.innerHTML='<span class="dot"></span>'+t.label;
    p.onclick=()=>{sVis[t.id]=!sVis[t.id];p.classList.toggle('active',sVis[t.id]);if(!sVis[t.id]&&activeTab===t.id)activeTab=TABS.find(x=>sVis[x.id])?.id||TABS[0].id;render();};
    ctr.appendChild(p);
  });
  const fp=document.createElement('div');
  fp.className='pill active';
  fp.style.cssText='background:var(--teal);border-color:var(--teal);color:white;';
  fp.innerHTML='<span class="dot"></span>Facturacion USD';
  fp.onclick=()=>{
    showFact=!showFact;
    if(showFact){fp.style.cssText='background:var(--teal);border-color:var(--teal);color:white;';}
    else{fp.style.cssText='background:var(--white);border-color:var(--line);color:var(--gray);';}
    document.querySelectorAll('.sim-fact').forEach(el=>el.style.display=showFact?'':'none');
    document.querySelectorAll('.fact-col').forEach(el=>el.style.display=showFact?'':'none');
  };
  ctr.appendChild(fp);
}
document.getElementById('btn-admin').addEventListener('click',()=>document.getElementById('admin-panel').classList.toggle('open'));

// UI
function showApp(){document.getElementById('login-screen').style.display='none';const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';}
function showLoad(msg){const el=document.getElementById('loading');el.querySelector('.load-txt').textContent=msg||'Cargando...';el.classList.remove('hidden');}
function hideLoad(){document.getElementById('loading').classList.add('hidden');}

buildAdmin();buildTabNav();
window.onload=()=>{
  const t=setTimeout(()=>{hideLoad();document.getElementById('login-screen').style.display='flex';},10000);
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{clearTimeout(t);initAuth();};
  s.onerror=()=>{clearTimeout(t);hideLoad();document.getElementById('login-screen').style.display='flex';};
  document.head.appendChild(s);
};
</script>
