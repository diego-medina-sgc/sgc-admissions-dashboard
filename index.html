<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions Dashboard 2026 · St George's College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --red:#DC1E33; --blue:#213669; --blue-mid:#2d4a8a; --blue-lt:#eef1f8;
      --cream:#f5f3ef; --ink:#1c1c2e; --muted:#64748b; --border:#e2e5ee;
      --card:#ffffff; --green:#15803d; --green-lt:#dcfce7;
      --amber:#b45309; --amber-lt:#fef3c7;
      --r:4px; --sh:0 1px 6px rgba(33,54,105,.07); --sh2:0 4px 20px rgba(33,54,105,.11);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

    /* LOGIN */
    #login-screen{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--blue);
      background-image:
        radial-gradient(ellipse 60% 80% at 15% 60%, rgba(220,30,51,.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 85% 20%, rgba(255,255,255,.04) 0%, transparent 60%);
    }
    .login-box{display:flex;flex-direction:column;align-items:center;gap:32px;padding:56px 48px;max-width:400px;width:100%;}
    .login-isotipo{width:72px;height:72px;object-fit:contain;filter:brightness(0) invert(1);opacity:.9;}
    .login-title{font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.9rem;font-weight:600;letter-spacing:.04em;text-align:center;line-height:1.15;}
    .login-sub{font-size:.68rem;color:rgba(255,255,255,.38);letter-spacing:.2em;text-transform:uppercase;text-align:center;}
    .login-rule{width:28px;height:1px;background:var(--red);}
    .btn-google{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:#fff;border:none;border-radius:3px;padding:13px 28px;
      font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;color:var(--ink);
      cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.28);
      transition:transform .15s,box-shadow .15s;width:100%;
    }
    .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.36);}
    .login-note{font-size:.68rem;color:rgba(255,255,255,.28);text-align:center;letter-spacing:.03em;}

    /* APP */
    #app{display:none;flex-direction:column;min-height:100vh;}

    /* HEADER */
    header{
      background:var(--blue);height:56px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 28px;position:sticky;top:0;z-index:200;
      box-shadow:0 2px 12px rgba(0,0,0,.18);
    }
    .h-left{display:flex;align-items:center;gap:12px;}
    .h-logo{width:30px;height:30px;object-fit:contain;filter:brightness(0) invert(1);opacity:.85;}
    .h-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;letter-spacing:.04em;color:#fff;line-height:1;}
    .h-sub{font-size:.58rem;color:rgba(255,255,255,.38);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
    .h-right{display:flex;align-items:center;gap:10px;}
    .h-time{font-size:.65rem;color:rgba(255,255,255,.38);font-family:'DM Mono',monospace;}
    .btn-sm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.75);padding:5px 11px;border-radius:3px;font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
    .btn-sm:hover{background:rgba(255,255,255,.16);}
    .btn-out{background:none;border:none;color:rgba(255,255,255,.3);font-size:.7rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s;}
    .btn-out:hover{color:rgba(255,255,255,.65);}

    /* NAV BAR */
    .nav-bar{
      background:var(--blue);
      border-bottom:1px solid rgba(255,255,255,.07);
      padding:0 28px;
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:0;
    }
    .campus-group{display:flex;}
    .campus-btn{
      padding:11px 22px;background:none;border:none;
      font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;
      color:rgba(255,255,255,.42);cursor:pointer;
      border-bottom:2px solid transparent;
      transition:all .2s;letter-spacing:.03em;
    }
    .campus-btn:hover{color:rgba(255,255,255,.75);}
    .campus-btn.active{color:#fff;border-bottom-color:var(--red);}
    .tab-group{display:flex;}
    .tab-btn{
      padding:11px 16px;background:none;border:none;
      font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:400;
      color:rgba(255,255,255,.32);cursor:pointer;
      border-bottom:2px solid transparent;
      transition:all .2s;white-space:nowrap;
    }
    .tab-btn:hover{color:rgba(255,255,255,.6);}
    .tab-btn.active{color:rgba(255,255,255,.88);border-bottom-color:rgba(255,255,255,.28);}

    /* ADMIN */
    #admin-panel{display:none;background:#1a2d55;border-bottom:1px solid rgba(255,255,255,.07);padding:14px 28px;flex-wrap:wrap;gap:8px;align-items:center;}
    #admin-panel.open{display:flex;}
    .adm-lbl{font-size:.62rem;color:rgba(255,255,255,.32);letter-spacing:.12em;text-transform:uppercase;margin-right:4px;}
    .pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;cursor:pointer;user-select:none;font-size:.72rem;color:rgba(255,255,255,.45);transition:all .15s;}
    .pill.active{background:var(--red);border-color:var(--red);color:#fff;}
    .pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0;}

    /* CONTENT */
    main{flex:1;}
    .tab-panel{display:none;padding:28px 32px;max-width:1440px;margin:0 auto;}
    .tab-panel.active{display:block;}

    /* SECTION */
    .sec{margin-bottom:36px;}
    .sec-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .sec-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--blue);}
    .sec-meta{font-size:.67rem;color:var(--muted);font-family:'DM Mono',monospace;}

    /* KPI CARDS */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
    .kpi-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:16px 18px 14px;position:relative;overflow:hidden;
      box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;
    }
    .kpi-card:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
    .kpi-card.accent::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);}
    .kpi-lbl{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .kpi-val{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:700;color:var(--blue);line-height:1;margin-bottom:5px;}
    .kpi-val.neg{color:var(--red);}
    .kpi-val.pos{color:var(--green);}
    .kpi-foot{font-size:.63rem;color:var(--muted);font-family:'DM Mono',monospace;}

    /* TABLES */
    .tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);}
    table{width:100%;border-collapse:collapse;font-size:.78rem;background:var(--card);}
    thead th{background:var(--blue);color:#fff;padding:9px 13px;text-align:left;font-weight:500;font-size:.66rem;letter-spacing:.06em;white-space:nowrap;}
    thead th.r{text-align:right;}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr.grp td{background:var(--blue-lt);color:var(--blue);font-weight:600;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;}
    tbody tr.tot td{font-weight:600;background:#f4f6fb;}
    tbody tr.ctot td{font-weight:700;background:var(--blue-lt);color:var(--blue);border-top:2px solid var(--blue);}
    tbody tr.won-row td{background:#f0fdf4;font-weight:600;}
    tbody tr:hover:not(.grp):not(.tot):not(.ctot):not(.won-row){background:#f8f9fc;}
    td{padding:8px 13px;}
    td.r{text-align:right;font-family:'DM Mono',monospace;font-size:.73rem;}
    .tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:.62rem;font-weight:600;font-family:'DM Mono',monospace;}
    .tag.nat{background:var(--green-lt);color:var(--green);}
    .tag.exo{background:var(--amber-lt);color:var(--amber);}
    .tag.act{background:#fee2e2;color:#b91c1c;}

    /* TWO COL */
    .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:860px){.two{grid-template-columns:1fr;}}

    /* CHART */
    .cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
    .cc-ttl{font-size:.66rem;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
    canvas{max-height:240px;}

    /* FUNNEL */
    .funnel{display:flex;flex-direction:column;gap:5px;}
    .f-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;}
    .f-lbl{font-size:.78rem;font-weight:500;min-width:185px;}
    .f-track{flex:1;height:6px;background:var(--blue-lt);border-radius:3px;overflow:hidden;}
    .f-fill{height:100%;background:var(--blue);border-radius:3px;}
    .f-row.won .f-fill{background:var(--green);}
    .f-nums{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);min-width:160px;text-align:right;}

    /* ENROLMENT TABLE */
    .enrol-badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:.62rem;font-family:'DM Mono',monospace;font-weight:600;}
    .enrol-badge.proj{background:#fef3c7;color:#92400e;}
    .pos-small{color:var(--green);font-weight:600;}
    .neg-small{color:var(--red);font-weight:600;}

    /* LOADING */
    #loading{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity .4s;}
    #loading.hidden{opacity:0;pointer-events:none;}
    .spin{width:34px;height:34px;border:2px solid rgba(255,255,255,.14);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loading p{color:rgba(255,255,255,.45);font-size:.75rem;font-family:'DM Mono',monospace;}

    footer{text-align:center;padding:16px 28px;font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace;border-top:1px solid var(--border);}
    @media(max-width:640px){.tab-group{display:none;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.tab-panel{padding:16px;}}
  </style>
</head>

<script>
const CLIENT_ID = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';
const API_URL   = 'https://script.google.com/macros/s/AKfycbyJDI5osYSQ4JpPB9ahuSz8EqU84HpQvoPDSkZo97FEuE2_s0avu4iSVQ1kfxVmrJODlg/exec';

const TABS = [
  {id:'resumen',    label:'Resumen Ejecutivo'},
  {id:'kpis',       label:'KPIs 2026'},
  {id:'pipeline',   label:'Pipeline'},
  {id:'winrate',    label:'Win Rate'},
  {id:'funnel',     label:'Funnel'},
  {id:'withdrawals',label:'Withdrawals'},
  {id:'cohort',     label:'Cohort Retention'},
];

let tokenClient, accessToken, D={}, campus='os', activeTab='resumen';
let sVis=Object.fromEntries(TABS.map(t=>[t.id,true]));
let charts={};

// AUTH
function initAuth(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets.readonly',
    callback:r=>{
      if(r.error){alert('Error: '+r.error);return;}
      accessToken=r.access_token;
      showApp();fetchData();
    }
  });
  hideLoad();
}
document.getElementById('btn-login').addEventListener('click',()=>tokenClient.requestAccessToken({prompt:'select_account'}));
document.getElementById('btn-out').addEventListener('click',()=>{
  google.accounts.oauth2.revoke(accessToken,()=>{
    accessToken=null;
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  });
});

// DATA
function fetchData(){
  showLoad('Leyendo datos del dashboard…');
  const cb='sgcCb_'+Date.now();
  window[cb]=data=>{
    D=data;
    const now=new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('h-time').textContent='Actualizado: '+now;
    document.getElementById('f-time').textContent=now;
    render();
    delete window[cb];
    const s=document.getElementById('_jp');if(s)s.remove();
  };
  const s=document.createElement('script');
  s.id='_jp';s.src=API_URL+'?callback='+cb;
  s.onerror=()=>{hideLoad();alert('Error al cargar datos.');};
  document.head.appendChild(s);
}

// FORMAT
const fN=v=>{
  if(v==='—'||v==null||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return Math.round(n).toLocaleString('es-AR');
};
const fP=v=>{
  if(v==='—'||v==null||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return(n*100).toFixed(1)+'%';
};
const fV=v=>{
  if(v==='—'||v==null||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  if(n>-2&&n<2&&String(v).includes('.'))return fP(n);
  return fN(n);
};
const fPctRaw=v=>{
  if(v==='—'||v==null||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return(n*100).toFixed(2)+'%';
};

// CAMPUS DATA
function getCampusData(){
  if(campus==='q')return D.quilmes;
  if(campus==='n')return D.north;
  return mergeOS();
}
function mergeOS(){
  const q=D.quilmes||{},n=D.north||{};
  const m=(a,b)=>({
    matricula:(parseFloat(a?.matricula)||0)+(parseFloat(b?.matricula)||0),
    ocupacion:null,vacantes:(parseFloat(a?.vacantes)||0)+(parseFloat(b?.vacantes)||0),
    retencion:null,
    new_students:(parseFloat(a?.new_students)||0)+(parseFloat(b?.new_students)||0),
    withdrawals:(parseFloat(a?.withdrawals)||0)+(parseFloat(b?.withdrawals)||0),
    prospectos:(parseFloat(a?.prospectos)||0)+(parseFloat(b?.prospectos)||0),
  });
  const mSec=(sec,grades)=>{
    const r={total:m(q[sec]?.total,n[sec]?.total)};
    grades.forEach(g=>{r[g]=m(q[sec]?.[g],n[sec]?.[g]);});
    return r;
  };
  return{
    total:m(q.total,n.total),
    kinder:mSec('kinder',['K1','K2','K3','K4','K5']),
    prep:mSec('prep',['P1','P2','P3','P4','P5','P6']),
    college:mSec('college',['C1','C2','C3','C4','C5','C6']),
  };
}
function getWRField(r){
  if(campus==='q')return{pipeline:r.qPipeline,won:r.qWon,wr:r.qWR};
  if(campus==='n')return{pipeline:r.nPipeline,won:r.nWon,wr:r.nWR};
  return{pipeline:r.osPipeline,won:r.osWon,wr:r.osWR};
}
function getCohortField(r){
  if(campus==='q')return{ing:r.qIngresaron,act:r.qActivos,ret:r.qRet};
  if(campus==='n')return{ing:r.nIngresaron,act:r.nActivos,ret:r.nRet};
  const i=(parseFloat(r.qIngresaron)||0)+(parseFloat(r.nIngresaron)||0);
  const a=(parseFloat(r.qActivos)||0)+(parseFloat(r.nActivos)||0);
  return{ing:i,act:a,ret:i>0?a/i:null};
}

// RENDER
function render(){
  Object.values(charts).forEach(c=>c.destroy());charts={};
  const main=document.getElementById('main');main.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const panel=document.createElement('div');
    panel.className='tab-panel'+(t.id===activeTab?' active':'');
    panel.id='panel-'+t.id;
    const content=buildPanel(t.id);
    if(content)panel.appendChild(content);
    main.appendChild(panel);
  });
  drawCharts();buildTabNav();hideLoad();
}

function buildPanel(id){
  switch(id){
    case'resumen':return buildResumen();
    case'kpis':return buildKpis();
    case'pipeline':return buildPipeline();
    case'winrate':return buildWinRate();
    case'funnel':return buildFunnel();
    case'withdrawals':return buildWithdrawals();
    case'cohort':return buildCohort();
  }
}

function sec(title,meta,content){
  const s=document.createElement('div');s.className='sec';
  s.innerHTML=`<div class="sec-hd"><span class="sec-title">${title}</span>${meta?`<span class="sec-meta">${meta}</span>`:''}</div>`;
  s.appendChild(content);return s;
}

// RESUMEN EJECUTIVO
function buildResumen(){
  const wrap=document.createElement('div');
  const h=D.headline||{};
  const varN=(parseFloat(h.variacion_anual)||0)*100;

  // Headline cards
  const cards=[
    {lbl:'Total Alumnos 2026',val:fN(h.total_alumnos),foot:'One School',accent:true},
    {lbl:'Variación Anual',val:varN.toFixed(2)+'%',foot:'2025 vs 2026',cls:varN<0?'neg':'pos'},
    {lbl:'Retención Quilmes',val:fP(h.retencion_quilmes),foot:'Promedio ponderado'},
    {lbl:'Retención North',val:fP(h.retencion_north),foot:'Promedio ponderado'},
    {lbl:'New Students 2026',val:fN(h.new_students),foot:'Quilmes + North'},
    {lbl:'Win Rate 2026',val:fP(h.win_rate),foot:'Won / (Won + Lost)'},
    {lbl:'Prospectos Activos',val:fN(h.prospectos),foot:'Pipeline abierto'},
  ];
  const grid=document.createElement('div');grid.className='kpi-grid';
  cards.forEach(c=>{
    grid.innerHTML+=`<div class="kpi-card${c.accent?' accent':''}"><div class="kpi-lbl">${c.lbl}</div><div class="kpi-val ${c.cls||''}">${c.val}</div><div class="kpi-foot">${c.foot}</div></div>`;
  });
  wrap.appendChild(sec('Resumen Ejecutivo','One School · Mayo 2026',grid));

  // Enrolment evolution table
  const re=D.resumen;
  if(re){
    const tw=document.createElement('div');tw.className='tw';
    let html=`<table><thead><tr>
      <th>Año</th>`;
    if(campus==='os'||campus==='q')html+=`<th class="r">Q·Kinder</th><th class="r">Q·Prep</th><th class="r">Q·College</th><th class="r">Q·Total</th>`;
    if(campus==='os'||campus==='n')html+=`<th class="r">N·Kinder</th><th class="r">N·Prep</th><th class="r">N·College</th><th class="r">N·Total</th>`;
    if(campus==='os')html+=`<th class="r">OS·Total</th><th class="r">Crec. %</th>`;
    else html+=`<th class="r">Crec. %</th>`;
    html+=`</tr></thead><tbody>`;

    const years=[2027,2026,2025,2024,2023,2022,2021];
    years.forEach(yr=>{
      const isProj=yr===2027;
      const q=re.quilmes?.find(r=>r.año===yr)||{};
      const n=re.north?.find(r=>r.año===yr)||{};
      const os=re.oneSchool?.find(r=>r.año===yr)||{};
      const crecOS=parseFloat(os.crec||0)*100;
      html+=`<tr${isProj?' class="tot"':''}>`;
      html+=`<td style="font-weight:600">${yr}${isProj?' <span class="enrol-badge proj">proj.</span>':''}</td>`;
      if(campus==='os'||campus==='q'){
        html+=`<td class="r">${fN(q.kinder)}</td><td class="r">${fN(q.prep)}</td><td class="r">${fN(q.college)}</td><td class="r">${fN(q.total)}</td>`;
      }
      if(campus==='os'||campus==='n'){
        html+=`<td class="r">${fN(n.kinder)}</td><td class="r">${fN(n.prep)}</td><td class="r">${fN(n.college)}</td><td class="r">${fN(n.total)}</td>`;
      }
      if(campus==='os')html+=`<td class="r">${fN(os.total)}</td>`;
      const crec=campus==='os'?crecOS:campus==='q'?(parseFloat(q.crec||0)*100):(parseFloat(n.crec||0)*100);
      const crecFmt=isNaN(crec)||crec===0?'—':`<span class="${crec<0?'neg-small':'pos-small'}">${crec.toFixed(2)}%</span>`;
      html+=`<td class="r">${crecFmt}</td></tr>`;
    });
    html+='</tbody></table>';
    tw.innerHTML=html;
    wrap.appendChild(sec('Evolución de Matrícula 2021–2027','Histórico + Proyección Tendencial',tw));

    // Charts
    const two=document.createElement('div');two.className='two';
    const cc1=document.createElement('div');cc1.className='cc';
    cc1.innerHTML='<div class="cc-ttl">Matrícula One School 2021–2027</div><canvas id="chart-enrol"></canvas>';
    const cc2=document.createElement('div');cc2.className='cc';
    cc2.innerHTML='<div class="cc-ttl">Quilmes vs North</div><canvas id="chart-qn"></canvas>';
    two.appendChild(cc1);two.appendChild(cc2);
    wrap.appendChild(two);
  }

  return wrap;
}

// KPIs
function buildKpis(){
  const wrap=document.createElement('div');
  const h=D.headline||{};
  const varN=(parseFloat(h.variacion_anual)||0)*100;
  const cards=campus==='os'?[
    {lbl:'Total Alumnos',val:fN(h.total_alumnos),foot:'One School 2026',accent:true},
    {lbl:'Variación Anual',val:varN.toFixed(2)+'%',foot:'2025 vs 2026',cls:varN<0?'neg':'pos'},
    {lbl:'Retención Quilmes',val:fP(h.retencion_quilmes),foot:'Prom. ponderado'},
    {lbl:'Retención North',val:fP(h.retencion_north),foot:'Prom. ponderado'},
    {lbl:'New Students',val:fN(h.new_students),foot:'Quilmes + North'},
    {lbl:'Win Rate 2026',val:fP(h.win_rate),foot:'Won / (Won + Lost)'},
    {lbl:'Prospectos Activos',val:fN(h.prospectos),foot:'Pipeline abierto'},
  ]:[
    {lbl:'Total Alumnos',val:fN(h.total_alumnos),foot:'One School 2026',accent:true},
    {lbl:'Variación Anual',val:varN.toFixed(2)+'%',foot:'2025 vs 2026',cls:varN<0?'neg':'pos'},
    {lbl:`Retención ${campus==='q'?'Quilmes':'North'}`,val:fP(campus==='q'?h.retencion_quilmes:h.retencion_north),foot:'Prom. ponderado'},
    {lbl:'New Students',val:fN(h.new_students),foot:'Quilmes + North'},
    {lbl:'Win Rate 2026',val:fP(h.win_rate),foot:'Won / (Won + Lost)'},
    {lbl:'Prospectos Activos',val:fN(h.prospectos),foot:'Pipeline abierto'},
  ];
  const g=document.createElement('div');g.className='kpi-grid';
  cards.forEach(c=>{g.innerHTML+=`<div class="kpi-card${c.accent?' accent':''}"><div class="kpi-lbl">${c.lbl}</div><div class="kpi-val ${c.cls||''}">${c.val}</div><div class="kpi-foot">${c.foot}</div></div>`;});
  wrap.appendChild(sec('Indicadores Headline','One School · 2026',g));

  const cd=getCampusData();
  if(cd){
    const tw=document.createElement('div');tw.className='tw';
    tw.innerHTML=buildKpiTable(cd);
    wrap.appendChild(sec('KPIs por Sección','Matrícula · Ocupación · Retención',tw));
  }
  return wrap;
}

function buildKpiTable(cd){
  const secs=[
    {lbl:'KINDER',tot:cd.kinder?.total,rows:['K1','K2','K3','K4','K5'].map(k=>({k,d:cd.kinder?.[k]}))},
    {lbl:'PREP',  tot:cd.prep?.total,  rows:['P1','P2','P3','P4','P5','P6'].map(k=>({k,d:cd.prep?.[k]}))},
    {lbl:'COLLEGE',tot:cd.college?.total,rows:['C1','C2','C3','C4','C5','C6'].map(k=>({k,d:cd.college?.[k]}))},
  ];
  let h=`<table><thead><tr><th>Nivel</th><th>Grado</th>
    <th class="r">Matrícula</th><th class="r">Ocupación</th><th class="r">Vacantes</th>
    <th class="r">Retención</th><th class="r">New Students</th><th class="r">Withdrawals</th><th class="r">Prospectos</th>
  </tr></thead><tbody>`;
  secs.forEach(s=>{
    h+=`<tr class="grp"><td colspan="9">${s.lbl}</td></tr>`;
    const t=s.tot||{};
    h+=`<tr class="tot"><td></td><td>TOTAL ${s.lbl}</td>
      <td class="r">${fN(t.matricula)}</td><td class="r">${fV(t.ocupacion)}</td><td class="r">${fN(t.vacantes)}</td>
      <td class="r">${fV(t.retencion)}</td><td class="r">${fN(t.new_students)}</td><td class="r">${fN(t.withdrawals)}</td><td class="r">${fN(t.prospectos)}</td></tr>`;
    s.rows.forEach(({k,d})=>{
      d=d||{};
      h+=`<tr><td></td><td>${k}</td>
        <td class="r">${fV(d.matricula)}</td><td class="r">${fV(d.ocupacion)}</td><td class="r">${fV(d.vacantes)}</td>
        <td class="r">${fV(d.retencion)}</td><td class="r">${fV(d.new_students)}</td><td class="r">${fV(d.withdrawals)}</td><td class="r">${fV(d.prospectos)}</td></tr>`;
    });
  });
  const ct=cd.total||{};
  h+=`<tr class="ctot"><td colspan="2">TOTAL CAMPUS</td>
    <td class="r">${fN(ct.matricula)}</td><td class="r">${fV(ct.ocupacion)}</td><td class="r">${fN(ct.vacantes)}</td>
    <td class="r">${fV(ct.retencion)}</td><td class="r">${fN(ct.new_students)}</td><td class="r">${fN(ct.withdrawals)}</td><td class="r">${fN(ct.prospectos)}</td></tr>`;
  return h+'</tbody></table>';
}

// PIPELINE
function buildPipeline(){
  const wrap=document.createElement('div');
  const tw=document.createElement('div');tw.className='tw';
  let h=`<table><thead><tr><th>Etapa</th>`;
  if(campus==='os')h+=`<th class="r">Q·K</th><th class="r">Q·P</th><th class="r">Q·C</th><th class="r">Q·Tot</th><th class="r">N·K</th><th class="r">N·P</th><th class="r">N·C</th><th class="r">N·Tot</th><th class="r">One School</th>`;
  else if(campus==='q')h+=`<th class="r">Kinder</th><th class="r">Prep</th><th class="r">College</th><th class="r">Total</th>`;
  else h+=`<th class="r">Kinder</th><th class="r">Prep</th><th class="r">College</th><th class="r">Total</th>`;
  h+=`</tr></thead><tbody>`;
  (D.pipeline||[]).forEach(p=>{
    const won=p.isWon;
    h+=`<tr class="${won?'won-row':''}"><td>${p.etapa}</td>`;
    if(campus==='os')h+=`<td class="r">${fN(p.qK)}</td><td class="r">${fN(p.qP)}</td><td class="r">${fN(p.qC)}</td><td class="r">${fN(p.qT)}</td><td class="r">${fN(p.nK)}</td><td class="r">${fN(p.nP)}</td><td class="r">${fN(p.nC)}</td><td class="r">${fN(p.nT)}</td><td class="r">${fN(p.total)}</td>`;
    else if(campus==='q')h+=`<td class="r">${fN(p.qK)}</td><td class="r">${fN(p.qP)}</td><td class="r">${fN(p.qC)}</td><td class="r">${fN(p.qT)}</td>`;
    else h+=`<td class="r">${fN(p.nK)}</td><td class="r">${fN(p.nP)}</td><td class="r">${fN(p.nC)}</td><td class="r">${fN(p.nT)}</td>`;
    h+=`</tr>`;
  });
  h+='</tbody></table>';tw.innerHTML=h;
  wrap.appendChild(sec('Pipeline Activo 2027','Foto del funnel en curso · Insightly',tw));
  return wrap;
}

// WIN RATE

// FUNNEL
function buildFunnel(){
  const wrap=document.createElement('div');
  const f=document.createElement('div');f.className='funnel';
  const max=Math.max(...(D.funnel||[]).map(x=>x.llegaron));
  (D.funnel||[]).forEach(item=>{
    const pct=max>0?(item.llegaron/max*100):0;
    const lp=(parseFloat(item.pctPerd)*100).toFixed(0);
    const div=document.createElement('div');
    div.className='f-row'+(item.isWon?' won':'');
    div.innerHTML=`<div class="f-lbl">${item.etapa}</div>
      <div class="f-track"><div class="f-fill" style="width:${pct}%"></div></div>
      <div class="f-nums">${fN(item.llegaron)} · ${lp}% baja</div>`;
    f.appendChild(div);
  });
  wrap.appendChild(sec('Funnel de Conversión','Histórico 2021–2026',f));
  return wrap;
}

// WITHDRAWALS
function buildWithdrawals(){
  const wrap=document.createElement('div');
  const tw=document.createElement('div');tw.className='tw';
  let h=`<table><thead><tr><th>Causa</th><th>Tipo</th>`;
  if(campus==='os')h+=`<th class="r">Q 2025</th><th class="r">Q 2026</th><th class="r">N 2025</th><th class="r">N 2026</th><th class="r">Total 2025</th><th class="r">Total 2026</th>`;
  else if(campus==='q')h+=`<th class="r">2025</th><th class="r">2026</th>`;
  else h+=`<th class="r">2025</th><th class="r">2026</th>`;
  h+=`</tr></thead><tbody>`;
  (D.withdrawals||[]).forEach(w=>{
    const tc=w.tipo.includes('Natural')?'nat':w.tipo.includes('Exóg')||w.tipo.includes('Exog')?'exo':'act';
    h+=`<tr><td>${w.causa}</td><td><span class="tag ${tc}">${w.tipo}</span></td>`;
    if(campus==='os')h+=`<td class="r">${fN(w.q2025)}</td><td class="r">${fN(w.q2026)}</td><td class="r">${fN(w.n2025)}</td><td class="r">${fN(w.n2026)}</td><td class="r">${fN(w.tot2025)}</td><td class="r">${fN(w.tot2026)}</td>`;
    else if(campus==='q')h+=`<td class="r">${fN(w.q2025)}</td><td class="r">${fN(w.q2026)}</td>`;
    else h+=`<td class="r">${fN(w.n2025)}</td><td class="r">${fN(w.n2026)}</td>`;
    h+=`</tr>`;
  });
  h+='</tbody></table>';tw.innerHTML=h;
  wrap.appendChild(sec('Withdrawals por Causa','Análisis de bajas 2025 vs 2026',tw));
  return wrap;
}

// CHARTS
function drawCharts(){
  // Enrolment OS
  const eCanvas=document.getElementById('chart-enrol');
  if(eCanvas&&D.resumen?.oneSchool){
    const rows=[...D.resumen.oneSchool].reverse();
    charts.enrol=new Chart(eCanvas,{
      type:'bar',
      data:{
        labels:rows.map(r=>r.año+(r.año===2027?' (proj.)':'')),
        datasets:[{label:'One School',data:rows.map(r=>r.total),backgroundColor:rows.map(r=>r.año===2027?'rgba(220,30,51,.5)':'rgba(33,54,105,.75)'),borderRadius:3}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}
    });
  }
  // QN comparison
  const qnCanvas=document.getElementById('chart-qn');
  if(qnCanvas&&D.resumen){
    const qRows=[...(D.resumen.quilmes||[])].reverse();
    const nRows=[...(D.resumen.north||[])].reverse();
    charts.qn=new Chart(qnCanvas,{
      type:'line',
      data:{
        labels:qRows.map(r=>r.año+(r.año===2027?' (p)':'')),
        datasets:[
          {label:'Quilmes',data:qRows.map(r=>r.total),borderColor:'#213669',backgroundColor:'rgba(33,54,105,.08)',tension:.35,fill:true},
          {label:'North',data:nRows.map(r=>r.total),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.06)',tension:.35,fill:true},
        ]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11}}}},scales:{y:{grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}
    });
  }
  // Win Rate
  const wrCanvas=document.getElementById('chart-wr');
  if(wrCanvas&&D.winrate){
    const labels=D.winrate.map(r=>r.año);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.winrate.map(r=>+(parseFloat(r.qWR)*100).toFixed(1)),borderColor:'#213669',backgroundColor:'rgba(33,54,105,.08)',tension:.35,fill:true},
      {label:'North',data:D.winrate.map(r=>+(parseFloat(r.nWR)*100).toFixed(1)),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.06)',tension:.35,fill:true},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.winrate.map(r=>campus==='q'?+(parseFloat(r.qWR)*100).toFixed(1):+(parseFloat(r.nWR)*100).toFixed(1)),
      borderColor:campus==='q'?'#213669':'#DC1E33',
      backgroundColor:campus==='q'?'rgba(33,54,105,.08)':'rgba(220,30,51,.06)',
      tension:.35,fill:true
    }];
    charts.wr=new Chart(wrCanvas,{type:'line',data:{labels,datasets:ds},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11}}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}});
  }
  // Cohort
  const coCanvas=document.getElementById('chart-cohort');
  if(coCanvas&&D.cohort){
    const labels=D.cohort.map(r=>r.año);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.cohort.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)),backgroundColor:'rgba(33,54,105,.75)',borderRadius:3},
      {label:'North',data:D.cohort.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:'rgba(220,30,51,.7)',borderRadius:3},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.cohort.map(r=>campus==='q'?+(parseFloat(r.qRet)*100).toFixed(1):+(parseFloat(r.nRet)*100).toFixed(1)),
      backgroundColor:campus==='q'?'rgba(33,54,105,.75)':'rgba(220,30,51,.7)',borderRadius:3
    }];
    charts.cohort=new Chart(coCanvas,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11}}}},scales:{y:{min:70,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}});
  }
}

// TAB NAV
function buildTabNav(){
  const ctr=document.getElementById('tab-group');ctr.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(t.id===activeTab?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{
      activeTab=t.id;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      const panel=document.getElementById('panel-'+t.id);
      if(panel)panel.classList.add('active');
    };
    ctr.appendChild(btn);
  });
}

// CAMPUS
document.querySelectorAll('.campus-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    campus=btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ADMIN
function buildAdmin(){
  const ctr=document.getElementById('sec-toggles');
  TABS.forEach(t=>{
    const p=document.createElement('div');p.className='pill active';
    p.innerHTML=`<span class="dot"></span>${t.label}`;
    p.onclick=()=>{
      sVis[t.id]=!sVis[t.id];
      p.classList.toggle('active',sVis[t.id]);
      if(!sVis[t.id]&&activeTab===t.id)activeTab=TABS.find(x=>sVis[x.id])?.id||TABS[0].id;
      render();
    };
    ctr.appendChild(p);
  });
}
document.getElementById('btn-admin').addEventListener('click',()=>document.getElementById('admin-panel').classList.toggle('open'));

// UI
function showApp(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
}
function showLoad(msg){const el=document.getElementById('loading');el.querySelector('p').textContent=msg||'Cargando…';el.classList.remove('hidden');}
function hideLoad(){document.getElementById('loading').classList.add('hidden');}

// INIT
buildAdmin();buildTabNav();
window.onload=()=>{
  const s=document.createElement('script');

  s.onload=initAuth;

};
