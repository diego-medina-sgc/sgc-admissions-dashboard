<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>St George's College — Admissions Dashboard 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Asap:wght@300;400;500;600&family=Asap+Condensed:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --red:     #DC1E33;
      --navy:    #213469;
      --celeste: #6AB2E2;
      --teal:    #109AA9;
      --cream:   #FAF7F2;
      --paper:   #F0EDE6;
      --ink:     #1A1F35;
      --gray:    #6B7180;
      --line:    #E8E3DA;
      --white:   #FFFFFF;
      --green:   #15803d;
      --green-lt:#dcfce7;
      --amber:   #b45309;
      --amber-lt:#fef3c7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Asap', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; -webkit-text-size-adjust: 100%; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--cream);
    }
    .login-box {
      background: var(--white); border-radius: 8px;
      box-shadow: 0 8px 48px rgba(26,31,53,.12);
      padding: 48px 44px; max-width: 400px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .login-logo { width: 140px; object-fit: contain; }
    .login-divider { width: 100%; height: 1px; background: var(--line); }
    .login-tagline { font-size: .82rem; color: var(--gray); text-align: center; line-height: 1.55; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 11px 20px;
      background: var(--white); border: 1.5px solid var(--line); border-radius: 4px;
      font-family: 'Asap', sans-serif; font-size: .88rem; font-weight: 500; color: var(--ink);
      cursor: pointer; transition: border-color .15s, box-shadow .15s;
      box-shadow: 0 1px 4px rgba(26,31,53,.06);
    }
    .btn-google:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(26,31,53,.10); }

    /* ── APP ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--white);
      padding: 20px 40px 16px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .h-brand { display: flex; align-items: center; gap: 20px; }
    .h-logo { height: 52px; width: auto; object-fit: contain; }
    .h-vline { width: 1px; height: 44px; background: var(--line); }
    .h-text {}
    .h-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 3px; }
    .h-sub { font-size: .68rem; color: var(--gray); letter-spacing: .14em; text-transform: uppercase; font-family: 'Asap Condensed', sans-serif; }
    .h-meta { display: flex; align-items: center; gap: 12px; padding-bottom: 2px; }
    .h-time { font-size: .7rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .04em; }
    .btn-sm {
      background: none; border: 1.5px solid var(--line); color: var(--gray);
      padding: 5px 12px; border-radius: 4px; font-size: .73rem; cursor: pointer;
      font-family: 'Asap', sans-serif; transition: all .15s;
    }
    .btn-sm:hover { border-color: var(--navy); color: var(--navy); }
    .btn-out { background: none; border: none; color: var(--gray); font-size: .72rem; cursor: pointer; font-family: 'Asap', sans-serif; transition: color .15s; padding: 5px 0; }
    .btn-out:hover { color: var(--red); }

    /* ── BRAND BAND ── */
    .brand-band { display: flex; height: 4px; }
    .brand-band-red  { flex: 1; background: var(--red); }
    .brand-band-navy { flex: 1; background: var(--navy); }

    /* ── STICKY NAV ── */
    .sticky-nav {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 1px 8px rgba(26,31,53,.06);
      display: flex; align-items: stretch; justify-content: space-between;
      padding: 0 40px;
    }
    .tab-group { display: flex; overflow-x: auto; scrollbar-width: none; }
    .tab-group::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; background: none; border: none; border-bottom: 2px solid transparent;
      font-family: 'Asap', sans-serif; font-size: .76rem; font-weight: 500;
      color: var(--gray); cursor: pointer; white-space: nowrap;
      transition: all .2s; margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
    .campus-group { display: flex; align-items: center; gap: 6px; padding: 8px 0; border-left: 1px solid var(--line); padding-left: 20px; }
    .campus-btn {
      padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--line);
      background: var(--white); color: var(--gray);
      font-family: 'Asap', sans-serif; font-size: .75rem; font-weight: 500;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .campus-btn:hover { border-color: var(--gray); color: var(--ink); }
    .campus-btn[data-c="os"].active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .campus-btn[data-c="q"].active  { background: var(--red);  border-color: var(--red);  color: var(--white); }
    .campus-btn[data-c="n"].active  { background: var(--celeste); border-color: var(--celeste); color: var(--white); }

    /* ── ADMIN ── */
    #admin-panel {
      display: none; background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 12px 40px; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    #admin-panel.open { display: flex; }
    .adm-lbl { font-size: .65rem; color: var(--gray); letter-spacing: .1em; text-transform: uppercase; font-family: 'Asap Condensed', sans-serif; margin-right: 4px; }
    .pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--white); border: 1.5px solid var(--line);
      border-radius: 20px; padding: 4px 12px; cursor: pointer; user-select: none;
      font-size: .72rem; color: var(--gray); font-family: 'Asap', sans-serif; transition: all .15s;
    }
    .pill.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .7; flex-shrink: 0; }

    /* ── CONTENT ── */
    main { flex: 1; }
    .tab-panel { display: none; padding: 32px 40px; max-width: 1480px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── SECTION ── */
    .sec { margin-bottom: 40px; }
    .sec-hd { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .sec-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); }
    .sec-meta { font-size: .68rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .06em; }

    /* ── KPI CARDS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--white); border: 1px solid var(--line); border-radius: 6px;
      padding: 18px 20px 16px; position: relative; overflow: hidden;
      box-shadow: 0 1px 4px rgba(26,31,53,.06); transition: box-shadow .2s, transform .2s;
    }
    .kpi-card:hover { box-shadow: 0 6px 24px rgba(26,31,53,.10); transform: translateY(-2px); }
    .kpi-card.accent::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
    .kpi-lbl { font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; font-family: 'Asap Condensed', sans-serif; }
    .kpi-val { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--navy); line-height: 1; margin-bottom: 6px; }
    .kpi-val.neg { color: var(--red); }
    .kpi-val.pos { color: var(--green); }
    .kpi-foot { font-size: .65rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; }

    /* ── TABLES ── */
    .tw { overflow-x: auto; border-radius: 6px; border: 1px solid var(--line); box-shadow: 0 1px 4px rgba(26,31,53,.06); }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; background: var(--white); }
    thead th { background: var(--navy); color: var(--white); padding: 10px 14px; text-align: left; font-weight: 600; font-size: .68rem; letter-spacing: .07em; white-space: nowrap; font-family: 'Asap Condensed', sans-serif; }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--line); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.grp td { background: #EEF1F8; color: var(--navy); font-weight: 600; font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; padding: 8px 14px; font-family: 'Asap Condensed', sans-serif; }
    tbody tr.tot td { font-weight: 600; background: #F5F2EC; }
    tbody tr.ctot td { font-weight: 700; background: #EEF1F8; color: var(--navy); border-top: 2px solid var(--navy); }
    tbody tr.won-row td { background: #f0fdf4; font-weight: 600; }
    tbody tr.proj-row td { background: #FFFBEB; }
    tbody tr:hover:not(.grp):not(.tot):not(.ctot):not(.won-row):not(.proj-row) { background: #F7F4EE; }
    td { padding: 9px 14px; }
    td.r { text-align: right; font-family: 'Asap Condensed', sans-serif; font-size: .78rem; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: .63rem; font-weight: 600; font-family: 'Asap Condensed', sans-serif; letter-spacing: .04em; }
    .tag.nat { background: var(--green-lt); color: var(--green); }
    .tag.exo { background: var(--amber-lt); color: var(--amber); }
    .tag.act { background: #fee2e2; color: #b91c1c; }
    .badge-proj { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: .6rem; font-weight: 600; background: var(--amber-lt); color: var(--amber); font-family: 'Asap Condensed', sans-serif; margin-left: 6px; }
    .val-pos { color: var(--green); font-weight: 600; }
    .val-neg { color: var(--red); font-weight: 600; }

    /* ── TWO COL ── */
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 860px) { .two { grid-template-columns: 1fr; } }

    /* ── CHART CARD ── */
    .cc { background: var(--white); border: 1px solid var(--line); border-radius: 6px; padding: 22px 24px; box-shadow: 0 1px 4px rgba(26,31,53,.06); }
    .cc-ttl { font-size: .68rem; font-weight: 600; color: var(--gray); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; font-family: 'Asap Condensed', sans-serif; }
    canvas { max-height: 240px; }

    /* ── FUNNEL ── */
    .funnel { display: flex; flex-direction: column; gap: 6px; }
    .f-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--white); border: 1px solid var(--line); border-radius: 6px; padding: 10px 16px;
      cursor: default; transition: box-shadow .15s, transform .15s;
    }
    .f-row:hover { box-shadow: 0 4px 16px rgba(26,31,53,.10); transform: translateX(4px); }
    .f-row.won { border-color: var(--teal); }
    .f-lbl { font-size: .82rem; font-weight: 500; min-width: 190px; font-family: 'Asap', sans-serif; }
    .f-track { flex: 1; height: 8px; background: var(--paper); border-radius: 4px; overflow: hidden; }
    .f-fill { height: 100%; background: var(--navy); border-radius: 4px; width: 0%; transition: width .9s cubic-bezier(.4,0,.2,1); }
    .f-row.won .f-fill { background: var(--teal); }
    .f-nums { font-family: 'Asap Condensed', sans-serif; font-size: .72rem; color: var(--gray); min-width: 180px; text-align: right; }
    .f-badge { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: .65rem; font-weight: 600; background: #fee2e2; color: #b91c1c; margin-left: 6px; }
    .f-row.won .f-badge { background: var(--green-lt); color: var(--green); }

    /* ── SIMULATOR ── */
    .sim-totals { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
    .sim-card { background: var(--white); border: 1px solid var(--line); border-radius: 6px; padding: 16px 18px; }
    .sim-lbl { font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--gray); margin-bottom: 6px; font-family: 'Asap Condensed', sans-serif; }
    .sim-val { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--navy); }
    .sim-delta { font-size: .7rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; margin-top: 2px; }
    .sim-controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .sim-btn { padding: 6px 14px; border-radius: 4px; border: 1.5px solid var(--line); background: var(--white); font-family: 'Asap', sans-serif; font-size: .75rem; font-weight: 500; color: var(--gray); cursor: pointer; transition: all .15s; }
    .sim-btn:hover { border-color: var(--navy); color: var(--navy); }
    .sim-btn.primary { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .adj-wrap { display: flex; align-items: center; gap: 3px; }
    .adj-btn { width: 22px; height: 22px; border: 1px solid var(--line); border-radius: 3px; background: var(--white); cursor: pointer; font-size: .9rem; display: inline-flex; align-items: center; justify-content: center; color: var(--gray); transition: all .1s; line-height: 1; }
    .adj-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .adj-input { width: 50px; text-align: center; border: 1px solid var(--line); border-radius: 3px; padding: 3px 4px; font-family: 'Asap Condensed', sans-serif; font-size: .76rem; color: var(--ink); background: var(--white); }
    .adj-input:focus { outline: none; border-color: var(--navy); }
    .sim-section-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 300; transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .load-logo { width: 110px; opacity: .9; }
    .spin { width: 32px; height: 32px; border: 2px solid var(--line); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-txt { color: var(--gray); font-size: .75rem; font-family: 'Asap Condensed', sans-serif; letter-spacing: .12em; text-transform: uppercase; }

    footer { text-align: center; padding: 18px 40px; font-size: .65rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .05em; border-top: 1px solid var(--line); margin-top: auto; }

    @media (max-width: 720px) {
      header { padding: 16px 20px 12px; }
      .sticky-nav { padding: 0 20px; }
      .tab-panel { padding: 20px; }
      .kpi-grid { grid-template-columns: repeat(2,1fr); }
      .campus-group { display: none; }
      .sim-totals { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <img class="load-logo" src="logo.jpg" alt="St George's College"/>
  <div class="spin"></div>
  <div class="load-txt">Cargando dashboard</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-logo" src="logo.jpg" alt="St George's College"/>
    <div class="login-divider"></div>
    <p class="login-tagline">Dashboard de Admisiones 2026<br>Acceso restringido a cuentas autorizadas</p>
    <button class="btn-google" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Ingresar con Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-brand">
      <img class="h-logo" src="logo.jpg" alt="St George's College"/>
      <div class="h-vline"></div>
      <div class="h-text">
        <div class="h-title">Admissions Dashboard</div>
        <div class="h-sub">Analytics &middot; Mayo 2026</div>
      </div>
    </div>
    <div class="h-meta">
      <span class="h-time" id="h-time"></span>
      <button class="btn-sm" id="btn-admin">Admin</button>
      <button class="btn-out" id="btn-out">Salir</button>
    </div>
  </header>

  <div class="brand-band">
    <div class="brand-band-red"></div>
    <div class="brand-band-navy"></div>
  </div>

  <div class="sticky-nav">
    <div class="tab-group" id="tab-group"></div>
    <div class="campus-group">
      <button class="campus-btn active" data-c="os">One School</button>
      <button class="campus-btn" data-c="q">Quilmes</button>
      <button class="campus-btn" data-c="n">North</button>
    </div>
  </div>

  <div id="admin-panel">
    <span class="adm-lbl">Secciones</span>
    <div id="sec-toggles" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>

  <main id="main"></main>

  <footer>St George's College &middot; Dashboard de Admisiones &middot; Datos en tiempo real desde Google Sheets &middot; <span id="f-time"></span></footer>
</div>

<script>
const CLIENT_ID = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';
const API_URL   = 'https://script.google.com/macros/s/AKfycbyJDI5osYSQ4JpPB9ahuSz8EqU84HpQvoPDSkZo97FEuE2_s0avu4iSVQ1kfxVmrJODlg/exec';

const TABS = [
  {id:'resumen',     label:'Resumen Ejecutivo'},
  {id:'kpis',        label:'KPIs 2026'},
  {id:'pipeline',    label:'Pipeline'},
  {id:'winrate',     label:'Win Rate'},
  {id:'funnel',      label:'Funnel'},
  {id:'withdrawals', label:'Withdrawals'},
  {id:'cohort',      label:'Cohort Retention'},
  {id:'proyeccion',  label:'Proyeccion 2027'},
];

let tokenClient, accessToken, D={}, campus='os', activeTab='resumen';
let sVis=Object.fromEntries(TABS.map(t=>[t.id,true]));
let charts={}, simAdj={};

// AUTH
function initAuth(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets.readonly',
    callback:r=>{
      if(r.error){alert('Error: '+r.error);return;}
      accessToken=r.access_token;
      showApp();fetchData();
    }
  });
  hideLoad();
}
document.getElementById('btn-login').addEventListener('click',()=>tokenClient.requestAccessToken({prompt:'select_account'}));
document.getElementById('btn-out').addEventListener('click',()=>{
  google.accounts.oauth2.revoke(accessToken,()=>{
    accessToken=null;
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  });
});

// DATA
function fetchData(){
  showLoad('Cargando datos...');
  const cb='sgcCb_'+Date.now();
  window[cb]=data=>{
    D=data;
    const now=new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('h-time').textContent='Actualizado: '+now;
    document.getElementById('f-time').textContent=now;
    initSimAdj();render();
    delete window[cb];const s=document.getElementById('_jp');if(s)s.remove();
  };
  const s=document.createElement('script');s.id='_jp';
  s.src=API_URL+'?callback='+cb;
  s.onerror=()=>{hideLoad();alert('Error al cargar datos.');};
  document.head.appendChild(s);
}

// FORMAT
const fN=v=>{
  if(v===null||v===undefined||v==='')return '--';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return Math.round(n).toLocaleString('es-AR');
};
const fP=v=>{
  if(v===null||v===undefined||v==='')return '--';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return(n*100).toFixed(1)+'%';
};
const fV=v=>{
  if(v===null||v===undefined||v==='')return '--';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  if(n>-2&&n<2&&String(v).includes('.'))return fP(n);
  return fN(n);
};
const fCrp=v=>{
  if(!v&&v!==0)return '--';
  const n=parseFloat(v)*100;if(isNaN(n))return '--';
  const s=Math.abs(n).toFixed(2)+'%';
  return n<0?'<span class="val-neg">-'+s+'</span>':'<span class="val-pos">+'+s+'</span>';
};

// CAMPUS
function getCampusData(){
  if(campus==='q')return D.quilmes;
  if(campus==='n')return D.north;
  return mergeOS();
}
function mergeOS(){
  const q=D.quilmes||{},n=D.north||{};
  const m=(a,b)=>({
    matricula:(parseFloat(a&&a.matricula)||0)+(parseFloat(b&&b.matricula)||0),
    ocupacion:null,vacantes:(parseFloat(a&&a.vacantes)||0)+(parseFloat(b&&b.vacantes)||0),
    retencion:null,
    new_students:(parseFloat(a&&a.new_students)||0)+(parseFloat(b&&b.new_students)||0),
    withdrawals:(parseFloat(a&&a.withdrawals)||0)+(parseFloat(b&&b.withdrawals)||0),
    prospectos:(parseFloat(a&&a.prospectos)||0)+(parseFloat(b&&b.prospectos)||0),
  });
  const mS=(sec,gr)=>{const r={total:m(q[sec]&&q[sec].total,n[sec]&&n[sec].total)};gr.forEach(g=>{r[g]=m(q[sec]&&q[sec][g],n[sec]&&n[sec][g]);});return r;};
  return{
    total:m(q.total,n.total),
    kinder:mS('kinder',['K1','K2','K3','K4','K5']),
    prep:mS('prep',['P1','P2','P3','P4','P5','P6']),
    college:mS('college',['C1','C2','C3','C4','C5','C6']),
  };
}
function getWRF(r){
  if(campus==='q')return{pipeline:r.qPipeline,won:r.qWon,wr:r.qWR};
  if(campus==='n')return{pipeline:r.nPipeline,won:r.nWon,wr:r.nWR};
  return{pipeline:r.osPipeline,won:r.osWon,wr:r.osWR};
}
function getCohF(r){
  if(campus==='q')return{ing:r.qIngresaron,act:r.qActivos,ret:r.qRet};
  if(campus==='n')return{ing:r.nIngresaron,act:r.nActivos,ret:r.nRet};
  const i=(parseFloat(r.qIngresaron)||0)+(parseFloat(r.nIngresaron)||0);
  const a=(parseFloat(r.qActivos)||0)+(parseFloat(r.nActivos)||0);
  return{ing:i,act:a,ret:i>0?a/i:null};
}

// SIMULATOR
function initSimAdj(){
  simAdj={};
  ['K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'].forEach(g=>simAdj['q_'+g]=0);
  ['K1','K2','K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'].forEach(g=>simAdj['n_'+g]=0);
}
function calcSimTotal(ck){
  const re=D.resumen;if(!re)return{base:0,final:0};
  const rows=ck==='q'?re.quilmes:re.north;
  const base=parseFloat((rows&&rows.find(r=>r.ano===2027)||{}).total)||0;
  const adj=Object.entries(simAdj).filter(([k])=>k.startsWith(ck+'_')).reduce((s,[,v])=>s+v,0);
  return{base,final:base+adj,adj};
}
function applyScenario(type){
  const qG=['K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'];
  const nG=['K1','K2','K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'];
  if(type==='reset'){initSimAdj();}
  else if(type==='opt'){qG.forEach(g=>{simAdj['q_'+g]=2;});nG.forEach(g=>{simAdj['n_'+g]=1;});}
  else if(type==='cons'){qG.forEach(g=>{simAdj['q_'+g]=-2;});nG.forEach(g=>{simAdj['n_'+g]=-1;});}
  updateSimDisplay();
}
function updateSimDisplay(){
  Object.entries(simAdj).forEach(([k,v])=>{const el=document.getElementById('adj_'+k);if(el)el.value=v;});
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base;
  const setCard=(id,final,base)=>{
    const el=document.getElementById(id);if(!el)return;
    el.querySelector('.sim-val').textContent=Math.round(final).toLocaleString('es-AR');
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    el.querySelector('.sim-delta').innerHTML='vs base '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span>';
  };
  setCard('sim-q',qT.final,qT.base);setCard('sim-n',nT.final,nT.base);setCard('sim-os',osFinal,osBase);
}

  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base;
  const wrap=document.createElement('div');

  const mkCard=(id,label,final,base,color)=>{
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    return '<div class="sim-card" id="'+id+'" style="border-top:3px solid '+color+'"><div class="sim-lbl">'+label+'</div><div class="sim-val">'+Math.round(final).toLocaleString('es-AR')+'</div><div class="sim-delta">vs base '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span></div></div>';
  };
  const totDiv=document.createElement('div');totDiv.className='sim-totals';
  totDiv.innerHTML=mkCard('sim-q','Quilmes 2027',qT.final,qT.base,'#DC1E33')+mkCard('sim-n','North 2027',nT.final,nT.base,'#6AB2E2')+mkCard('sim-os','One School 2027',osFinal,osBase,'#213469');
  wrap.appendChild(totDiv);

  const ctrl=document.createElement('div');ctrl.className='sim-controls';
  ctrl.innerHTML='<button class="sim-btn primary" onclick="applyScenario(\'reset\')">Tendencial (base)</button><button class="sim-btn" onclick="applyScenario(\'opt\')" style="border-color:#15803d;color:#15803d">Optimista +2</button><button class="sim-btn" onclick="applyScenario(\'cons\')" style="border-color:#DC1E33;color:#DC1E33">Conservador -2</button>';
  wrap.appendChild(ctrl);

  const mkTable=(title,ck,grades,baseData)=>{
    const color=ck==='q'?'var(--red)':'var(--celeste)';
    let h='<div style="margin-bottom:28px"><div class="sim-section-title">'+title+'</div><div class="tw"><table><thead><tr><th>Grado</th><th class="r">Base 2026</th><th class="r">Proyeccion base</th><th class="r">Ajuste</th><th class="r" style="color:'+color+'">Final 2027</th></tr></thead><tbody>';
    grades.forEach(({k,base2026,proj})=>{
      const key=ck+'_'+k;
      const adj=simAdj[key]||0;
      h+='<tr><td style="font-weight:600">'+k+'</td><td class="r">'+fN(base2026)+'</td><td class="r">'+fN(proj)+'</td><td class="r"><div class="adj-wrap"><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)-1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">-</button><input class="adj-input" id="adj_'+key+'" value="'+adj+'" type="number" onchange="simAdj[\''+key+'\']=parseInt(this.value)||0;updateSimDisplay()"/><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)+1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">+</button></div></td><td class="r" style="font-weight:700;color:'+color+'" id="final_'+key+'">'+fN((proj||0)+(adj))+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
    return h;
  };

  const re2=D.resumen;
  const qGrades=[
    {k:'K3',base2026:35,proj:46},{k:'K4',base2026:51,proj:57},{k:'K5',base2026:44,proj:44},
    {k:'P1',base2026:56,proj:55},{k:'P2',base2026:59,proj:62},{k:'P3',base2026:60,proj:58},
    {k:'P4',base2026:67,proj:66},{k:'P5',base2026:58,proj:61},{k:'P6',base2026:51,proj:51},
    {k:'C1',base2026:71,proj:68},{k:'C2',base2026:62,proj:64},{k:'C3',base2026:53,proj:52},
    {k:'C4',base2026:70,proj:68},{k:'C5',base2026:66,proj:66},{k:'C6',base2026:62,proj:62},
  ];
  const nGrades=[
    {k:'K1',base2026:3,proj:4},{k:'K2',base2026:13,proj:14},{k:'K3',base2026:18,proj:21},
    {k:'K4',base2026:20,proj:24},{k:'K5',base2026:25,proj:29},
    {k:'P1',base2026:17,proj:18},{k:'P2',base2026:32,proj:33},{k:'P3',base2026:35,proj:37},
    {k:'P4',base2026:33,proj:36},{k:'P5',base2026:41,proj:44},{k:'P6',base2026:21,proj:20},
    {k:'C1',base2026:49,proj:49},{k:'C2',base2026:49,proj:53},{k:'C3',base2026:33,proj:32},
    {k:'C4',base2026:57,proj:50},{k:'C5',base2026:49,proj:49},{k:'C6',base2026:57,proj:49},
  ];

  const tables=document.createElement('div');
  tables.innerHTML=mkTable('Quilmes - Ajuste por grado','q',qGrades)+mkTable('North - Ajuste por grado','n',nGrades);
  wrap.appendChild(tables);

  return sec('Proyeccion 2027','Simulador de escenarios por grado',wrap);
}

// CHARTS
const CHART_CFG={
  plugins:{
    legend:{labels:{font:{family:'Asap Condensed',size:12},usePointStyle:true,pointStyleWidth:10,color:'#6B7180'}},
    tooltip:{backgroundColor:'#1A1F35',titleFont:{family:'Asap',size:12},bodyFont:{family:'Asap Condensed',size:11},padding:10,cornerRadius:4,titleColor:'#fff',bodyColor:'rgba(255,255,255,.8)'}
  },
  scales:{
    y:{grid:{color:'#F0EDE6'},ticks:{font:{family:'Asap Condensed',size:11},color:'#6B7180'}},
    x:{grid:{display:false},ticks:{font:{family:'Asap Condensed',size:11},color:'#6B7180'}}
  }
};

function drawCharts(){
  Chart.defaults.font.family='Asap';
  Chart.defaults.color='#6B7180';

  const ec=document.getElementById('chart-enrol');
  if(ec&&D.resumen&&D.resumen.oneSchool){
    const rows=[...D.resumen.oneSchool].reverse();
    charts.enrol=new Chart(ec,{
      type:'bar',
      data:{
        labels:rows.map(r=>r.ano+(r.ano===2027?' (proj)':'')),
        datasets:[{label:'One School',data:rows.map(r=>parseFloat(r.total)||0),backgroundColor:rows.map(r=>r.ano===2027?'rgba(220,30,51,.45)':'rgba(33,52,105,.72)'),borderRadius:4}]
      },
      options:{...CHART_CFG,responsive:true,plugins:{...CHART_CFG.plugins,legend:{display:false}}}
    });
  }

  const qnc=document.getElementById('chart-qn');
  if(qnc&&D.resumen){
    const qR=[...(D.resumen.quilmes||[])].reverse();
    const nR=[...(D.resumen.north||[])].reverse();
    charts.qn=new Chart(qnc,{
      type:'line',
      data:{
        labels:qR.map(r=>r.ano+(r.ano===2027?' (p)':'')),
        datasets:[
          {label:'Quilmes',data:qR.map(r=>parseFloat(r.total)||0),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.07)',tension:.4,fill:true,borderWidth:2},
          {label:'North',data:nR.map(r=>parseFloat(r.total)||0),borderColor:'#6AB2E2',backgroundColor:'rgba(106,178,226,.07)',tension:.4,fill:true,borderWidth:2},
        ]
      },
      options:{...CHART_CFG,responsive:true}
    });
  }

  const wrc=document.getElementById('chart-wr');
  if(wrc&&D.winrate){
    const labels=D.winrate.map(r=>r.ano);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.winrate.map(r=>+(parseFloat(r.qWR)*100).toFixed(1)),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.07)',tension:.4,fill:true,borderWidth:2},
      {label:'North',data:D.winrate.map(r=>+(parseFloat(r.nWR)*100).toFixed(1)),borderColor:'#6AB2E2',backgroundColor:'rgba(106,178,226,.07)',tension:.4,fill:true,borderWidth:2},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.winrate.map(r=>campus==='q'?+(parseFloat(r.qWR)*100).toFixed(1):+(parseFloat(r.nWR)*100).toFixed(1)),
      borderColor:campus==='q'?'#DC1E33':'#6AB2E2',
      backgroundColor:campus==='q'?'rgba(220,30,51,.07)':'rgba(106,178,226,.07)',
      tension:.4,fill:true,borderWidth:2
    }];
    charts.wr=new Chart(wrc,{type:'line',data:{labels,datasets:ds},options:{...CHART_CFG,responsive:true,scales:{...CHART_CFG.scales,y:{...CHART_CFG.scales.y,ticks:{...CHART_CFG.scales.y.ticks,callback:v=>v+'%'}}}}});
  }

  const coc=document.getElementById('chart-cohort');
  if(coc&&D.cohort){
    const labels=D.cohort.map(r=>r.ano);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.cohort.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)),backgroundColor:'rgba(220,30,51,.72)',borderRadius:4},
      {label:'North',data:D.cohort.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:'rgba(106,178,226,.8)',borderRadius:4},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.cohort.map(r=>campus==='q'?+(parseFloat(r.qRet)*100).toFixed(1):+(parseFloat(r.nRet)*100).toFixed(1)),
      backgroundColor:campus==='q'?'rgba(220,30,51,.72)':'rgba(106,178,226,.8)',borderRadius:4
    }];
    charts.cohort=new Chart(coc,{type:'bar',data:{labels,datasets:ds},options:{...CHART_CFG,responsive:true,scales:{...CHART_CFG.scales,y:{...CHART_CFG.scales.y,min:70,max:100,ticks:{...CHART_CFG.scales.y.ticks,callback:v=>v+'%'}}}}});
  }
}

// TABS
function buildTabNav(){
  const ctr=document.getElementById('tab-group');ctr.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const btn=document.createElement('button');btn.className='tab-btn'+(t.id===activeTab?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{
      activeTab=t.id;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      const panel=document.getElementById('panel-'+t.id);
      if(panel){panel.classList.add('active');setTimeout(()=>{panel.querySelectorAll('.f-fill').forEach(el=>{const w=el.dataset.w;if(w)el.style.width=w+'%';});},80);}
    };
    ctr.appendChild(btn);
  });
}

// CAMPUS
document.querySelectorAll('.campus-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    campus=btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render();
  });
});

// ADMIN
function buildAdmin(){
  const ctr=document.getElementById('sec-toggles');
  TABS.forEach(t=>{
    const p=document.createElement('div');p.className='pill active';
    p.innerHTML='<span class="dot"></span>'+t.label;
    p.onclick=()=>{
      sVis[t.id]=!sVis[t.id];p.classList.toggle('active',sVis[t.id]);
      if(!sVis[t.id]&&activeTab===t.id)activeTab=TABS.find(x=>sVis[x.id])?.id||TABS[0].id;
      render();
    };
    ctr.appendChild(p);
  });
}
document.getElementById('btn-admin').addEventListener('click',()=>document.getElementById('admin-panel').classList.toggle('open'));

// UI
function showApp(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
}
function showLoad(msg){const el=document.getElementById('loading');el.querySelector('.load-txt').textContent=msg||'Cargando...';el.classList.remove('hidden');}
function hideLoad(){document.getElementById('loading').classList.add('hidden');}

// INIT
buildAdmin();buildTabNav();
window.onload=()=>{
  const safetyTimeout=setTimeout(()=>{hideLoad();document.getElementById('login-screen').style.display='flex';},10000);
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{clearTimeout(safetyTimeout);initAuth();};
  s.onerror=()=>{clearTimeout(safetyTimeout);hideLoad();document.getElementById('login-screen').style.display='flex';};
  document.head.appendChild(s);
};
</script>
