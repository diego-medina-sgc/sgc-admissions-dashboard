<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions Dashboard 2026 · St George's College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --red:#DC1E33; --blue:#213669; --blue-mid:#2d4a8a; --blue-lt:#e8edf5;
      --cream:#faf8f5; --ink:#1a1a2e; --muted:#6b7280; --border:#dde1e9;
      --card:#ffffff; --green:#16a34a; --radius:6px; --shadow:0 2px 12px rgba(33,54,105,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--blue);gap:32px;}
    .logo-text{font-family:'Cormorant Garamond',serif;color:#fff;font-size:2.2rem;font-weight:600;letter-spacing:.04em;text-align:center;}
    .logo-sub{font-size:.85rem;color:rgba(255,255,255,.55);letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-top:4px;}
    .divider{width:40px;height:2px;background:var(--red);}
    .btn-google{display:flex;align-items:center;gap:12px;background:#fff;border:none;border-radius:4px;padding:12px 28px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;color:var(--ink);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .15s,box-shadow .15s;}
    .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .login-note{font-size:.78rem;color:rgba(255,255,255,.4);text-align:center;}

    /* APP */
    #app{display:none;flex-direction:column;min-height:100vh;}
    header{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18);}
    .header-brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:10px;}
    .header-brand .badge{background:var(--red);color:#fff;font-family:'DM Mono',monospace;font-size:.65rem;padding:2px 7px;border-radius:3px;letter-spacing:.08em;}
    .header-right{display:flex;align-items:center;gap:16px;}
    .last-updated{font-size:.75rem;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;}
    .btn-admin{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:4px;font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
    .btn-admin:hover{background:rgba(255,255,255,.2);}
    .btn-signout{background:none;border:none;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .btn-signout:hover{color:#fff;}

    /* ADMIN */
    #admin-panel{display:none;background:var(--blue);border-bottom:2px solid var(--red);padding:20px 32px;gap:24px;flex-wrap:wrap;}
    #admin-panel.open{display:flex;}
    .admin-group{display:flex;flex-direction:column;gap:8px;}
    .admin-group-label{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;}
    .admin-toggles{display:flex;flex-wrap:wrap;gap:8px;}
    .toggle-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;cursor:pointer;user-select:none;transition:all .15s;font-size:.8rem;color:rgba(255,255,255,.7);}
    .toggle-pill.active{background:var(--red);border-color:var(--red);color:#fff;}
    .toggle-pill .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;}
    .toggle-pill.active .dot{background:rgba(255,255,255,.9);}

    /* MAIN */
    main{flex:1;padding:32px;max-width:1400px;margin:0 auto;width:100%;}
    .section{margin-bottom:40px;}
    .section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--blue);}
    .section-sub{font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;}

    /* KPI CARDS */
    .headline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 16px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);transition:box-shadow .15s;position:relative;overflow:hidden;}
    .kpi-card:hover{box-shadow:0 4px 24px rgba(33,54,105,.13);}
    .kpi-card.accent::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
    .kpi-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .kpi-value{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--blue);line-height:1;}
    .kpi-value.red{color:var(--red);}
    .kpi-value.green{color:var(--green);}
    .kpi-sub{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;}

    /* TABLES */
    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);}
    table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--card);}
    thead th{background:var(--blue);color:#fff;padding:10px 14px;text-align:left;font-weight:500;font-size:.75rem;letter-spacing:.05em;white-space:nowrap;}
    thead th.r{text-align:right;}
    tbody tr{border-bottom:1px solid var(--border);}
    tbody tr:last-child{border-bottom:none;}
    tbody tr.group-row td{background:var(--blue-lt);font-weight:600;color:var(--blue);font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;}
    tbody tr.total-row td{font-weight:600;background:#f7f8fb;}
    tbody tr:hover:not(.group-row):not(.total-row){background:#f7f8fb;}
    td{padding:9px 14px;color:var(--ink);}
    td.r{text-align:right;font-family:'DM Mono',monospace;font-size:.8rem;}
    .tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.7rem;font-weight:600;font-family:'DM Mono',monospace;}
    .tag.natural{background:#dcfce7;color:#15803d;}
    .tag.exogena{background:#fef3c7;color:#92400e;}
    .tag.accionable{background:#fee2e2;color:#b91c1c;}

    /* TWO COL */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:900px){.two-col{grid-template-columns:1fr;}}

    /* CHART */
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}
    .chart-title{font-size:.78rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
    .chart-card canvas{max-height:260px;}

    /* FUNNEL */
    .funnel-wrap{display:flex;flex-direction:column;gap:6px;}
    .funnel-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;}
    .funnel-stage{font-size:.82rem;font-weight:500;min-width:200px;}
    .funnel-bar-wrap{flex:1;height:8px;background:var(--blue-lt);border-radius:4px;overflow:hidden;}
    .funnel-bar{height:100%;background:var(--blue);border-radius:4px;}
    .funnel-row.won .funnel-bar{background:var(--green);}
    .funnel-nums{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);min-width:160px;text-align:right;}

    /* CAMPUS TABS */
    .campus-tabs{display:flex;gap:8px;margin-bottom:16px;}
    .campus-tab{padding:7px 18px;border-radius:4px;border:1px solid var(--border);background:var(--card);font-size:.8rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;}
    .campus-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

    /* LOADING */
    #loading-overlay{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200;transition:opacity .4s;}
    #loading-overlay.hidden{opacity:0;pointer-events:none;}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loading-overlay p{color:rgba(255,255,255,.6);font-size:.85rem;font-family:'DM Mono',monospace;}

    footer{text-align:center;padding:20px 32px;font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;border-top:1px solid var(--border);}
  </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p>Cargando…</p></div>

<div id="login-screen">
  <div><div class="logo-text">St George's College</div><div class="logo-sub">Admissions Dashboard · 2026</div></div>
  <div class="divider"></div>
  <button class="btn-google" id="btn-login">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Ingresar con Google
  </button>
  <div class="login-note">Solo cuentas autorizadas de St George's College</div>
</div>

<div id="app">
  <header>
    <div class="header-brand">St George's College <span class="badge">ADMISSIONS 2026</span></div>
    <div class="header-right">
      <span class="last-updated" id="last-updated-label">—</span>
      <button class="btn-admin" id="btn-toggle-admin">⚙ Admin</button>
      <button class="btn-signout" id="btn-signout">Salir</button>
    </div>
  </header>

  <div id="admin-panel">
    <div class="admin-group">
      <div class="admin-group-label">Secciones visibles</div>
      <div class="admin-toggles" id="section-toggles"></div>
    </div>
  </div>

  <main id="main-content"></main>
  <footer>Dashboard de Admisiones · St George's College · Datos en tiempo real desde Google Sheets</footer>
</div>

<script>
// ═══════════════════════════════
//  CONFIG
// ═══════════════════════════════
const CLIENT_ID = '451910290982-vudb6uk5047r19ruujlae16ouhdh0km8.apps.googleusercontent.com';
const API_URL   = 'https://script.google.com/macros/s/AKfycbyJDI5osYSQ4JpPB9ahuSz8EqU84HpQvoPDSkZo97FEuE2_s0avu4iSVQ1kfxVmrJODlg/exec';

const SECTIONS = [
  { id:'headline',    label:'Indicadores Headline' },
  { id:'kpis-campus', label:'KPIs por Campus' },
  { id:'pipeline',    label:'Pipeline Activo 2027' },
  { id:'winrate',     label:'Win Rate Histórico' },
  { id:'funnel',      label:'Funnel de Conversión' },
  { id:'withdrawals', label:'Withdrawals' },
  { id:'cohort',      label:'Cohort Retention' },
];

let sectionVisibility = Object.fromEntries(SECTIONS.map(s=>[s.id,true]));
let tokenClient, accessToken, charts = {}, D = {};

// ═══════════════════════════════
//  AUTH
// ═══════════════════════════════
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
    callback: resp => {
      if (resp.error) { alert('Error auth: '+resp.error); return; }
      accessToken = resp.access_token;
      showApp();
      fetchData();
    },
  });
  hideOverlay();
}

document.getElementById('btn-login').addEventListener('click', () => {
  tokenClient.requestAccessToken({ prompt:'select_account' });
});

document.getElementById('btn-signout').addEventListener('click', () => {
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  });
});

// ═══════════════════════════════
//  FETCH — App Script API
// ═══════════════════════════════
function fetchData() {
  showOverlay('Leyendo datos…');
  // Usar JSONP para evitar CORS con App Script
  const callbackName = 'sgcDashboardCallback';
  window[callbackName] = function(data) {
    D = data;
    document.getElementById('last-updated-label').textContent =
      'Actualizado: ' + new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    render();
    delete window[callbackName];
    document.getElementById('jsonp-script').remove();
  };
  const script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = API_URL + '?callback=' + callbackName;
  script.onerror = () => {
    hideOverlay();
    alert('Error al cargar datos del dashboard.');
  };
  document.head.appendChild(script);
}

// ═══════════════════════════════
//  FORMAT HELPERS
// ═══════════════════════════════
function fmtN(v) {
  if (v === '—' || v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return Math.round(n).toLocaleString('es-AR');
}
function fmtPct(v) {
  if (v === '—' || v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return (n * 100).toFixed(1) + '%';
}
function fmtVal(v) {
  if (v === '—' || v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  if (n > -2 && n < 2 && String(v).includes('.')) return fmtPct(n);
  return fmtN(n);
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function render() {
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  SECTIONS.forEach(s => {
    if (!sectionVisibility[s.id]) return;
    const el = buildSection(s.id);
    if (el) main.appendChild(el);
  });
  drawCharts();
  hideOverlay();
}

function sec(id, title, sub, content) {
  const s = document.createElement('div');
  s.className = 'section'; s.id = 'sec-'+id;
  s.innerHTML = `<div class="section-header"><span class="section-title">${title}</span>${sub?`<span class="section-sub">${sub}</span>`:''}</div>`;
  s.appendChild(content);
  return s;
}

function buildSection(id) {
  switch(id) {
    case 'headline':    return buildHeadline();
    case 'kpis-campus': return buildKpiCampus();
    case 'pipeline':    return buildPipeline();
    case 'winrate':     return buildWinRate();
    case 'funnel':      return buildFunnel();
    case 'withdrawals': return buildWithdrawals();
    case 'cohort':      return buildCohort();
  }
}

// ── HEADLINE ──
function buildHeadline() {
  const h = D.headline;
  const varN = parseFloat(h.variacion_anual)*100;
  const cards = [
    { label:'Total Alumnos',      value:fmtN(h.total_alumnos),              sub:'One School 2026',            accent:true },
    { label:'Variación Anual',    value:(varN).toFixed(2)+'%',              sub:'2025 vs 2026',               color: varN<0?'red':'green' },
    { label:'Retención Quilmes',  value:fmtPct(h.retencion_quilmes),        sub:'Promedio ponderado' },
    { label:'Retención North',    value:fmtPct(h.retencion_north),          sub:'Promedio ponderado' },
    { label:'New Students 2026',  value:fmtN(h.new_students),               sub:'Quilmes + North' },
    { label:'Win Rate 2026',      value:fmtPct(h.win_rate),                 sub:'Won / (Won + Lost)' },
    { label:'Prospectos Activos', value:fmtN(h.prospectos),                 sub:'Pipeline 2026 abierto' },
  ];
  const grid = document.createElement('div');
  grid.className = 'headline-grid';
  cards.forEach(c => {
    grid.innerHTML += `<div class="kpi-card${c.accent?' accent':''}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value ${c.color||''}">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`;
  });
  return sec('headline','Indicadores Headline','One School · 2026',grid);
}

// ── KPIs CAMPUS ──
function buildKpiCampus() {
  const wrap = document.createElement('div');
  const tabs = document.createElement('div'); tabs.className='campus-tabs';
  const tableWrap = document.createElement('div'); tableWrap.className='table-wrap';

  ['Quilmes','North'].forEach((name,i) => {
    const t = document.createElement('button');
    t.className = 'campus-tab'+(i===0?' active':'');
    t.textContent = name;
    t.onclick = () => {
      tabs.querySelectorAll('.campus-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      tableWrap.innerHTML = buildKpiTable(i===0 ? D.quilmes : D.north);
    };
    tabs.appendChild(t);
  });

  tableWrap.innerHTML = buildKpiTable(D.quilmes);
  wrap.appendChild(tabs);
  wrap.appendChild(tableWrap);
  return sec('kpis-campus','KPIs por Sección y Campus','Matrícula · Ocupación · Retención',wrap);
}

function buildKpiTable(campus) {
  const secciones = [
    { label:'KINDER',  total: campus.kinder.total,  rows: ['K1','K2','K3','K4','K5'].map(k=>({label:k, data:campus.kinder[k]})) },
    { label:'PREP',    total: campus.prep.total,     rows: ['P1','P2','P3','P4','P5','P6'].map(k=>({label:k, data:campus.prep[k]})) },
    { label:'COLLEGE', total: campus.college.total,  rows: ['C1','C2','C3','C4','C5','C6'].map(k=>({label:k, data:campus.college[k]})) },
  ];

  let html = `<table><thead><tr>
    <th>Nivel</th><th>Grado</th>
    <th class="r">Matrícula</th><th class="r">Ocupación</th><th class="r">Vacantes</th>
    <th class="r">Retención</th><th class="r">New Students</th><th class="r">Withdrawals</th><th class="r">Prospectos</th>
  </tr></thead><tbody>`;

  secciones.forEach(s => {
    html += `<tr class="group-row"><td colspan="9">${s.label}</td></tr>`;
    const t = s.total;
    html += `<tr class="total-row"><td></td><td>TOTAL ${s.label}</td>
      <td class="r">${fmtN(t.matricula)}</td><td class="r">${fmtPct(t.ocupacion)}</td><td class="r">${fmtN(t.vacantes)}</td>
      <td class="r">${fmtPct(t.retencion)}</td><td class="r">${fmtN(t.new_students)}</td><td class="r">${fmtN(t.withdrawals)}</td><td class="r">${fmtN(t.prospectos)}</td>
    </tr>`;
    s.rows.forEach(r => {
      const d = r.data;
      html += `<tr><td></td><td>${r.label}</td>
        <td class="r">${fmtVal(d.matricula)}</td><td class="r">${fmtVal(d.ocupacion)}</td><td class="r">${fmtVal(d.vacantes)}</td>
        <td class="r">${fmtVal(d.retencion)}</td><td class="r">${fmtVal(d.new_students)}</td><td class="r">${fmtVal(d.withdrawals)}</td><td class="r">${fmtVal(d.prospectos)}</td>
      </tr>`;
    });
  });

  html += `<tr class="total-row" style="border-top:2px solid var(--blue)">
    <td colspan="2" style="font-weight:700;color:var(--blue)">TOTAL CAMPUS</td>
    <td class="r">${fmtN(campus.total.matricula)}</td><td class="r">${fmtPct(campus.total.ocupacion)}</td><td class="r">${fmtN(campus.total.vacantes)}</td>
    <td class="r">${fmtPct(campus.total.retencion)}</td><td class="r">${fmtN(campus.total.new_students)}</td><td class="r">${fmtN(campus.total.withdrawals)}</td><td class="r">${fmtN(campus.total.prospectos)}</td>
  </tr>`;

  html += '</tbody></table>';
  return html;
}

// ── PIPELINE ──
function buildPipeline() {
  const wrap = document.createElement('div'); wrap.className='table-wrap';
  let html = `<table><thead><tr>
    <th>Etapa</th>
    <th class="r">Q·Kinder</th><th class="r">Q·Prep</th><th class="r">Q·College</th><th class="r">Q·Total</th>
    <th class="r">N·Kinder</th><th class="r">N·Prep</th><th class="r">N·College</th><th class="r">N·Total</th>
    <th class="r">Total</th>
  </tr></thead><tbody>`;
  D.pipeline.forEach(p => {
    const won = p.isWon;
    html += `<tr style="${won?'background:#f0fdf4;font-weight:600':''}">
      <td>${p.etapa}</td>
      <td class="r">${fmtN(p.qK)}</td><td class="r">${fmtN(p.qP)}</td><td class="r">${fmtN(p.qC)}</td><td class="r">${fmtN(p.qT)}</td>
      <td class="r">${fmtN(p.nK)}</td><td class="r">${fmtN(p.nP)}</td><td class="r">${fmtN(p.nC)}</td><td class="r">${fmtN(p.nT)}</td>
      <td class="r">${fmtN(p.total)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  return sec('pipeline','Pipeline Activo 2027','Foto del funnel en curso · Insightly',wrap);
}

// ── WIN RATE ──
function buildWinRate() {
  const wrap = document.createElement('div'); wrap.className='two-col';
  const tableCard = document.createElement('div'); tableCard.className='table-wrap';
  let html = `<table><thead><tr>
    <th>Año</th><th class="r">Q·Pipeline</th><th class="r">Q·Won</th><th class="r">Q·Win Rate</th>
    <th class="r">N·Pipeline</th><th class="r">N·Won</th><th class="r">N·Win Rate</th>
    <th class="r">OS·Win Rate</th>
  </tr></thead><tbody>`;
  D.winrate.forEach(r => {
    html += `<tr>
      <td style="font-weight:600">${r.año}</td>
      <td class="r">${fmtN(r.qPipeline)}</td><td class="r">${fmtN(r.qWon)}</td><td class="r">${fmtPct(r.qWR)}</td>
      <td class="r">${fmtN(r.nPipeline)}</td><td class="r">${fmtN(r.nWon)}</td><td class="r">${fmtPct(r.nWR)}</td>
      <td class="r">${fmtPct(r.osWR)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  tableCard.innerHTML = html;
  const chartCard = document.createElement('div'); chartCard.className='chart-card';
  chartCard.innerHTML = '<div class="chart-title">Evolución Win Rate %</div><canvas id="chart-winrate"></canvas>';
  wrap.appendChild(tableCard); wrap.appendChild(chartCard);
  return sec('winrate','Win Rate Histórico','2021–2026 · Quilmes vs North',wrap);
}

// ── FUNNEL ──
function buildFunnel() {
  const wrap = document.createElement('div'); wrap.className='funnel-wrap';
  const max = Math.max(...D.funnel.map(f=>f.llegaron));
  D.funnel.forEach(f => {
    const pct = max>0 ? (f.llegaron/max*100) : 0;
    const pctPerd = (parseFloat(f.pctPerd)*100).toFixed(0);
    const div = document.createElement('div');
    div.className = 'funnel-row'+(f.isWon?' won':'');
    div.innerHTML = `
      <div class="funnel-stage">${f.etapa}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${pct}%"></div></div>
      <div class="funnel-nums">${fmtN(f.llegaron)} llegaron · ${pctPerd}% baja</div>`;
    wrap.appendChild(div);
  });
  return sec('funnel','Funnel de Conversión','Histórico 2021–2026',wrap);
}

// ── WITHDRAWALS ──
function buildWithdrawals() {
  const wrap = document.createElement('div'); wrap.className='table-wrap';
  let html = `<table><thead><tr>
    <th>Causa</th><th>Tipo</th>
    <th class="r">Q 2025</th><th class="r">Q 2026</th>
    <th class="r">N 2025</th><th class="r">N 2026</th>
    <th class="r">Total 2025</th><th class="r">Total 2026</th>
  </tr></thead><tbody>`;
  D.withdrawals.forEach(w => {
    const tag = w.tipo.toLowerCase().includes('natural')?'natural':w.tipo.toLowerCase().includes('exógena')?'exogena':'accionable';
    html += `<tr><td>${w.causa}</td><td><span class="tag ${tag}">${w.tipo}</span></td>
      <td class="r">${fmtN(w.q2025)}</td><td class="r">${fmtN(w.q2026)}</td>
      <td class="r">${fmtN(w.n2025)}</td><td class="r">${fmtN(w.n2026)}</td>
      <td class="r">${fmtN(w.tot2025)}</td><td class="r">${fmtN(w.tot2026)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  return sec('withdrawals','Withdrawals por Causa','Análisis de bajas 2025 vs 2026',wrap);
}

// ── COHORT ──
function buildCohort() {
  const wrap = document.createElement('div'); wrap.className='two-col';
  const tableCard = document.createElement('div'); tableCard.className='table-wrap';
  let html = `<table><thead><tr>
    <th>Cohorte</th>
    <th class="r">Q·Ingresaron</th><th class="r">Q·Activos</th><th class="r">Q·Ret%</th>
    <th class="r">N·Ingresaron</th><th class="r">N·Activos</th><th class="r">N·Ret%</th>
  </tr></thead><tbody>`;
  D.cohort.forEach(r => {
    html += `<tr><td style="font-weight:600">${r.año}</td>
      <td class="r">${fmtN(r.qIngresaron)}</td><td class="r">${fmtN(r.qActivos)}</td><td class="r">${fmtPct(r.qRet)}</td>
      <td class="r">${fmtN(r.nIngresaron)}</td><td class="r">${fmtN(r.nActivos)}</td><td class="r">${fmtPct(r.nRet)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  tableCard.innerHTML = html;
  const chartCard = document.createElement('div'); chartCard.className='chart-card';
  chartCard.innerHTML = '<div class="chart-title">Retención por Cohorte</div><canvas id="chart-cohort"></canvas>';
  wrap.appendChild(tableCard); wrap.appendChild(chartCard);
  return sec('cohort','Cohort Retention','Fidelización generacional · ISAMS',wrap);
}

// ── CHARTS ──
function drawCharts() {
  const wr = D.winrate;
  const wrCanvas = document.getElementById('chart-winrate');
  if (wrCanvas && wr) {
    charts.winrate = new Chart(wrCanvas, {
      type:'line',
      data:{
        labels: wr.map(r=>r.año),
        datasets:[
          { label:'Quilmes', data:wr.map(r=>+(parseFloat(r.qWR)*100).toFixed(1)), borderColor:'#213669', backgroundColor:'rgba(33,54,105,.1)', tension:.35, fill:true },
          { label:'North',   data:wr.map(r=>+(parseFloat(r.nWR)*100).toFixed(1)), borderColor:'#DC1E33', backgroundColor:'rgba(220,30,51,.07)', tension:.35, fill:true },
        ]
      },
      options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{ y:{ticks:{callback:v=>v+'%'},grid:{color:'#f0f0f0'}}, x:{grid:{display:false}} } }
    });
  }

  const co = D.cohort;
  const coCanvas = document.getElementById('chart-cohort');
  if (coCanvas && co) {
    charts.cohort = new Chart(coCanvas, {
      type:'bar',
      data:{
        labels: co.map(r=>r.año),
        datasets:[
          { label:'Quilmes', data:co.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)), backgroundColor:'rgba(33,54,105,.75)', borderRadius:3 },
          { label:'North',   data:co.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)), backgroundColor:'rgba(220,30,51,.7)',  borderRadius:3 },
        ]
      },
      options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{ y:{min:70,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f0f0f0'}}, x:{grid:{display:false}} } }
    });
  }
}

// ── ADMIN ──
function buildAdminPanel() {
  const container = document.getElementById('section-toggles');
  SECTIONS.forEach(s => {
    const pill = document.createElement('div');
    pill.className = 'toggle-pill active';
    pill.innerHTML = `<span class="dot"></span>${s.label}`;
    pill.onclick = () => {
      sectionVisibility[s.id] = !sectionVisibility[s.id];
      pill.classList.toggle('active', sectionVisibility[s.id]);
      render();
    };
    container.appendChild(pill);
  });
}
document.getElementById('btn-toggle-admin').addEventListener('click', () => {
  document.getElementById('admin-panel').classList.toggle('open');
});

// ── UI ──
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex'; app.style.flexDirection = 'column';
}
function showOverlay(msg) {
  const el = document.getElementById('loading-overlay');
  el.querySelector('p').textContent = msg||'Cargando…';
  el.classList.remove('hidden');
}
function hideOverlay() { document.getElementById('loading-overlay').classList.add('hidden'); }
