<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admissions Dashboard 2026 · St George's College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Aleo:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Asap:wght@300;400;500;600&family=Asap+Condensed:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --red:     #DC1E33;
      --navy:    #213469;
      --celeste: #6AB2E2;
      --violet:  #6B6EB3;
      --teal:    #109AA9;
      --cream:   #FAF7F2;
      --paper:   #F4F1EA;
      --ink:     #1A1F35;
      --gray:    #6B7180;
      --line:    #E5E1D8;
      --white:   #FFFFFF;
      --green:   #15803d;
      --green-lt:#dcfce7;
      --amber:   #b45309;
      --amber-lt:#fef3c7;
      --r: 6px;
      --sh: 0 1px 4px rgba(26,31,53,.06);
      --sh2: 0 4px 20px rgba(26,31,53,.11);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Asap', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

    /* ══ LOGIN ══ */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--cream);
    }
    .login-box {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      padding: 56px 48px; max-width: 420px; width: 100%;
      background: var(--white); border-radius: 8px;
      box-shadow: 0 8px 48px rgba(26,31,53,.12);
    }
    .login-logo { width: 160px; object-fit: contain; }
    .login-divider { width: 100%; height: 1px; background: var(--line); }
    .login-desc { font-size: .82rem; color: var(--gray); text-align: center; line-height: 1.5; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--white); border: 1.5px solid var(--line);
      border-radius: 4px; padding: 11px 24px; width: 100%;
      font-family: 'Asap', sans-serif; font-size: .88rem; font-weight: 500; color: var(--ink);
      cursor: pointer; box-shadow: var(--sh); transition: box-shadow .15s, border-color .15s;
    }
    .btn-google:hover { box-shadow: var(--sh2); border-color: var(--navy); }

    /* ══ APP ══ */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ══ HEADER ══ */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 1px 8px rgba(26,31,53,.06);
    }
    .h-left { display: flex; align-items: center; gap: 16px; }
    .h-logo { height: 40px; width: auto; object-fit: contain; }
    .h-divider { width: 1px; height: 32px; background: var(--line); }
    .h-titles { display: flex; flex-direction: column; gap: 1px; }
    .h-title { font-family: 'Aleo', serif; font-size: 1rem; font-weight: 600; color: var(--ink); line-height: 1; }
    .h-sub { font-size: .65rem; color: var(--gray); letter-spacing: .12em; text-transform: uppercase; font-family: 'Asap Condensed', sans-serif; }
    .h-right { display: flex; align-items: center; gap: 12px; }
    .h-time { font-size: .68rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .04em; }
    .btn-sm {
      background: none; border: 1.5px solid var(--line);
      color: var(--gray); padding: 5px 12px; border-radius: 4px;
      font-size: .75rem; cursor: pointer; font-family: 'Asap', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .btn-sm:hover { border-color: var(--navy); color: var(--navy); }
    .btn-out { background: none; border: none; color: var(--gray); font-size: .72rem; cursor: pointer; font-family: 'Asap', sans-serif; transition: color .15s; }
    .btn-out:hover { color: var(--red); }

    /* ══ NAV BAR ══ */
    .nav-bar {
      background: var(--white);
      border-bottom: 2px solid var(--line);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 64px; z-index: 190;
    }

    /* Campus Toggle */
    .campus-group { display: flex; gap: 8px; padding: 10px 0; }
    .campus-btn {
      padding: 6px 18px; border-radius: 20px;
      font-family: 'Asap', sans-serif; font-size: .78rem; font-weight: 500;
      cursor: pointer; transition: all .2s; border: 1.5px solid var(--line);
      background: var(--white); color: var(--gray);
    }
    .campus-btn:hover { border-color: var(--navy); color: var(--navy); }
    .campus-btn[data-c="os"].active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .campus-btn[data-c="q"].active  { background: var(--red); border-color: var(--red); color: var(--white); }
    .campus-btn[data-c="n"].active  { background: var(--celeste); border-color: var(--celeste); color: var(--white); }

    /* Tabs */
    .tab-group { display: flex; }
    .tab-btn {
      padding: 12px 16px; background: none; border: none;
      font-family: 'Asap', sans-serif; font-size: .75rem; font-weight: 500;
      color: var(--gray); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all .2s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

    /* ══ ADMIN ══ */
    #admin-panel {
      display: none; background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 12px 32px; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    #admin-panel.open { display: flex; }
    .adm-lbl { font-size: .65rem; color: var(--gray); letter-spacing: .1em; text-transform: uppercase; font-family: 'Asap Condensed', sans-serif; margin-right: 4px; }
    .pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--white); border: 1.5px solid var(--line);
      border-radius: 20px; padding: 4px 12px;
      cursor: pointer; user-select: none;
      font-size: .73rem; color: var(--gray); font-family: 'Asap', sans-serif;
      transition: all .15s;
    }
    .pill.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .7; flex-shrink: 0; }

    /* ══ CONTENT ══ */
    main { flex: 1; }
    .tab-panel { display: none; padding: 28px 32px; max-width: 1440px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ══ SECTION ══ */
    .sec { margin-bottom: 36px; }
    .sec-hd { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
    .sec-title { font-family: 'Aleo', serif; font-size: 1.25rem; font-weight: 600; color: var(--navy); }
    .sec-meta { font-size: .67rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .06em; }

    /* ══ KPI CARDS ══ */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; }
    .kpi-card {
      background: var(--white); border: 1px solid var(--line); border-radius: var(--r);
      padding: 16px 18px 14px; position: relative; overflow: hidden;
      box-shadow: var(--sh); transition: box-shadow .2s, transform .2s;
    }
    .kpi-card:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
    .kpi-card.accent::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--red);
    }
    .kpi-lbl { font-size: .62rem; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--gray); margin-bottom: 7px; font-family: 'Asap Condensed', sans-serif; }
    .kpi-val { font-family: 'Aleo', serif; font-size: 2.1rem; font-weight: 700; color: var(--navy); line-height: 1; margin-bottom: 5px; }
    .kpi-val.neg { color: var(--red); }
    .kpi-val.pos { color: var(--green); }
    .kpi-foot { font-size: .63rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; }

    /* ══ TABLES ══ */
    .tw { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--line); box-shadow: var(--sh); }
    table { width: 100%; border-collapse: collapse; font-size: .78rem; background: var(--white); }
    thead th {
      background: var(--navy); color: var(--white);
      padding: 9px 13px; text-align: left;
      font-weight: 600; font-size: .67rem; letter-spacing: .07em;
      white-space: nowrap; font-family: 'Asap Condensed', sans-serif;
    }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--line); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.grp td { background: #EEF1F8; color: var(--navy); font-weight: 600; font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; padding: 7px 13px; font-family: 'Asap Condensed', sans-serif; }
    tbody tr.tot td { font-weight: 600; background: #F7F5F0; }
    tbody tr.ctot td { font-weight: 700; background: #EEF1F8; color: var(--navy); border-top: 2px solid var(--navy); }
    tbody tr.won-row td { background: #f0fdf4; font-weight: 600; }
    tbody tr.proj-row td { background: #FFFBEB; font-style: italic; }
    tbody tr:hover:not(.grp):not(.tot):not(.ctot):not(.won-row):not(.proj-row) { background: #F9F7F3; }
    td { padding: 8px 13px; }
    td.r { text-align: right; font-family: 'Asap Condensed', sans-serif; font-size: .76rem; }
    .tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: .62rem; font-weight: 600; font-family: 'Asap Condensed', sans-serif; letter-spacing: .04em; }
    .tag.nat { background: var(--green-lt); color: var(--green); }
    .tag.exo { background: var(--amber-lt); color: var(--amber); }
    .tag.act { background: #fee2e2; color: #b91c1c; }
    .badge-proj { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: .6rem; font-weight: 600; background: var(--amber-lt); color: var(--amber); font-family: 'Asap Condensed', sans-serif; margin-left: 4px; }
    .val-pos { color: var(--green); font-weight: 600; }
    .val-neg { color: var(--red); font-weight: 600; }

    /* ══ TWO COL ══ */
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 860px) { .two { grid-template-columns: 1fr; } }

    /* ══ CHART CARD ══ */
    .cc { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 20px 22px; box-shadow: var(--sh); }
    .cc-ttl { font-size: .67rem; font-weight: 600; color: var(--gray); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; font-family: 'Asap Condensed', sans-serif; }
    canvas { max-height: 240px; }

    /* ══ FUNNEL ══ */
    .funnel { display: flex; flex-direction: column; gap: 6px; }
    .f-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--white); border: 1px solid var(--line);
      border-radius: var(--r); padding: 10px 16px;
      transition: box-shadow .15s, transform .15s; cursor: default;
    }
    .f-row:hover { box-shadow: var(--sh2); transform: translateX(4px); }
    .f-row.won { border-color: var(--teal); }
    .f-row.won:hover { box-shadow: 0 4px 16px rgba(16,154,169,.15); }
    .f-lbl { font-size: .8rem; font-weight: 500; min-width: 185px; font-family: 'Asap', sans-serif; }
    .f-track { flex: 1; height: 8px; background: var(--paper); border-radius: 4px; overflow: hidden; }
    .f-fill { height: 100%; background: var(--navy); border-radius: 4px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .f-row.won .f-fill { background: var(--teal); }
    .f-nums { font-family: 'Asap Condensed', sans-serif; font-size: .72rem; color: var(--gray); min-width: 180px; text-align: right; }
    .f-badge { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: .65rem; font-weight: 600; background: #fee2e2; color: #b91c1c; margin-left: 6px; }
    .f-row.won .f-badge { background: var(--green-lt); color: var(--green); }

    /* ══ SIMULATOR ══ */
    .sim-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .sim-btn { padding: 6px 14px; border-radius: 4px; border: 1.5px solid var(--line); background: var(--white); font-family: 'Asap', sans-serif; font-size: .75rem; font-weight: 500; color: var(--gray); cursor: pointer; transition: all .15s; }
    .sim-btn:hover { border-color: var(--navy); color: var(--navy); }
    .sim-btn.primary { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .sim-btn.danger { background: var(--red); border-color: var(--red); color: var(--white); }
    .sim-totals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .sim-total-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; }
    .sim-total-lbl { font-size: .62rem; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; font-family: 'Asap Condensed', sans-serif; }
    .sim-total-val { font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700; color: var(--navy); }
    .sim-total-delta { font-size: .7rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; }
    .adj-input { width: 54px; text-align: center; border: 1px solid var(--line); border-radius: 3px; padding: 3px 4px; font-family: 'Asap Condensed', sans-serif; font-size: .76rem; color: var(--ink); background: var(--white); }
    .adj-input:focus { outline: none; border-color: var(--navy); }
    .adj-btn { width: 22px; height: 22px; border: 1px solid var(--line); border-radius: 3px; background: var(--white); cursor: pointer; font-size: .85rem; display: inline-flex; align-items: center; justify-content: center; color: var(--gray); transition: all .1s; }
    .adj-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

    /* ══ LOADING ══ */
    #loading { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 300; transition: opacity .4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spin { width: 32px; height: 32px; border: 2px solid var(--line); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .load-logo { width: 100px; opacity: .8; }
    #loading p { color: var(--gray); font-size: .78rem; font-family: 'Asap Condensed', sans-serif; letter-spacing: .1em; text-transform: uppercase; }

    footer { text-align: center; padding: 16px 32px; font-size: .65rem; color: var(--gray); font-family: 'Asap Condensed', sans-serif; letter-spacing: .04em; border-top: 1px solid var(--line); }
    @media (max-width: 640px) { .tab-group { display: none; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } .tab-panel { padding: 16px; } }
  </style>
</head>

// ── DATA ──
function fetchData(){
  showLoad('Cargando datos…');
  const cb='sgcCb_'+Date.now();

    D=data;
    const now=new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

// ── FORMAT ──
const fN=v=>{
  if(v===null||v===undefined||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return Math.round(n).toLocaleString('es-AR');
};
const fP=v=>{
  if(v===null||v===undefined||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  return(n*100).toFixed(1)+'%';
};
const fV=v=>{
  if(v===null||v===undefined||v==='')return'—';
  const n=parseFloat(v);if(isNaN(n))return String(v);
  if(n>-2&&n<2&&String(v).includes('.'))return fP(n);
  return fN(n);
};
const fCrp=v=>{
  if(!v)return'—';
  const n=parseFloat(v)*100;
  const s=n.toFixed(2)+'%';
  return n<0?'<span class="val-neg">'+s+'</span>':'<span class="val-pos">+'+s+'</span>';
};

// ── CAMPUS DATA ──
function getCampusData(){
  if(campus==='q')return D.quilmes;
  if(campus==='n')return D.north;
  return mergeOS();
}
function mergeOS(){
  const q=D.quilmes||{},n=D.north||{};
  const m=(a,b)=>({
    matricula:(parseFloat(a?.matricula)||0)+(parseFloat(b?.matricula)||0),
    ocupacion:null,vacantes:(parseFloat(a?.vacantes)||0)+(parseFloat(b?.vacantes)||0),
    retencion:null,
    new_students:(parseFloat(a?.new_students)||0)+(parseFloat(b?.new_students)||0),
    withdrawals:(parseFloat(a?.withdrawals)||0)+(parseFloat(b?.withdrawals)||0),
    prospectos:(parseFloat(a?.prospectos)||0)+(parseFloat(b?.prospectos)||0),
  });
  const mS=(sec,gr)=>{const r={total:m(q[sec]?.total,n[sec]?.total)};gr.forEach(g=>{r[g]=m(q[sec]?.[g],n[sec]?.[g]);});return r;};
  return{
    total:m(q.total,n.total),
    kinder:mS('kinder',['K1','K2','K3','K4','K5']),
    prep:mS('prep',['P1','P2','P3','P4','P5','P6']),
    college:mS('college',['C1','C2','C3','C4','C5','C6']),
  };
}
function getWRF(r){
  if(campus==='q')return{pipeline:r.qPipeline,won:r.qWon,wr:r.qWR};
  if(campus==='n')return{pipeline:r.nPipeline,won:r.nWon,wr:r.nWR};
  return{pipeline:r.osPipeline,won:r.osWon,wr:r.osWR};
}
function getCohF(r){
  if(campus==='q')return{ing:r.qIngresaron,act:r.qActivos,ret:r.qRet};
  if(campus==='n')return{ing:r.nIngresaron,act:r.nActivos,ret:r.nRet};
  const i=(parseFloat(r.qIngresaron)||0)+(parseFloat(r.nIngresaron)||0);
  const a=(parseFloat(r.qActivos)||0)+(parseFloat(r.nActivos)||0);
  return{ing:i,act:a,ret:i>0?a/i:null};
}

// ── SIMULATOR ──
function initSimAdj(){
  simAdj={};
  // Quilmes grades
  ['K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'].forEach(g=>simAdj['q_'+g]=0);
  // North grades
  ['K1','K2','K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'].forEach(g=>simAdj['n_'+g]=0);
}

function calcSimTotal(campusKey){
  const re=D.resumen;
  if(!re)return{base:0,final:0};
  const rows=campusKey==='q'?re.quilmes:re.north;
  const row2026=rows?.find(r=>r.año===2026)||{};
  const row2027=rows?.find(r=>r.año===2027)||{};
  const base=parseFloat(row2027?.total)||0;
  const adj=Object.entries(simAdj).filter(([k])=>k.startsWith(campusKey+'_')).reduce((s,[,v])=>s+v,0);
  return{base,final:base+adj,adj};
}

function applyScenario(type){
  const grades=['K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'];
  const gradesN=['K1','K2','K3','K4','K5','P1','P2','P3','P4','P5','P6','C1','C2','C3','C4','C5','C6'];
  if(type==='reset'){
    initSimAdj();
  } else if(type==='opt'){
    grades.forEach(g=>{simAdj['q_'+g]=2;});
    gradesN.forEach(g=>{simAdj['n_'+g]=1;});
  } else if(type==='cons'){
    grades.forEach(g=>{simAdj['q_'+g]=-2;});
    gradesN.forEach(g=>{simAdj['n_'+g]=-1;});
  }
  updateSimDisplay();
}

function updateSimDisplay(){
  // Update inputs
  Object.entries(simAdj).forEach(([k,v])=>{
    const el=document.getElementById('adj_'+k);
    if(el)el.value=v;
  });
  // Update totals
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osBase=qT.base+nT.base, osFinal=qT.final+nT.final;
  const setCard=(id,final,base)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.querySelector('.sim-total-val').textContent=Math.round(final).toLocaleString('es-AR');
    const d=Math.round(final-base);
    const pct=(base>0?(final-base)/base*100:0).toFixed(1);
    const sign=d>=0?'+':'';
    el.querySelector('.sim-total-delta').innerHTML=`vs base ${Math.round(base).toLocaleString('es-AR')} <span class="${d<0?'val-neg':'val-pos'}">${sign}${d} (${sign}${pct}%)</span>`;
  };
  setCard('sim-card-q',qT.final,qT.base);
  setCard('sim-card-n',nT.final,nT.base);
  setCard('sim-card-os',osFinal,osBase);
}

// ── RENDER ──
function render(){
  Object.values(charts).forEach(c=>c.destroy());charts={};
  const main=document.getElementById('main');main.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const panel=document.createElement('div');
    panel.className='tab-panel'+(t.id===activeTab?' active':'');
    panel.id='panel-'+t.id;
    const content=buildPanel(t.id);
    if(content)panel.appendChild(content);
    main.appendChild(panel);
  });
  // Animate funnels after DOM insert
  setTimeout(()=>{
    document.querySelectorAll('.f-fill').forEach(el=>{
      const w=el.dataset.w;
      if(w)el.style.width=w+'%';
    });
  },50);
  drawCharts();buildTabNav();hideLoad();
}

function buildPanel(id){
  switch(id){
    case'resumen':return buildResumen();
    case'kpis':return buildKpis();
    case'pipeline':return buildPipeline();
    case'winrate':return buildWinRate();
    case'funnel':return buildFunnel();
    case'withdrawals':return buildWithdrawals();
    case'cohort':return buildCohort();
    case'proyeccion':return buildProyeccion();
  }
}

function sec(title,meta,content){
  const s=document.createElement('div');s.className='sec';
  s.innerHTML=`<div class="sec-hd"><span class="sec-title">${title}</span>${meta?`<span class="sec-meta">${meta}</span>`:''}</div>`;
  s.appendChild(content);return s;
}

function buildKpiTable(cd){
  const secs=[
    {lbl:'KINDER',tot:cd.kinder?.total,rows:['K1','K2','K3','K4','K5'].map(k=>({k,d:cd.kinder?.[k]}))},
    {lbl:'PREP',  tot:cd.prep?.total,  rows:['P1','P2','P3','P4','P5','P6'].map(k=>({k,d:cd.prep?.[k]}))},
    {lbl:'COLLEGE',tot:cd.college?.total,rows:['C1','C2','C3','C4','C5','C6'].map(k=>({k,d:cd.college?.[k]}))},
  ];
  let h=`<table><thead><tr><th>Nivel</th><th>Grado</th><th class="r">Matrícula</th><th class="r">Ocupación</th><th class="r">Vacantes</th><th class="r">Retención</th><th class="r">New Students</th><th class="r">Withdrawals</th><th class="r">Prospectos</th></tr></thead><tbody>`;
  secs.forEach(s=>{
    h+=`<tr class="grp"><td colspan="9">${s.lbl}</td></tr>`;
    const t=s.tot||{};
    h+=`<tr class="tot"><td></td><td>TOTAL ${s.lbl}</td><td class="r">${fN(t.matricula)}</td><td class="r">${fV(t.ocupacion)}</td><td class="r">${fN(t.vacantes)}</td><td class="r">${fV(t.retencion)}</td><td class="r">${fN(t.new_students)}</td><td class="r">${fN(t.withdrawals)}</td><td class="r">${fN(t.prospectos)}</td></tr>`;
    s.rows.forEach(({k,d})=>{
      d=d||{};
      h+=`<tr><td></td><td>${k}</td><td class="r">${fV(d.matricula)}</td><td class="r">${fV(d.ocupacion)}</td><td class="r">${fV(d.vacantes)}</td><td class="r">${fV(d.retencion)}</td><td class="r">${fV(d.new_students)}</td><td class="r">${fV(d.withdrawals)}</td><td class="r">${fV(d.prospectos)}</td></tr>`;
    });
  });
  const ct=cd.total||{};
  h+=`<tr class="ctot"><td colspan="2">TOTAL CAMPUS</td><td class="r">${fN(ct.matricula)}</td><td class="r">${fV(ct.ocupacion)}</td><td class="r">${fN(ct.vacantes)}</td><td class="r">${fV(ct.retencion)}</td><td class="r">${fN(ct.new_students)}</td><td class="r">${fN(ct.withdrawals)}</td><td class="r">${fN(ct.prospectos)}</td></tr>`;

}

    h+=`<tr><td>${w.causa}</td><td><span class="tag ${tc}">${w.tipo}</span></td>`;
    if(campus==='os')h+=`<td class="r">${fN(w.q2025)}</td><td class="r">${fN(w.q2026)}</td><td class="r">${fN(w.n2025)}</td><td class="r">${fN(w.n2026)}</td><td class="r">${fN(w.tot2025)}</td><td class="r">${fN(w.tot2026)}</td>`;
    else if(campus==='q')h+=`<td class="r">${fN(w.q2025)}</td><td class="r">${fN(w.q2026)}</td>`;
    else h+=`<td class="r">${fN(w.n2025)}</td><td class="r">${fN(w.n2026)}</td>`;
    h+=`</tr>`;
  });
  h+='</tbody></table>';tw.innerHTML=h;
  wrap.appendChild(sec('Withdrawals por Causa','Análisis de bajas 2025 vs 2026',tw));
  return wrap;
}

// ── COHORT ──
function buildCohort(){
  const wrap=document.createElement('div');
  const two=document.createElement('div');two.className='two';
  const tw=document.createElement('div');tw.className='tw';
  let h=`<table><thead><tr><th>Cohorte</th><th class="r">Ingresaron</th><th class="r">Activos</th><th class="r">Retención</th></tr></thead><tbody>`;
  (D.cohort||[]).forEach(r=>{const f=getCohF(r);h+=`<tr><td style="font-weight:600">${r.año}</td><td class="r">${fN(f.ing)}</td><td class="r">${fN(f.act)}</td><td class="r">${fP(f.ret)}</td></tr>`;});
  h+='</tbody></table>';tw.innerHTML=h;
  const cc=document.createElement('div');cc.className='cc';
  cc.innerHTML='<div class="cc-ttl">Retención por Cohorte</div><canvas id="chart-cohort"></canvas>';
  two.appendChild(tw);two.appendChild(cc);
  wrap.appendChild(sec('Cohort Retention','Fidelización generacional · ISAMS',two));
  return wrap;
}

// ── PROYECCIÓN 2027 ──
function buildProyeccion(){
  const wrap=document.createElement('div');
  const re=D.resumen;

  // Totals cards
  const totDiv=document.createElement('div');totDiv.className='sim-totals';
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osBase=qT.base+nT.base,osFinal=qT.final+nT.final;
  const mkCard=(id,label,final,base,color)=>{
    const d=Math.round(final-base);
    const pct=(base>0?(final-base)/base*100:0).toFixed(1);
    const sign=d>=0?'+':'';
    return `<div class="sim-total-card" id="${id}" style="border-top:3px solid ${color}">
      <div class="sim-total-lbl">${label}</div>
      <div class="sim-total-val">${Math.round(final).toLocaleString('es-AR')}</div>
      <div class="sim-total-delta">vs base ${Math.round(base).toLocaleString('es-AR')} <span class="${d<0?'val-neg':'val-pos'}">${sign}${d} (${sign}${pct}%)</span></div>
    </div>`;
  };
  totDiv.innerHTML=mkCard('sim-card-q','Quilmes 2027',qT.final,qT.base,'#DC1E33')+mkCard('sim-card-n','North 2027',nT.final,nT.base,'#6AB2E2')+mkCard('sim-card-os','One School 2027',osFinal,osBase,'#213469');
  wrap.appendChild(totDiv);

  // Controls
  const ctrl=document.createElement('div');ctrl.className='sim-controls';
  ctrl.innerHTML=`<span style="font-size:.72rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-right:4px;">Escenarios rápidos:</span>
    <button class="sim-btn primary" onclick="applyScenario('reset')">Tendencial (base)</button>
    <button class="sim-btn" onclick="applyScenario('opt')" style="border-color:#15803d;color:#15803d">Optimista +2</button>
    <button class="sim-btn" onclick="applyScenario('cons')" style="border-color:#DC1E33;color:#DC1E33">Conservador −2</button>`;
  wrap.appendChild(ctrl);

  // Quilmes table
  const qGrades=[
    {k:'K3',base:re?.quilmes?.find(r=>r.año===2026)?.kinder||35},
    {k:'K4',base:51},{k:'K5',base:44},
    {k:'P1',base:56},{k:'P2',base:59},{k:'P3',base:60},{k:'P4',base:67},{k:'P5',base:58},{k:'P6',base:51},
    {k:'C1',base:71},{k:'C2',base:62},{k:'C3',base:53},{k:'C4',base:70},{k:'C5',base:66},{k:'C6',base:62},
  ];
  const nGrades=[
    {k:'K1',base:3},{k:'K2',base:13},{k:'K3',base:18},{k:'K4',base:20},{k:'K5',base:25},
    {k:'P1',base:17},{k:'P2',base:32},{k:'P3',base:35},{k:'P4',base:33},{k:'P5',base:41},{k:'P6',base:21},
    {k:'C1',base:49},{k:'C2',base:49},{k:'C3',base:33},{k:'C4',base:57},{k:'C5',base:49},{k:'C6',base:57},
  ];

  function mkSimTable(title,cKey,grades){
    const color=cKey==='q'?'var(--red)':'var(--celeste)';
    let h=`<div style="margin-bottom:24px"><h3 style="font-family:'Aleo',serif;font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)">${title}</h3>
    <div class="tw"><table><thead><tr>
      <th>Grado</th><th class="r">Base 2026</th><th class="r">Proyección base</th>
      <th class="r">Ajuste</th><th class="r" style="color:${color}">Final 2027</th>
    </tr></thead><tbody>`;
    grades.forEach(({k,base})=>{
      const key=cKey+'_'+k;
      const proj2027Row=re?.[cKey==='q'?'quilmes':'north']?.find(r=>r.año===2027);
      const projBase=base; // simplification
      h+=`<tr>
        <td style="font-weight:600">${k}</td>
        <td class="r">${fN(base)}</td>
        <td class="r">${fN(projBase)}</td>
        <td class="r">
          <button class="adj-btn" onclick="simAdj['${key}']=(simAdj['${key}']||0)-1;document.getElementById('adj_${key}').value=simAdj['${key}'];updateSimDisplay()">−</button>
          <input class="adj-input" id="adj_${key}" value="0" type="number"
            onchange="simAdj['${key}']=parseInt(this.value)||0;updateSimDisplay()"/>
          <button class="adj-btn" onclick="simAdj['${key}']=(simAdj['${key}']||0)+1;document.getElementById('adj_${key}').value=simAdj['${key}'];updateSimDisplay()">+</button>
        </td>
        <td class="r" style="font-weight:700;color:${color}" id="final_${key}">${fN(base+(simAdj[key]||0))}</td>
      </tr>`;
    });
    h+='</tbody></table></div></div>';
    return h;
  }

  const tables=document.createElement('div');
  tables.innerHTML=mkSimTable('Quilmes — Ajuste por grado','q',qGrades)+mkSimTable('North — Ajuste por grado','n',nGrades);
  wrap.appendChild(tables);

  // override updateSimDisplay to also update final cells
  const origUpdate=window.updateSimDisplay;
  window.updateSimDisplay=function(){
    origUpdate();
    // update individual final cells
    [...qGrades,...nGrades].forEach(({k})=>{
      ['q','n'].forEach(c=>{
        const key=c+'_'+k;
        const el=document.getElementById('final_'+key);
        if(el){
          const baseG=c==='q'?qGrades.find(g=>g.k===k):nGrades.find(g=>g.k===k);
          if(baseG)el.textContent=Math.round((baseG.base)+(simAdj[key]||0)).toLocaleString('es-AR');
        }
      });
    });
  };

  const secEl=sec('Proyección 2027','Simulador de matrícula por grado',document.createElement('div'));
  secEl.appendChild(totDiv.cloneNode?document.createElement('div'):totDiv);
  const container=document.createElement('div');
  container.appendChild(totDiv);container.appendChild(ctrl);container.appendChild(tables);
  return sec('Proyección 2027','Simulador de escenarios por grado',container);
}

// ── CHARTS ──
const CHART_DEFAULTS={
  plugins:{
    legend:{labels:{font:{family:'Asap Condensed',size:12},usePointStyle:true,pointStyleWidth:10}},
    tooltip:{
      backgroundColor:'#1A1F35',titleFont:{family:'Asap',size:12},bodyFont:{family:'Asap Condensed',size:11},
      padding:10,cornerRadius:4,displayColors:true,
    }
  }
};

function drawCharts(){
  Chart.defaults.font.family='Asap';
  Chart.defaults.color='#6B7180';

  // Enrolment OS
  const ec=document.getElementById('chart-enrol');
  if(ec&&D.resumen?.oneSchool){
    const rows=[...D.resumen.oneSchool].reverse();
    charts.enrol=new Chart(ec,{
      type:'bar',
      data:{
        labels:rows.map(r=>r.año+(r.año===2027?' (proj.)':'')),
        datasets:[{
          label:'One School',
          data:rows.map(r=>parseFloat(r.total)||0),
          backgroundColor:rows.map(r=>r.año===2027?'rgba(220,30,51,.5)':'rgba(33,52,105,.75)'),
          borderRadius:4,
        }]
      },
      options:{...CHART_DEFAULTS,responsive:true,plugins:{...CHART_DEFAULTS.plugins,legend:{display:false}},
        scales:{y:{grid:{color:'#F0EDE8'},ticks:{font:{family:'Asap Condensed',size:11}}},x:{grid:{display:false},ticks:{font:{family:'Asap Condensed',size:11}}}}}
    });
  }

  // QN
  const qnc=document.getElementById('chart-qn');
  if(qnc&&D.resumen){
    const qRows=[...(D.resumen.quilmes||[])].reverse();
    const nRows=[...(D.resumen.north||[])].reverse();
    charts.qn=new Chart(qnc,{
      type:'line',
      data:{
        labels:qRows.map(r=>r.año+(r.año===2027?' (p)':'')),
        datasets:[
          {label:'Quilmes',data:qRows.map(r=>parseFloat(r.total)||0),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.08)',tension:.4,fill:true,borderWidth:2},
          {label:'North',data:nRows.map(r=>parseFloat(r.total)||0),borderColor:'#6AB2E2',backgroundColor:'rgba(106,178,226,.08)',tension:.4,fill:true,borderWidth:2},
        ]
      },
      options:{...CHART_DEFAULTS,responsive:true,
        scales:{y:{grid:{color:'#F0EDE8'},ticks:{font:{family:'Asap Condensed',size:11}}},x:{grid:{display:false},ticks:{font:{family:'Asap Condensed',size:11}}}}}
    });
  }

  // Win Rate
  const wrc=document.getElementById('chart-wr');
  if(wrc&&D.winrate){
    const labels=D.winrate.map(r=>r.año);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.winrate.map(r=>+(parseFloat(r.qWR)*100).toFixed(1)),borderColor:'#DC1E33',backgroundColor:'rgba(220,30,51,.08)',tension:.4,fill:true,borderWidth:2},
      {label:'North',data:D.winrate.map(r=>+(parseFloat(r.nWR)*100).toFixed(1)),borderColor:'#6AB2E2',backgroundColor:'rgba(106,178,226,.08)',tension:.4,fill:true,borderWidth:2},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.winrate.map(r=>campus==='q'?+(parseFloat(r.qWR)*100).toFixed(1):+(parseFloat(r.nWR)*100).toFixed(1)),
      borderColor:campus==='q'?'#DC1E33':'#6AB2E2',
      backgroundColor:campus==='q'?'rgba(220,30,51,.08)':'rgba(106,178,226,.08)',
      tension:.4,fill:true,borderWidth:2
    }];
    charts.wr=new Chart(wrc,{
      type:'line',data:{labels,datasets:ds},
      options:{...CHART_DEFAULTS,responsive:true,
        scales:{y:{ticks:{callback:v=>v+'%',font:{family:'Asap Condensed',size:11}},grid:{color:'#F0EDE8'}},x:{grid:{display:false},ticks:{font:{family:'Asap Condensed',size:11}}}}}
    });
  }

  // Cohort
  const coc=document.getElementById('chart-cohort');
  if(coc&&D.cohort){
    const labels=D.cohort.map(r=>r.año);
    const ds=campus==='os'?[
      {label:'Quilmes',data:D.cohort.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)),backgroundColor:'rgba(220,30,51,.75)',borderRadius:4},
      {label:'North',data:D.cohort.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:'rgba(106,178,226,.8)',borderRadius:4},
    ]:[{
      label:campus==='q'?'Quilmes':'North',
      data:D.cohort.map(r=>campus==='q'?+(parseFloat(r.qRet)*100).toFixed(1):+(parseFloat(r.nRet)*100).toFixed(1)),
      backgroundColor:campus==='q'?'rgba(220,30,51,.75)':'rgba(106,178,226,.8)',borderRadius:4
    }];
    charts.cohort=new Chart(coc,{
      type:'bar',data:{labels,datasets:ds},
      options:{...CHART_DEFAULTS,responsive:true,
        scales:{y:{min:70,max:100,ticks:{callback:v=>v+'%',font:{family:'Asap Condensed',size:11}},grid:{color:'#F0EDE8'}},x:{grid:{display:false},ticks:{font:{family:'Asap Condensed',size:11}}}}}
    });
  }
}

// ── TAB NAV ──
function buildTabNav(){
  const ctr=document.getElementById('tab-group');ctr.innerHTML='';
  TABS.forEach(t=>{
    if(!sVis[t.id])return;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(t.id===activeTab?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{
      activeTab=t.id;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      const panel=document.getElementById('panel-'+t.id);
      if(panel){panel.classList.add('active');setTimeout(()=>{panel.querySelectorAll('.f-fill').forEach(el=>{const w=el.dataset.w;if(w)el.style.width=w+'%';});},50);}
    };
    ctr.appendChild(btn);
  });
}

// ── CAMPUS ──
document.querySelectorAll('.campus-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    campus=btn.dataset.c;
    document.querySelectorAll('.campus-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── ADMIN ──
function buildAdmin(){
  const ctr=document.getElementById('sec-toggles');
  TABS.forEach(t=>{
    const p=document.createElement('div');p.className='pill active';
    p.innerHTML=`<span class="dot"></span>${t.label}`;
    p.onclick=()=>{
      sVis[t.id]=!sVis[t.id];
      p.classList.toggle('active',sVis[t.id]);
      if(!sVis[t.id]&&activeTab===t.id)activeTab=TABS.find(x=>sVis[x.id])?.id||TABS[0].id;
      render();
    };
    ctr.appendChild(p);
  });
}
document.getElementById('btn-admin').addEventListener('click',()=>document.getElementById('admin-panel').classList.toggle('open'));

// ── UI ──
function showApp(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
}
function showLoad(msg){const el=document.getElementById('loading');el.querySelector('p').textContent=msg||'Cargando…';el.classList.remove('hidden');}
function hideLoad(){document.getElementById('loading').classList.add('hidden');}

// ── INIT ──
buildAdmin();buildTabNav();

  const s=document.createElement('script');

  s.onload=initAuth;
  document.head.appendChild(s);
};
