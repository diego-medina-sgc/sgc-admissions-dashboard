<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SGC — Admissions Dashboard 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Asap:wght@300;400;500;600;700&family=Asap+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --ink:#1A1F35;--red:#DC1E33;--navy:#213463;
  --celeste:#6AB2E2;--violet:#6B6EB3;--teal:#109AA9;
  --cream:#EEF1F8;--paper:#E6EAF4;--gray:#5A6070;
  --line:#D8DDE8;--white:#fff;
  --green:#15803d;--green-lt:#dcfce7;
  --amber:#b45309;--amber-lt:#fef3c7;
  --red-lt:#FEE8EB;--navy-lt:#E8EDF8;--ink-lt:#E8EBF2;
  --card-shadow:0 1px 3px rgba(14,22,40,.05),0 8px 24px rgba(14,22,40,.07);
  --sidebar-w:252px;--sidebar-collapsed:60px;--header-h:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Asap',sans-serif;background:#F8F9FC;color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ─── LOADING ─── */
#loading{position:fixed;inset:0;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:900;transition:opacity .4s;}
#loading.hidden{opacity:0;pointer-events:none;}
.load-logo{width:180px;}
.load-ring{width:40px;height:40px;border:2.5px solid rgba(33,52,99,.15);border-top-color:#DC1E33;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Asap Condensed',sans-serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:#8888A8;font-weight:600;}

/* ─── LOGIN ─── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#EEF1F8;}
.login-box{background:var(--white);border-radius:16px;box-shadow:0 8px 40px rgba(33,52,99,.12);padding:52px 48px;border-top:4px solid var(--red);max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:24px;}
.login-logo{width:220px;}
.login-rule{width:100%;height:1px;background:#E2E8F0;}
.login-tagline{font-size:.84rem;color:#64748B !important;text-align:center;line-height:1.65;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;background:var(--white);border:1.5px solid var(--line);border-radius:6px;font-family:'Asap',sans-serif;font-size:.9rem;font-weight:500;color:var(--ink);cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.btn-google:hover{border-color:var(--navy);box-shadow:0 4px 18px rgba(14,22,40,.1);}

/* ─── APP SHELL ─── */
#app{display:none;}

/* ─── HEADER ─── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--white);border-bottom:1px solid var(--line);border-top:3px solid var(--red);display:flex;align-items:center;padding:0 16px 0 0;z-index:300;box-shadow:0 2px 8px rgba(33,52,99,.06);}
.hdr-brand{width:var(--sidebar-w);display:flex;align-items:center;gap:11px;padding:0 16px;flex-shrink:0;transition:width .25s;}
.hdr-brand.collapsed{width:var(--sidebar-collapsed);}
.hdr-logo{height:auto;width:160px;max-height:52px;flex-shrink:0;object-fit:contain;}
.hdr-titles{display:none;}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.hdr-sub{font-size:.58rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.13em;text-transform:uppercase;margin-top:1px;}
.hdr-mid{flex:1;display:flex;align-items:center;gap:10px;padding-left:4px;}
.campus-group{display:flex;gap:5px;}
.campus-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.73rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .18s;}
.campus-btn[data-c="os"].active{background:var(--ink);border-color:var(--ink);color:#fff;}
.campus-btn[data-c="q"].active{background:var(--red);border-color:var(--red);color:#fff;}
.campus-btn[data-c="n"].active{background:var(--navy);border-color:var(--navy);color:#fff;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hdr-time{font-size:.65rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;white-space:nowrap;}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--paper);border:1px solid var(--line);font-size:.68rem;font-family:'Asap Condensed',sans-serif;color:var(--gray);font-weight:600;}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--gray);padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-icon:hover{background:var(--paper);color:var(--ink);}
.btn-icon svg{display:block;}
.btn-logout{background:none;border:1.5px solid var(--line);color:var(--gray);padding:5px 12px;border-radius:6px;font-size:.72rem;font-family:'Asap',sans-serif;cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* ─── SIDEBAR ─── */
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:#FFFFFF;display:flex;flex-direction:column;z-index:200;border-right:1px solid #E2E8F0;box-shadow:2px 0 12px rgba(33,52,99,.06);transition:width .25s,transform .25s ease;overflow:hidden;}
.sidebar.collapsed{width:var(--sidebar-collapsed);}
.sb-toggle{position:absolute;top:12px;right:-12px;width:24px;height:24px;background:var(--white);border:1px solid var(--line);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .25s;}
.sidebar.collapsed .sb-toggle{transform:rotate(180deg);}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;overflow-x:hidden;}
.sb-nav::-webkit-scrollbar{width:3px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(33,52,99,.2);border-radius:2px;}
.sb-lbl{font-size:.56rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#94A3B8;padding:12px 8px 5px;white-space:nowrap;font-family:'Asap Condensed',sans-serif;}
.sidebar.collapsed .sb-lbl{opacity:0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#64748B;font-size:.82rem;font-weight:500;white-space:nowrap;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:#F0F4FB;color:#1A1F35;}
.nav-item.active{background:rgba(220,30,51,.15);border-left:3px solid var(--red);color:#fff;font-weight:600;padding-left:9px;}
.nav-item svg{flex-shrink:0;width:18px;height:18px;}
.nav-item span{overflow:hidden;text-overflow:ellipsis;}
.sidebar.collapsed .nav-item span{display:none;}
.sb-divider{height:1px;background:#E2E8F0;margin:8px 0;}
.sb-bottom{border-top:1px solid #E2E8F0;flex-shrink:0;padding-bottom:4px;background:#F8F9FC;}
.sb-update{font-size:.62rem;font-family:'Asap Condensed',sans-serif;color:#94A3B8;text-align:center;line-height:1.5;padding:4px 12px 6px;}
.sidebar.collapsed .sb-update{display:none;}.sidebar.collapsed .sb-flag-row,.sidebar.collapsed .sb-appearance-row{display:none !important;}
.sidebar.collapsed .sb-flag-row,.sidebar.collapsed .sb-appearance-row{display:none;}

/* ─── CONTENT ─── */
.content{margin-top:var(--header-h);margin-left:var(--sidebar-w);transition:margin-left .25s;min-height:calc(100vh - var(--header-h));}
.content.collapsed{margin-left:var(--sidebar-collapsed);}
.panel{display:none;padding:28px 32px;max-width:1520px;}
.panel.active{display:block;}

/* ─── SECTION ─── */
.sec{margin-bottom:36px;}
.sec-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid transparent;background-image:linear-gradient(90deg,var(--campus-color,var(--ink)) 0%,transparent 100%);background-repeat:no-repeat;background-size:100% 1px;background-position:bottom;}
.sec-title{font-size:1.1rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.sec-meta{font-size:.65rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.07em;font-weight:600;}

/* ─── PAGE HEADER ─── */
.page-hd{margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--line);}
.page-hd-inner{display:flex;align-items:flex-end;justify-content:space-between;}
.page-title{font-size:2rem;font-weight:700;letter-spacing:-.04em;color:var(--ink);}
.page-sub{font-size:.72rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.campus-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:.72rem;font-weight:700;font-family:'Asap Condensed',sans-serif;letter-spacing:.05em;}
.campus-badge.os{background:var(--ink-lt);color:var(--ink);}
.campus-badge.q{background:var(--red-lt);color:var(--red);}
.campus-badge.n{background:var(--navy-lt);color:var(--navy);}
.cb-dot{width:7px;height:7px;border-radius:50%;}
.campus-badge.os .cb-dot{background:var(--ink);}
.campus-badge.q .cb-dot{background:var(--red);}
.campus-badge.n .cb-dot{background:var(--navy);}

/* ─── STAT STRIP (headline KPIs) ─── */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));background:var(--white);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);}
.si{padding:18px 20px 16px;border-right:1px solid var(--line);transition:background .12s;position:relative;}
.si:last-child{border-right:none;}
.si:hover{background:#F5F7FC;}
.si-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.si-val{font-size:1.7rem;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.si-val.neg{color:var(--red);}
.si-val.pos{color:var(--green);}
.si-val.c-red{color:var(--red);}
.si-val.c-navy{color:var(--navy);}
.si-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:4px;}
.si-spark{margin-top:6px;height:28px;}

/* ─── KPI CARDS ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;}
.kpi-card{background:var(--surface);border-radius:12px;padding:20px 20px 16px;position:relative;overflow:hidden;box-shadow:var(--card-shadow);transition:box-shadow .2s,transform .18s;}
.kpi-card:hover{box-shadow:0 4px 12px rgba(14,22,40,.06),0 16px 40px rgba(14,22,40,.1);transform:translateY(-2px);}
.kpi-card.accent::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.campus-os .kpi-card.accent::after{background:linear-gradient(90deg,var(--ink),transparent);}
.campus-q .kpi-card.accent::after{background:linear-gradient(90deg,var(--red),transparent);}
.campus-n .kpi-card.accent::after{background:linear-gradient(90deg,var(--navy),transparent);}
.kpi-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:8px;font-family:'Asap Condensed',sans-serif;}
.kpi-val{font-size:2rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:5px;letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
.kpi-val.neg{color:var(--red);}
.kpi-val.pos{color:var(--green);}
.kpi-val.c-red{color:var(--red);}
.kpi-val.c-navy{color:var(--navy);}
.kpi-foot{font-size:.62rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;}

/* ─── COMMUNITY CARDS ─── */
.comm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.comm-card{background:var(--white);border:1px solid rgba(14,22,40,.08);border-top:3px solid var(--teal);border-radius:12px;padding:16px 18px;text-align:center;box-shadow:var(--card-shadow);}
.comm-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.comm-val{font-size:1.7rem;font-weight:700;color:var(--teal);letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.comm-foot{font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}

/* ─── CHART CARD ─── */
.cc{background:var(--surface);border-radius:12px;padding:22px 24px;box-shadow:var(--card-shadow);}
.cc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cc-ttl{font-size:.65rem;font-weight:700;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;font-family:'Asap Condensed',sans-serif;}
.cc-sub{font-size:.6rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;}
.chart-wrap{position:relative;}
canvas{display:block;}

/* ─── TABLES ─── */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--line);box-shadow:var(--card-shadow);}
.tw.scroll-y{max-height:420px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:.79rem;background:var(--white);}
thead{position:sticky;top:0;z-index:5;}
thead th{background:var(--ink);color:#fff;padding:10px 14px;text-align:center;font-weight:700;font-size:.65rem;letter-spacing:.08em;white-space:nowrap;font-family:'Asap Condensed',sans-serif;cursor:default;}
thead th:first-child{text-align:left;}
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{background:rgba(255,255,255,.1);}
thead th .sort-ico{opacity:.4;margin-left:4px;font-size:.6em;}
thead th.asc .sort-ico::after{content:'▲';}
thead th.desc .sort-ico::after{content:'▼';}
thead th:not(.asc):not(.desc) .sort-ico::after{content:'⇅';}
.campus-q thead th{background:var(--red);}
.campus-n thead th{background:var(--navy);}
thead th.th-q{background:var(--red) !important;}
thead th.th-n{background:var(--navy) !important;}
tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr.grp td{font-weight:700;font-size:.65rem;letter-spacing:.09em;text-transform:uppercase;padding:7px 14px;font-family:'Asap Condensed',sans-serif;}
tbody tr.grp-q td{background:var(--red-lt);color:var(--red);}
tbody tr.grp-n td{background:var(--navy-lt);color:var(--navy);}
tbody tr.grp-k td{background:var(--ink-lt);color:var(--ink);}
tbody tr.tot td{font-weight:600;background:#EEF1F8;}
tbody tr.tot td:first-child,tbody tr.tot td:nth-child(2){text-align:left !important;}
tbody tr.ctot td{font-weight:700;border-top:2px solid;}
tbody tr.ctot-q td{background:var(--red-lt);color:var(--red);border-top-color:var(--red);}
tbody tr.ctot-n td{background:var(--navy-lt);color:var(--navy);border-top-color:var(--navy);}
tbody tr.ctot-os td{background:var(--ink-lt);color:var(--ink);border-top-color:var(--ink);}
tbody tr.won-row td{background:#f0fdf4;font-weight:600;}
tbody tr.proj-row td{background:#FFFBEB;}
tbody tr:hover:not(.grp):not(.grp-q):not(.grp-n):not(.grp-k):not(.tot):not(.ctot):not(.ctot-q):not(.ctot-n):not(.ctot-os):not(.won-row):not(.proj-row){background:#F4F6FB;}
td{padding:9px 14px;}
td:first-child{text-align:left !important;font-weight:500;}
td.r{text-align:center;font-family:'Asap Condensed',sans-serif;font-size:.77rem;}
td.c-q{color:var(--red);font-weight:600;}
td.c-n{color:var(--navy);font-weight:600;}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.6rem;font-weight:700;font-family:'Asap Condensed',sans-serif;}
.tag.nat{background:var(--green-lt);color:var(--green);}
.tag.exo{background:var(--amber-lt);color:var(--amber);}
.tag.act{background:#fee2e2;color:#b91c1c;}
.badge-proj{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.57rem;font-weight:700;background:var(--amber-lt);color:var(--amber);font-family:'Asap Condensed',sans-serif;margin-left:5px;}
.val-pos{color:var(--green);font-weight:600;}
.val-neg{color:var(--red);font-weight:600;}
.val-usd{color:var(--teal);font-weight:600;font-family:'Asap Condensed',sans-serif;}

/* ─── LAYOUT HELPERS ─── */
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-width:0;}
.two>*{min-width:0;}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.col-6040{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;min-width:0;}
.col-6040>*{min-width:0;}

/* ─── INSIGHT STRIP ─── */
.insight-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.insight{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:10px;padding:12px 16px;flex:1;min-width:160px;box-shadow:var(--card-shadow);}
.ins-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ins-icon.green{background:var(--green-lt);}
.ins-icon.red{background:var(--red-lt);}
.ins-icon.amber{background:var(--amber-lt);}
.ins-icon.teal{background:#ccfbf1;}
.ins-icon svg{width:16px;height:16px;}
.ins-icon.green svg{color:var(--green);}
.ins-icon.red svg{color:var(--red);}
.ins-icon.amber svg{color:var(--amber);}
.ins-icon.teal svg{color:var(--teal);}
.ins-lbl{font-size:.62rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.ins-val{font-size:.92rem;font-weight:700;color:var(--ink);}

/* ─── FUNNEL ─── */
.funnel{display:flex;flex-direction:column;gap:6px;}
.f-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 14px;transition:box-shadow .15s,transform .15s;}
.f-row:hover{box-shadow:0 4px 16px rgba(14,22,40,.09);transform:translateX(3px);}
.f-row.won{border-left:3px solid var(--teal);}
.f-lbl{font-size:.8rem;font-weight:500;min-width:180px;}
.f-track{flex:1;height:9px;background:var(--paper);border-radius:5px;overflow:hidden;}
.f-fill{height:100%;border-radius:5px;width:0%;transition:width .95s cubic-bezier(.4,0,.2,1);}
.campus-os .f-fill{background:var(--ink);}
.campus-q .f-fill{background:var(--red);}
.campus-n .f-fill{background:var(--navy);}
.f-row.won .f-fill{background:var(--teal) !important;}
.f-nums{font-family:'Asap Condensed',sans-serif;font-size:.71rem;color:var(--gray);min-width:165px;text-align:right;}
.f-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.62rem;font-weight:700;background:#fee2e2;color:#b91c1c;margin-left:4px;font-family:'Asap Condensed',sans-serif;}
.f-row.won .f-badge{background:var(--green-lt);color:var(--green);}

/* ─── HEATMAP ─── */
.heatmap{overflow-x:auto;}
.hm-table{width:100%;border-collapse:collapse;font-size:.76rem;font-family:'Asap Condensed',sans-serif;}
.hm-table th{padding:6px 10px;font-weight:700;color:var(--gray);letter-spacing:.07em;text-align:center;white-space:nowrap;}
.hm-table th:first-child{text-align:left;}
.hm-table td{padding:7px 10px;text-align:center;font-weight:600;border:1px solid #EEF1F8;min-width:80px;}
.hm-cell{border-radius:6px;padding:6px 10px;display:block;text-align:center;font-size:.76rem;}

/* ─── SIMULATOR ─── */
.sim-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.sim-card{background:var(--surface);border-radius:12px;padding:18px 20px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--card-shadow);}
.sim-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ink);}
.sim-card.q::after{background:var(--red);}
.sim-card.n::after{background:var(--navy);}
.sim-lbl{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;font-family:'Asap Condensed',sans-serif;}
.sim-val{font-size:2rem;font-weight:700;color:var(--ink);letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
.sim-fact{font-size:.8rem;font-weight:600;color:var(--teal);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-delta{font-size:.67rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;margin-top:3px;}
.sim-controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.sim-btn{padding:6px 13px;border-radius:6px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.73rem;font-weight:500;color:var(--gray);cursor:pointer;transition:all .15s;}
.sim-btn:hover{border-color:var(--ink);color:var(--ink);}
.sim-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff;}
.adj-wrap{display:flex;align-items:center;justify-content:center;gap:3px;}
td:has(.adj-wrap){text-align:center !important;padding:5px 8px !important;}
.adj-btn{width:20px;height:20px;border:1px solid var(--line);border-radius:3px;background:var(--white);cursor:pointer;font-size:.85rem;display:inline-flex;align-items:center;justify-content:center;color:var(--gray);transition:all .1s;font-weight:700;line-height:1;}
.adj-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.adj-input{width:46px;text-align:center;border:1px solid var(--line);border-radius:3px;padding:2px 3px;font-family:'Asap Condensed',sans-serif;font-size:.75rem;color:var(--ink);background:var(--white);font-weight:600;}
.adj-input:focus{outline:none;border-color:var(--ink);}

/* ─── ADMIN PANEL (slide-out) ─── */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;backdrop-filter:blur(2px);}
#admin-overlay.open{display:block;}
#admin-drawer{position:fixed;top:0;right:-340px;bottom:0;width:320px;background:var(--white);z-index:401;box-shadow:-4px 0 32px rgba(14,22,40,.16);transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#admin-drawer.open{right:0;}
.adm-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);background:var(--ink);}
.adm-hdr-title{font-weight:700;font-size:.95rem;color:#fff;display:flex;align-items:center;gap:8px;}
.adm-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.adm-close:hover{background:rgba(255,255,255,.2);}
.adm-body{flex:1;overflow-y:auto;padding:16px;}
.adm-section{margin-bottom:20px;}
.adm-section-title{font-size:.6rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gray);margin-bottom:10px;font-family:'Asap Condensed',sans-serif;padding-bottom:6px;border-bottom:1px solid var(--line);}
.pill{display:flex;align-items:center;gap:5px;background:var(--white);border:1.5px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;user-select:none;font-size:.71rem;color:var(--gray);font-family:'Asap',sans-serif;font-weight:500;transition:all .15s;margin-bottom:6px;}
.pill.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.pill.teal-pill.active{background:var(--teal);border-color:var(--teal);color:#fff;}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;}
.adm-info{background:var(--paper);border-radius:8px;padding:12px 14px;}
.adm-info-row{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;margin-bottom:6px;}
.adm-info-row:last-child{margin-bottom:0;}
.adm-info-lbl{color:var(--gray);font-family:'Asap Condensed',sans-serif;font-weight:600;}
.adm-info-val{color:var(--ink);font-weight:600;font-family:'Asap Condensed',sans-serif;}
.adm-conn{display:inline-flex;align-items:center;gap:4px;}
.adm-conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.adm-btn{display:block;width:100%;padding:9px 14px;border-radius:6px;border:1.5px solid var(--line);background:var(--white);font-family:'Asap',sans-serif;font-size:.78rem;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s;text-align:left;margin-bottom:8px;}
.adm-btn:hover{border-color:var(--ink);background:var(--paper);}
.adm-btn svg{vertical-align:middle;margin-right:6px;}

/* ─── FOOTER ─── */
footer{text-align:center;padding:14px 32px;font-size:.61rem;color:var(--gray);font-family:'Asap Condensed',sans-serif;letter-spacing:.05em;border-top:1px solid var(--line);}

/* ─── DARK MODE ─── */
:root{
  --bg:#EEF1F8;--surface:#fff;--surface2:#F5F7FC;
  --border:rgba(14,22,40,.08);--border-strong:rgba(14,22,40,.15);
  --text:var(--ink);--text-muted:#6B7180;
  --row-hover:#F4F6FB;--row-tot:#EEF1F8;
  --card-shadow:0 1px 3px rgba(14,22,40,.05),0 8px 24px rgba(14,22,40,.07);
}
[data-theme="dark"]{
  --bg:#13131F;--surface:#1C1C2C;--surface2:#252538;
  --border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);
  --text:#EDEDF0;--text-muted:#8888A8;
  --row-hover:#252538;--row-tot:#1C1C2C;
  --card-shadow:0 1px 4px rgba(0,0,0,.25),0 6px 20px rgba(0,0,0,.35);
  --line:rgba(255,255,255,.09);--paper:#1C1C2C;--cream:#13131F;
  --white:#1C1C2C;--ink-lt:#252538;--red-lt:rgba(220,30,51,.18);
  --navy-lt:rgba(33,52,99,.22);--green-lt:rgba(22,163,74,.18);
  --amber-lt:rgba(180,83,9,.2);
}
[data-theme="dark"] body{background:var(--bg);color:var(--text);}
[data-theme="dark"] .hdr{background:var(--surface);border-color:var(--border);}
[data-theme="dark"] .hdr-title{color:var(--text);}
[data-theme="dark"] .hdr-sub,.hdr-badge,[data-theme="dark"] .hdr-badge{color:var(--text-muted);}
[data-theme="dark"] .hdr-badge{background:var(--surface2);border-color:var(--border);}
[data-theme="dark"] .content{background:var(--bg) !important;}
[data-theme="dark"] .panel{background:var(--bg) !important;}
[data-theme="dark"] .kpi-card,[data-theme="dark"] .cc,[data-theme="dark"] .sim-card,
[data-theme="dark"] .comm-card,[data-theme="dark"] .f-row,[data-theme="dark"] .insight,
[data-theme="dark"] .stat-strip,[data-theme="dark"] .tw table{background:var(--surface);}
[data-theme="dark"] .tw{border-color:var(--border);}
[data-theme="dark"] tbody tr:hover:not(.grp):not(.grp-q):not(.grp-n):not(.grp-k):not(.tot):not(.ctot):not(.ctot-q):not(.ctot-n):not(.ctot-os):not(.won-row):not(.proj-row){background:var(--row-hover);}
[data-theme="dark"] tbody tr.tot td{background:var(--row-tot);}
[data-theme="dark"] tbody tr{border-color:var(--border);}
[data-theme="dark"] td,[data-theme="dark"] .kpi-lbl,[data-theme="dark"] .si-lbl,
[data-theme="dark"] .sim-lbl,[data-theme="dark"] .cc-ttl{color:var(--text-muted);}
[data-theme="dark"] .kpi-val,[data-theme="dark"] .si-val,[data-theme="dark"] .sim-val,
[data-theme="dark"] .sec-title,[data-theme="dark"] .page-title,[data-theme="dark"] .kpi-foot,[data-theme="dark"] .kpi-lbl,
[data-theme="dark"] .si-foot,[data-theme="dark"] td:first-child{color:var(--text);}
[data-theme="dark"] .sec-hd{border-color:var(--border);}
[data-theme="dark"] .page-hd{border-color:var(--border);}
[data-theme="dark"] .page-sub{color:var(--text-muted);}
[data-theme="dark"] .login-box,[data-theme="dark"] #admin-drawer{background:var(--surface);}
[data-theme="dark"] .btn-google,[data-theme="dark"] .adm-btn{background:var(--surface);border-color:var(--border);color:var(--text);}
[data-theme="dark"] .campus-btn{background:var(--surface2);border-color:var(--border);color:var(--text-muted);}
[data-theme="dark"] footer{border-color:var(--border);color:var(--text-muted);}
[data-theme="dark"] .adj-btn,[data-theme="dark"] .adj-input,.adj-btn,[data-theme="dark"] .sim-btn{background:var(--surface2);border-color:var(--border);color:var(--text);}
[data-theme="dark"] .f-track{background:var(--surface2);}
[data-theme="dark"] .adm-info{background:var(--surface2);}
[data-theme="dark"] .won-row td{background:rgba(21,128,61,.15);}
[data-theme="dark"] .proj-row td{background:rgba(180,83,9,.12);}
[data-theme="dark"] .hm-table td{border-color:var(--bg);}[data-theme="dark"] #login-screen{background:#F0F4FC !important;}[data-theme="dark"] .login-box{background:#FFFFFF !important;border-top-color:#DC1E33 !important;}[data-theme="dark"] .login-tagline{color:#1A1F35 !important;}[data-theme="dark"] .btn-google{background:#fff !important;color:#1A1F35 !important;border-color:#E2E8F0 !important;}[data-theme="dark"] #loading{background:#FFFFFF !important;}[data-theme="dark"] .load-txt{color:#8888A8 !important;}[data-theme="dark"] .sidebar{background:#FFFFFF !important;border-right-color:#E2E8F0 !important;box-shadow:2px 0 12px rgba(33,52,99,.1) !important;}[data-theme="dark"] .sb-bottom{background:#F8F9FC !important;border-color:#E2E8F0 !important;}[data-theme="dark"] .sb-divider{background:#E2E8F0 !important;}[data-theme="dark"] .nav-item{color:#64748B !important;}[data-theme="dark"] .nav-item:hover{background:#F0F4FB !important;color:#1A1F35 !important;}[data-theme="dark"] .nav-item.active{background:rgba(220,30,51,.08) !important;color:#DC1E33 !important;border-left-color:#DC1E33 !important;}[data-theme="dark"] .sb-lbl,[data-theme="dark"] .sb-update{color:#94A3B8 !important;}[data-theme="dark"] .sb-flag{color:#64748B !important;}[data-theme="dark"] .sb-flag.sb-flag-active{color:#DC1E33 !important;background:rgba(220,30,51,.08) !important;border-color:#DC1E33 !important;}[data-theme="dark"] .sb-theme-btn{color:#94A3B8 !important;}[data-theme="dark"] .sb-theme-btn.active{color:#213463 !important;background:rgba(33,52,99,.1) !important;border-color:#213463 !important;}
[data-theme="dark"] .cc-ttl{color:var(--text-muted);}
[data-theme="dark"] .cc-sub{color:var(--text-muted);}
[data-theme="dark"] .sec-meta{color:var(--text-muted);}
[data-theme="dark"] .page-hd-inner .campus-badge{opacity:.9;}
[data-theme="dark"] .val-pos{color:#4ade80;}
[data-theme="dark"] .val-neg{color:#f87171;}
[data-theme="dark"] .val-usd{color:#5eead4;}
[data-theme="dark"] .ins-val{color:var(--text);}
[data-theme="dark"] .comm-val{color:#5eead4;}
[data-theme="dark"] .si-val.c-red{color:#f87171;}
[data-theme="dark"] .si-val.c-navy{color:#93a5d8;}
[data-theme="dark"] .kpi-val.c-red{color:#f87171;}
[data-theme="dark"] .kpi-val.c-navy{color:#93a5d8;}
[data-theme="dark"] .kpi-val.pos{color:#4ade80;}
[data-theme="dark"] .kpi-val.neg{color:#f87171;}
[data-theme="dark"] canvas{filter:brightness(1.05);}
/* dark: group rows — override hardcoded light text on dark bg */
[data-theme="dark"] tbody tr.grp-k td{color:#A8B4CC;}
[data-theme="dark"] tbody tr.grp-n td{color:#93A5D8;}
[data-theme="dark"] tbody tr.ctot-os td{color:#A8B4CC;}
/* dark: campus badges — ink/navy text becomes unreadable on dark backgrounds */
[data-theme="dark"] .campus-badge.os{background:rgba(255,255,255,.08);color:#EDEDF0;}
[data-theme="dark"] .campus-badge.n{background:rgba(33,52,99,.35);color:#93A5D8;}
/* dark: funnel badge (hardcoded #fee2e2) */
[data-theme="dark"] .f-badge{background:rgba(220,30,51,.25);color:#f87171;}
[data-theme="dark"] .f-row.won .f-badge{background:rgba(21,128,61,.25);color:#4ade80;}
/* dark: insight icon backgrounds (teal hardcoded #ccfbf1) */
[data-theme="dark"] .ins-icon.teal{background:rgba(16,154,169,.2);}
[data-theme="dark"] .ins-icon.green{background:rgba(21,128,61,.2);}
[data-theme="dark"] .ins-icon.red{background:rgba(220,30,51,.2);}
[data-theme="dark"] .ins-icon.amber{background:rgba(180,83,9,.2);}
/* dark: stat strip hover */
[data-theme="dark"] .si:hover{background:var(--surface2);}
/* dark: sim-btn hover */
[data-theme="dark"] .sim-btn:hover{border-color:var(--text);color:var(--text);}
/* dark: adj-btn hover */
[data-theme="dark"] .adj-btn:hover{background:var(--text);color:var(--bg);}
/* dark: admin drawer pills and buttons */
[data-theme="dark"] .pill{background:var(--surface2);border-color:var(--border);color:var(--text-muted);}
[data-theme="dark"] .adm-section-title{color:var(--text-muted);}
[data-theme="dark"] .adm-info-lbl{color:var(--text-muted);}
[data-theme="dark"] .adm-info-val{color:var(--text);}
[data-theme="dark"] .adm-info{background:var(--surface2);}
/* dark: heatmap th */
[data-theme="dark"] .hm-table th{color:var(--text-muted);}
/* dark: tag badges (nat/exo/act use light colors) */
[data-theme="dark"] .tag.nat{background:rgba(21,128,61,.2);color:#4ade80;}
[data-theme="dark"] .tag.exo{background:rgba(180,83,9,.2);color:#fbbf24;}
[data-theme="dark"] .tag.act{background:rgba(220,30,51,.2);color:#f87171;}
/* dark: badge-proj */
[data-theme="dark"] .badge-proj{background:rgba(180,83,9,.2);color:#fbbf24;}
/* dark: sb-bottom override (footer of content, not sidebar) */
[data-theme="dark"] footer{background:var(--bg);}
/* dark: page-sub text */
[data-theme="dark"] .page-sub{color:var(--text-muted);}
/* dark: community cards border */
[data-theme="dark"] .comm-card{background:var(--surface);border-color:var(--border);}
/* dark: thead th gets slightly less harsh background */
[data-theme="dark"] thead th{background:#252540;}
[data-theme="dark"] thead th.th-q{background:#7a1020 !important;}
[data-theme="dark"] thead th.th-n{background:#1a2a55 !important;}
[data-theme="dark"] .campus-q thead th{background:#7a1020;}
[data-theme="dark"] .campus-n thead th{background:#1a2a55;}
/* dark: hdr right area */
[data-theme="dark"] .btn-logout{border-color:var(--border);color:var(--text-muted);}
[data-theme="dark"] .btn-logout:hover{border-color:var(--red);color:#f87171;}
[data-theme="dark"] .btn-icon{color:var(--text-muted);}
[data-theme="dark"] .btn-icon:hover{background:var(--surface2);color:var(--text);}
[data-theme="dark"] .hdr-time{color:var(--text-muted);}
/* dark: sb-toggle button */
[data-theme="dark"] .sb-toggle{background:var(--surface);border-color:var(--border);}

/* ─── SIDEBAR FLAG & THEME TOGGLES ─── */
.sb-flag-row{display:flex;gap:6px;padding:8px 8px 4px;}
.sidebar.collapsed .sb-flag-row{display:none;}
.sb-flag{background:none;border:1.5px solid transparent;border-radius:8px;padding:5px 10px;cursor:pointer;
  font-size:.85rem;color:#64748B;display:flex;align-items:center;gap:5px;
  transition:all .15s;flex:1;justify-content:center;}
.sb-flag span{font-size:.65rem;font-family:'Asap Condensed',sans-serif;font-weight:700;letter-spacing:.06em;}
.sb-flag:hover{color:#1A1F35;border-color:#E2E8F0;background:#F0F4FB;}
.sb-flag.sb-flag-active{color:#DC1E33;border-color:#DC1E33;border-bottom-width:2px;background:rgba(220,30,51,.08);}
.sb-appearance-row{display:flex;gap:4px;padding:4px 8px 10px;}
.sidebar.collapsed .sb-appearance-row{display:none;}
.sb-theme-btn{background:none;border:1.5px solid transparent;border-radius:6px;padding:5px 0;
  cursor:pointer;color:#94A3B8;font-size:1rem;flex:1;transition:all .15s;}
.sb-theme-btn:hover{color:#1A1F35;border-color:#E2E8F0;background:#F0F4FB;}
.sb-theme-btn.active{color:#213463;background:rgba(33,52,99,.1);border-color:#213463;}

/* ─── HEATMAP FULL WIDTH ─── */
.hm-table td:first-child{width:80px;text-align:left;font-weight:700;}
.hm-table td:not(:first-child){width:auto;}

/* ─── TWO-PANE: stretch tables to match chart height ─── */
.two{align-items:stretch;}
.two .tw{display:flex;flex-direction:column;}
.two .tw table{flex:1;}

/* ─── RESPONSIVE ─── */
@media(max-width:1024px){
  :root{--sidebar-w:220px;}
}
@media(max-width:768px){
  /* ── Header: 2-row layout ── */
  :root{--sidebar-w:0px;--sidebar-collapsed:0px;--header-h:88px;}
  .hdr{height:var(--header-h);flex-wrap:wrap;align-content:flex-start;padding:0;}
  /* Row 1: logo left, hamburger right */
  .hdr-brand{
    order:1;width:auto;flex:1;
    padding:10px 14px;
    border-bottom:none;
  }
  .hdr-mid{
    order:3;width:100%;
    padding:6px 14px 8px;
    border-top:1px solid rgba(14,22,40,.1);
    border-bottom:2px solid var(--line);
    background:var(--white);
    flex:none;
  }
  .hdr-right{
    order:2;
    padding:0 14px;
    gap:4px;
    margin-left:0;
  }
  /* Hide non-essential header items on mobile */
  .hdr-badge,.btn-logout{display:none;}
  #btn-admin{display:none !important;}
  /* Hamburger always visible, prominent */
  #btn-sb-toggle{
    display:flex !important;
    padding:8px;
    background:var(--surface2,#f0f2f8);
    border-radius:8px;
    color:var(--ink);
  }
  /* Campus buttons: smaller, fill row */
  .campus-group{gap:5px;width:100%;}
  .campus-btn{
    flex:1;text-align:center;
    padding:5px 8px;
    font-size:.68rem;
    border-radius:16px;
  }

  /* ── Sidebar: full height, above header ── */
  .sidebar{
    transform:translateX(-100%);
    width:280px;
    top:0;
    z-index:500;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.mobile-open{
    transform:translateX(0);
    box-shadow:6px 0 32px rgba(0,0,0,.5);
  }
  #mob-overlay{
    display:block;
    opacity:0;
    pointer-events:none;
    transition:opacity .28s;
    z-index:499;
  }
  #mob-overlay.active{opacity:1;pointer-events:auto;}
  .content{margin-left:0 !important;}

  /* ── Layout ── */
  .panel{padding:16px 14px;}
  .two,.three,.col-6040{grid-template-columns:1fr;}
  .comm-grid{grid-template-columns:repeat(2,1fr);}
  .sim-totals{grid-template-columns:1fr;}
  .stat-strip{grid-template-columns:repeat(2,1fr);}
  .si{border-bottom:1px solid var(--line);}
  .f-lbl{min-width:120px;font-size:.73rem;}
  .f-nums{min-width:110px;font-size:.65rem;}
  .insight-strip{display:none;}
  .sim-controls{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;}
  .sim-btn{white-space:nowrap;padding:5px 9px;font-size:.68rem;}
  .sb-flag-row,.sb-appearance-row{display:flex;}
  .sidebar.collapsed{width:280px;}
  .sidebar.collapsed .nav-item span{display:initial;}
  .sidebar.collapsed .sb-lbl{opacity:1;}
  .sidebar.collapsed .sb-update{display:block;}
  .sidebar.collapsed .sb-flag-row,.sidebar.collapsed .sb-appearance-row{display:flex;}
}
@media print{
  .sidebar,.hdr,.adm-overlay,footer{display:none !important;}
  .content{margin:0 !important;}
  .panel{display:block !important;padding:10px !important;}
  .cc{break-inside:avoid;}
}
</style>
</head>

      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

<!-- APP -->
<div id="app">

  <!-- HEADER -->

// ── DATA ──
let _fetchRetry=0;
// fetch() follows HTTP redirects (Google Apps Script can redirect on first hit).
// Script-tag JSONP does NOT follow redirects on all mobile browsers → use fetch() first.
async function fetchData(){
  showLoad('Sincronizando datos...');
  const old=document.getElementById('_jp');if(old)old.remove();
  const cb='sgcCb_'+Date.now();
  const url=API_URL+'?callback='+cb+'&t='+Date.now();

  const onSuccess=data=>{
    _fetchRetry=0;
    D=data;
    const now=D.lastUpdate||new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('h-update').textContent='Actualizado: '+now;
    document.getElementById('f-time').textContent=now;
    if(D.config&&typeof D.config.showFact!=='undefined'){
      showFact=D.config.showFact===true||D.config.showFact==='true'||D.config.showFact===1;
    }
    updateAdminInfo();initSimAdj();render();
    delete window[cb];
    const s=document.getElementById('_jp');if(s)s.remove();
  };

  const onError=()=>{
    delete window[cb];
    if(_fetchRetry<2){_fetchRetry++;setTimeout(fetchData,3000);}
    else{_fetchRetry=0;showErrorBanner();}
  };

  // ── Strategy 1: fetch() — follows all redirects, works on mobile ──
  try{
    const resp=await Promise.race([
      fetch(url,{cache:'no-store',redirect:'follow'}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
    ]);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    // JSONP response: cbName({...json...}) → extract JSON between first ( and last )
    const i=text.indexOf('('),j=text.lastIndexOf(')');
    if(i<0||j<0)throw new Error('bad jsonp');
    const data=JSON.parse(text.slice(i+1,j));
    onSuccess(data);
    return;
  }catch(fetchErr){
    console.warn('fetch() failed, falling back to JSONP script tag:',fetchErr.message);
  }

  // ── Strategy 2: JSONP script tag (desktop/legacy fallback) ──
  window[cb]=onSuccess;
  const s=document.createElement('script');s.id='_jp';
  s.src=url;
  // Timeout guard — onerror doesn't always fire on mobile
  const guard=setTimeout(()=>{if(window[cb])onError();},12000);
  s.onload=()=>clearTimeout(guard);  // success: guard no longer needed
  s.onerror=()=>{clearTimeout(guard);onError();};
  document.head.appendChild(s);
}
function showErrorBanner(){
  hideLoad();
  const existing=document.getElementById('err-banner');if(existing)existing.remove();
  const banner=document.createElement('div');
  banner.id='err-banner';
  banner.style.cssText='position:fixed;top:var(--header-h);left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:12px 20px;border-radius:0 0 10px 10px;font-size:.82rem;font-family:Asap,sans-serif;z-index:600;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.35);white-space:nowrap;';
  banner.innerHTML='&#9888; No se pudo cargar los datos. <button onclick="document.getElementById(\'err-banner\').remove();fetchData();" style="background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:5px;cursor:pointer;font-family:Asap,sans-serif;font-size:.78rem;font-weight:600;">Reintentar</button>';
  document.body.appendChild(banner);
  setTimeout(()=>{if(banner.parentNode)banner.remove();},12000);
}

const fN=v=>{if(v===null||v===undefined||v==='')return'--';const n=parseFloat(v);if(isNaN(n))return String(v);return Math.round(n).toLocaleString('es-AR');};
const fP=v=>{if(v===null||v===undefined||v==='')return'--';const n=parseFloat(v);if(isNaN(n))return String(v);return(n*100).toFixed(1)+'%';};
const fV=v=>{if(v===null||v===undefined||v==='')return'--';const n=parseFloat(v);if(isNaN(n))return String(v);if(n>-2&&n<2&&String(v).includes('.'))return fP(n);return fN(n);};
const fCrp=v=>{if(!v&&v!==0)return'--';const n=parseFloat(v)*100;if(isNaN(n))return'--';const s=Math.abs(n).toFixed(2)+'%';return n<0?'<span class="val-neg">&#9660; '+s+'</span>':'<span class="val-pos">&#9650; '+s+'</span>';};

function getCampusData(){
  if(campus==='q')return D.quilmes;
  if(campus==='n')return D.north;
  const q=D.quilmes||{},n=D.north||{};
  const m=(a,b)=>({matricula:(parseFloat(a&&a.matricula)||0)+(parseFloat(b&&b.matricula)||0),ocupacion:null,vacantes:(parseFloat(a&&a.vacantes)||0)+(parseFloat(b&&b.vacantes)||0),retencion:null,new_students:(parseFloat(a&&a.new_students)||0)+(parseFloat(b&&b.new_students)||0),withdrawals:(parseFloat(a&&a.withdrawals)||0)+(parseFloat(b&&b.withdrawals)||0),prospectos:(parseFloat(a&&a.prospectos)||0)+(parseFloat(b&&b.prospectos)||0)});
  const mS=(sec,gr)=>{const r={total:m(q[sec]&&q[sec].total,n[sec]&&n[sec].total)};gr.forEach(g=>{r[g]=m(q[sec]&&q[sec][g],n[sec]&&n[sec][g]);});return r;};
  return{total:m(q.total,n.total),kinder:mS('kinder',['K1','K2','K3','K4','K5']),prep:mS('prep',['P1','P2','P3','P4','P5','P6']),college:mS('college',['C1','C2','C3','C4','C5','C6'])};
}
function getWRF(r){if(campus==='q')return{pipeline:r.qPipeline,won:r.qWon,wr:r.qWR};if(campus==='n')return{pipeline:r.nPipeline,won:r.nWon,wr:r.nWR};return{pipeline:r.osPipeline,won:r.osWon,wr:r.osWR};}
function getCohF(r){if(campus==='q')return{ing:r.qIngresaron,act:r.qActivos,ret:r.qRet,life:r.qLifespan};if(campus==='n')return{ing:r.nIngresaron,act:r.nActivos,ret:r.nRet,life:r.nLifespan};const i=(parseFloat(r.qIngresaron)||0)+(parseFloat(r.nIngresaron)||0);const a=(parseFloat(r.qActivos)||0)+(parseFloat(r.nActivos)||0);return{ing:i,act:a,ret:i>0?a/i:null,life:null};}

// ── SIMULATOR ──
function initSimAdj(){
  simAdj={};
  const py=D.proyeccion;if(!py)return;
  (py.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=0;});
  (py.north||[]).forEach(r=>{simAdj['n_'+r.grado]=0;});
}
function calcSimTotal(ck){
  const py=D.proyeccion;if(!py)return{base:0,final:0,facturacion:0};
  const rows=ck==='q'?py.quilmes:py.north;
  const totRow=ck==='q'?py.quilmesTotal:py.northTotal;
  let alumnos=0,factAdj=0;
  (rows||[]).forEach(r=>{
    const key=ck+'_'+r.grado;
    const adj=simAdj[key]||0;
    const proy=parseFloat(r.proy)||0;
    const factPerAlumno=proy>0?(parseFloat(r.facturacion)||0)/proy:0;
    alumnos+=Math.round(proy+adj);
    factAdj+=factPerAlumno*(proy+adj);
  });
  return{base:parseFloat((totRow||{}).alumnos)||0,final:alumnos,facturacion:factAdj,baseFact:parseFloat((totRow||{}).facturacion)||0};
}
function applyScenario(type){
  const py=D.proyeccion;if(!py)return;
  if(type==='reset')initSimAdj();
  else if(type==='opt'){(py.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=2;});(py.north||[]).forEach(r=>{simAdj['n_'+r.grado]=1;});}
  else if(type==='cons'){(py.quilmes||[]).forEach(r=>{simAdj['q_'+r.grado]=-2;});(py.north||[]).forEach(r=>{simAdj['n_'+r.grado]=-1;});}
  updateSimDisplay();
}
function updateSimDisplay(){
  const py=D.proyeccion;if(!py)return;
  [...(py.quilmes||[]).map(r=>({key:'q_'+r.grado})),...(py.north||[]).map(r=>({key:'n_'+r.grado}))].forEach(({key})=>{
    const el=document.getElementById('adj_'+key);if(el)el.value=simAdj[key]||0;
  });
  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;
  const setCard=(id,final,base,fact)=>{
    const el=document.getElementById(id);if(!el)return;
    el.querySelector('.sim-val').textContent=Math.round(final).toLocaleString('es-AR');
    if(showFact)el.querySelector('.sim-fact').textContent=fUSD(fact)+' USD';
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    el.querySelector('.sim-delta').innerHTML='vs base '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span>';
  };
  setCard('sim-q',qT.final,qT.base,qT.facturacion);
  setCard('sim-n',nT.final,nT.base,nT.facturacion);
  setCard('sim-os',osFinal,osBase,osFact);
  [...(py.quilmes||[]).map(r=>({key:'q_'+r.grado,proy:parseFloat(r.proy)||0,r})),...(py.north||[]).map(r=>({key:'n_'+r.grado,proy:parseFloat(r.proy)||0,r}))].forEach(({key,proy,r})=>{
    const el=document.getElementById('final_'+key);
    if(el)el.textContent=Math.round(proy+(simAdj[key]||0)).toLocaleString('es-AR');
    const felt=document.getElementById('factrow_'+key);
    if(felt&&showFact){const adj2=simAdj[key]||0;felt.textContent=proy>0?fUSD(r.facturacion/proy*(proy+adj2)):'--';}
  });
}

function render(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const main=document.getElementById('main');main.innerHTML='';
  main.className='campus-'+campus;
  TABS.forEach(function(tab){
    if(!sVis[tab.id])return;
    const panel=document.createElement('div');
    panel.className='panel'+(tab.id===activeTab?' active':'');
    panel.id='panel-'+tab.id;
    const content=buildPanel(tab.id);
    if(content)panel.appendChild(content);
    main.appendChild(panel);
  });
  setTimeout(()=>{document.querySelectorAll('.f-fill').forEach(el=>{const w=el.dataset.w;if(w)el.style.width=w+'%';});},100);
  buildSidebarNav();drawCharts();hideLoad();
}

function buildPanel(id){
  switch(id){
    case'resumen':return buildResumen();

    case'pipeline':return buildPipeline();
    case'cohort':return buildCohort();
    case'proyeccion':return buildProyeccion();
  }
}

function buildProyeccion(){
  const wrap=document.createElement('div');
  wrap.appendChild(pageHeader(t('ph_proyeccion'),t('ph_proyeccion_sub')));

  const py=D.proyeccion;
  if(!py){const p=document.createElement('p');p.textContent=t('proy_not_avail');p.style.cssText='color:var(--gray);font-family:Asap Condensed,sans-serif;padding:20px;';wrap.appendChild(p);return wrap;}

  const qT=calcSimTotal('q'),nT=calcSimTotal('n');
  const osFinal=qT.final+nT.final,osBase=qT.base+nT.base,osFact=qT.facturacion+nT.facturacion;

  const totDiv=document.createElement('div');totDiv.className='sim-totals';
  const mkCard=(id,cls,label,final,base,fact)=>{
    const d=Math.round(final-base),pct=(base>0?(final-base)/base*100:0).toFixed(1),sign=d>=0?'+':'';
    return'<div class="sim-card '+cls+'" id="'+id+'"><div class="sim-lbl">'+label+'</div><div class="sim-val">'+Math.round(final).toLocaleString('es-AR')+'</div>'+(showFact?'<div class="sim-fact">'+fUSD(fact)+' USD</div>':'<div class="sim-fact" style="visibility:hidden">&ndash;</div>')+'<div class="sim-delta">'+t('vs_base')+' '+Math.round(base).toLocaleString('es-AR')+' <span class="'+(d<0?'val-neg':'val-pos')+'">'+sign+d+' ('+sign+pct+'%)</span></div></div>';
  };
  totDiv.innerHTML=mkCard('sim-q','q',t('quilmes_2027'),qT.final,qT.base,qT.facturacion)+mkCard('sim-n','n',t('north_2027'),nT.final,nT.base,nT.facturacion)+mkCard('sim-os','',t('os_2027'),osFinal,osBase,osFact);
  wrap.appendChild(totDiv);

  const ctrl=document.createElement('div');ctrl.className='sim-controls';
  ctrl.innerHTML='<span style="font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);font-family:Asap Condensed,sans-serif;margin-right:4px">Escenario:</span><button class="sim-btn primary" onclick="applyScenario(\'reset\')">Tendencial (base)</button><button class="sim-btn" onclick="applyScenario(\'opt\')" style="border-color:var(--green);color:var(--green)">▲ Optimista +2</button><button class="sim-btn" onclick="applyScenario(\'cons\')" style="border-color:var(--red);color:var(--red)">▼ Conservador −2</button>';
  wrap.appendChild(ctrl);

  const mkTable=(title,ck,rows,color)=>{
    if(!rows||!rows.length)return'';
    let h2='<div style="margin-bottom:24px"><div style="font-size:1rem;font-weight:700;color:'+color+';margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+'">'+title+'</div><div class="tw"><table><thead><tr><th>'+t('col_grade')+'</th><th class="r">'+t('col_base')+'</th><th class="r">'+t('col_proy')+'</th><th class="r" style="min-width:130px">'+t('col_adj')+'</th><th class="r" style="min-width:90px">'+t('col_final')+'</th>'+(showFact?'<th class="r fact-col">Facturación USD</th>':'')+'</tr></thead><tbody>';
    rows.forEach(r=>{
      const key=ck+'_'+r.grado;
      const adj=simAdj[key]||0;
      const proy=parseFloat(r.proy)||0;
      const delta=adj!==0?'<span class="'+(adj>0?'val-pos':'val-neg')+'"> ('+fSign(adj)+')</span>':'';
      h2+='<tr><td style="font-weight:700">'+r.grado+'</td><td class="r">'+fN(r.base2026)+'</td><td class="r">'+fN(proy)+'</td><td class="r"><div class="adj-wrap"><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)-1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">−</button><input class="adj-input" id="adj_'+key+'" value="'+adj+'" type="number" onchange="simAdj[\''+key+'\']=parseInt(this.value)||0;updateSimDisplay()"/><button class="adj-btn" onclick="simAdj[\''+key+'\']=(simAdj[\''+key+'\']||0)+1;document.getElementById(\'adj_'+key+'\').value=simAdj[\''+key+'\'];updateSimDisplay()">+</button></div></td><td class="r" style="font-weight:700;color:'+color+'" id="final_'+key+'">'+Math.round(proy+adj).toLocaleString('es-AR')+'</td>'+(showFact?'<td class="r val-usd fact-col" id="factrow_'+key+'">'+(proy>0?fUSD(r.facturacion/proy*(proy+adj)):'--')+'</td>':'')+'</tr>';
    });
    h2+='</tbody></table></div></div>';
    return h2;
  };

  const tables=document.createElement('div');
  tables.innerHTML=mkTable(t('quilmes_table'),'q',py.quilmes,'#DC1E33')+mkTable(t('north_table'),'n',py.north,'#213463');
  wrap.appendChild(tables);
  return wrap;
}

    const ds=campus==='os'?[
      {label:'Quilmes',data:D.cohort.map(r=>+(parseFloat(r.qRet)*100).toFixed(1)),backgroundColor:'#DC1E33',borderRadius:8,borderSkipped:false},
      {label:'North',data:D.cohort.map(r=>+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:'#109AA9',borderRadius:8,borderSkipped:false},
    ]:[{label:campus==='q'?'Quilmes':'North',data:D.cohort.map(r=>campus==='q'?+(parseFloat(r.qRet)*100).toFixed(1):+(parseFloat(r.nRet)*100).toFixed(1)),backgroundColor:C.main,borderRadius:8,borderSkipped:false}];
    charts.cohort=new Chart(coc,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Asap Condensed',size:11},color:'#6B7180',padding:14,usePointStyle:true,pointStyle:'circle'}},tooltip:TTP},scales:{y:{min:78,max:100,grid:GRD,ticks:{font:{family:'Asap Condensed',size:11},color:'#6B7180',callback:v=>v+'%'},border:{display:false}},x:{grid:{display:false},ticks:TCK,border:{display:false}}}}});
  }
}

// ── SIDEBAR NAV ──
function buildSidebarNav(){
  const nav=document.getElementById('sb-nav');
  // Clear using DOM (NOT innerHTML= to preserve event listeners added below)
  while(nav.firstChild)nav.removeChild(nav.firstChild);

  // Section label
  const lbl=document.createElement('div');lbl.className='sb-lbl';lbl.innerHTML=t('nav_label');nav.appendChild(lbl);

  // Tab nav buttons
  TABS.forEach(function(tab){
    if(!sVis[tab.id])return;
    const btn=document.createElement('button');
    btn.className='nav-item'+(tab.id===activeTab?' active':'');
    btn.innerHTML=tab.icon+'<span>'+tab.label+'</span>';
    btn.onclick=function(){
      activeTab=tab.id;
      document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
      const panel=document.getElementById('panel-'+tab.id);
      if(panel){
        panel.classList.add('active');
        setTimeout(function(){panel.querySelectorAll('.f-fill').forEach(function(el){const w=el.dataset.w;if(w)el.style.width=w+'%';});},100);
      }
      window.scrollTo({top:0,behavior:'smooth'});
      if(isMobile()){
        document.getElementById('sidebar').classList.remove('mobile-open');
        document.getElementById('mob-overlay').classList.remove('active');
      }
    };
    nav.appendChild(btn);
  });

  // Build bottom section (flags + theme) into sb-bottom, not sb-nav
  const bottom=document.getElementById('sb-bottom');
  while(bottom.firstChild)bottom.removeChild(bottom.firstChild);

  // Language flag toggle — always at bottom of sidebar
  var svgUK='<svg viewBox="0 0 60 30" width="22" height="12" style="border-radius:2px;vertical-align:middle" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>';
  var svgAR='<svg viewBox="0 0 60 30" width="22" height="12" style="border-radius:2px;vertical-align:middle" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="30" fill="#74ACDF"/><rect y="10" width="60" height="10" fill="#fff"/><circle cx="30" cy="15" r="4" fill="#F6B40E"/></svg>';
  const flagRow=document.createElement('div');flagRow.className='sb-flag-row';
  [['en',svgUK,'EN'],['es',svgAR,'ES']].forEach(function(pair){
    var lc=pair[0],svg=pair[1],label=pair[2];
    var fbtn=document.createElement('button');
    fbtn.className='sb-flag'+(lang===lc?' sb-flag-active':'');
    fbtn.innerHTML=svg+' <span>'+label+'</span>';
    fbtn.onclick=function(){lang=lc;document.documentElement.lang=lc;render();};
    flagRow.appendChild(fbtn);
  });
  bottom.appendChild(flagRow);

  // Light/Dark toggle
  var sunSVG='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  var moonSVG='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
  var appRow=document.createElement('div');appRow.className='sb-appearance-row';
  [['light',sunSVG,'Light'],['dark',moonSVG,'Dark']].forEach(function(pair){
    var th=pair[0],icon=pair[1],lbl=pair[2];
    var tbtn=document.createElement('button');
    tbtn.className='sb-theme-btn'+(currentTheme===th?' active':'');
    tbtn.innerHTML=icon+' '+lbl;
    tbtn.onclick=function(){setTheme(th);};
    appRow.appendChild(tbtn);
  });
  bottom.appendChild(appRow);

  // Update text
  var upd=document.createElement('div');upd.id='sb-update-inner';upd.className='sb-update';
  bottom.appendChild(upd);
  var sbUpd=document.getElementById('sb-update');
  if(sbUpd)upd.textContent=sbUpd.textContent;
}

// ── CAMPUS ──

// ── SIDEBAR TOGGLE ──
function isMobile(){return window.matchMedia('(max-width:768px)').matches;}
function setSidebarCollapsed(v){
  sidebarCollapsed=v;
  const sb=document.getElementById('sidebar');
  const ct=document.getElementById('content');
  const hb=document.getElementById('hdr-brand');
  sb.classList.toggle('collapsed',v);
  ct.classList.toggle('collapsed',v);
  hb.classList.toggle('collapsed',v);
}
function toggleMobileSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('mob-overlay');
  const isOpen=sb.classList.toggle('mobile-open');
  ov.classList.toggle('active',isOpen);
}
document.getElementById('btn-sb-toggle').addEventListener('click',()=>{
  if(isMobile())toggleMobileSidebar();
  else setSidebarCollapsed(!sidebarCollapsed);
});
// close mobile sidebar when clicking overlay
document.getElementById('mob-overlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mob-overlay').classList.remove('active');
});

// ── ADMIN ──
function buildAdmin(){
  const ctr=document.getElementById('sec-toggles');ctr.innerHTML='';
  TABS.forEach(function(tab){
    const p=document.createElement('div');p.className='pill active';
    p.innerHTML='<span class="dot"></span>'+tab.label;
    p.onclick=function(){
      sVis[tab.id]=!sVis[tab.id];
      p.classList.toggle('active',sVis[tab.id]);
      if(!sVis[tab.id]&&activeTab===tab.id)activeTab=(TABS.find(function(x){return sVis[x.id];})||TABS[0]).id;
      render();
    };
    ctr.appendChild(p);
  });

  const fw=document.getElementById('fact-toggle-wrap');fw.innerHTML='';
  const fp=document.createElement('div');
  fp.className='pill teal-pill'+(showFact?' active':'');
  fp.innerHTML='<span class="dot"></span>'+t('fact_toggle');
  fp.onclick=()=>{
    showFact=!showFact;fp.classList.toggle('active',showFact);
    document.querySelectorAll('.sim-fact').forEach(el=>el.style.visibility=showFact?'':'hidden');
    document.querySelectorAll('.fact-col').forEach(el=>el.style.display=showFact?'':'none');
    const _s=document.createElement('script');
    _s.src=API_URL+'?setFact='+(showFact?'1':'0')+'&callback=_noop';
    window._noop=()=>{};document.head.appendChild(_s);setTimeout(()=>_s.remove(),3000);
  };
  fw.appendChild(fp);
}

function updateAdminInfo(){
  const el=document.getElementById('adm-info');if(!el)return;

function showApp(){

}
function showLoad(msg){const el=document.getElementById('loading');el.querySelector('.load-txt').textContent=msg||'Cargando...';el.classList.remove('hidden');}
function hideLoad(){document.getElementById('loading').classList.add('hidden');}

// ── CLOCK ──
function updateClock(){
  const now=new Date();
  const t=now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const el=document.getElementById('h-update');
  if(el&&!el.textContent.startsWith('Actual'))el.textContent=t;

setInterval(updateClock,30000);

// ── SESSION PERSISTENCE ──
// Store token in localStorage to survive page refresh (expires after 55 min)
function saveSession(){
  try{
    localStorage.setItem('sgc_token',accessToken);
    localStorage.setItem('sgc_email',userEmail);
    localStorage.setItem('sgc_exp',String(Date.now()+55*60*1000));
  }catch(e){}
}
function loadSession(){
  try{
    const tok=localStorage.getItem('sgc_token');
    const exp=parseInt(localStorage.getItem('sgc_exp')||'0');
    const em=(localStorage.getItem('sgc_email')||'').toLowerCase().trim();
    if(tok&&exp>Date.now()&&em){
      accessToken=tok;userEmail=em;return true;
    }
  }catch(e){}
  return false;
}
function clearSession(){
  try{localStorage.removeItem('sgc_token');localStorage.removeItem('sgc_email');localStorage.removeItem('sgc_exp');}catch(e){}
}

// Patch logout to also clear session
const _origLogout=document.getElementById('btn-out').onclick;
document.getElementById('btn-out').addEventListener('click',()=>{clearSession();});

// ── INIT ──
buildAdmin();buildSidebarNav();
window.onload=()=>{
  // Try restoring session — skip OAuth entirely, go straight to data
  if(loadSession()){
    if(userEmail===ADMIN_EMAIL)document.getElementById('btn-admin').style.display='flex';
    showApp();
    fetchData(); // hideLoad() is called inside render() once data arrives
    return;      // Do NOT load GSI/initAuth — it calls hideLoad() prematurely
  }
  const t=setTimeout(()=>{hideLoad();document.getElementById('login-screen').style.display='flex';},10000);
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{clearTimeout(t);initAuth();};
  s.onerror=()=>{clearTimeout(t);hideLoad();document.getElementById('login-screen').style.display='flex';};
  document.head.appendChild(s);
};
</script>
